# Flow 1: Open app → Start Mitra path (full onboarding)
# Validates: portal → focus select → sub-focus → baseline → lock → insight → dashboard
appId: com.kalpx.app
---
- launchApp

# Wait for app to load
- waitForAnimationToEnd

# Navigate to Mitra engine from Home
- tapOn: "Guided Paths"
- waitForAnimationToEnd

# Portal screen — should show Begin button
- assertVisible: "Begin with KalpX Mitra"
- tapOn: "Begin with KalpX Mitra"
- waitForAnimationToEnd

# Focus select — choose Career & Focus
- assertVisible: "Choose your path"
- tapOn: "Career & Focus"
- waitForAnimationToEnd

# Sub-focus select — pick a sub-focus
- assertVisible:
    text: ".*support.*"
    optional: true
- tapOn:
    index: 0
- waitForAnimationToEnd

# Baseline sliders — adjust and continue
- assertVisible:
    text: ".*baseline.*|.*how.*feel.*"
    optional: true
- tapOn: "Let's Begin"
- waitForAnimationToEnd

# Should reach insight or companion analysis screen
- assertVisible:
    text: ".*journey.*|.*path.*|.*companion.*"
    optional: true
