# Flow 2: Quick check-in — ack-only path (balanced/energized)
# Validates: dashboard → check-in → select balanced → ack → return to dashboard
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

# Navigate to engine
- tapOn: "My Routine"
- waitForAnimationToEnd

# Should be on dashboard (if journey exists) or portal
- tapOn:
    text: "Quick Check-In"
    optional: true

# Check-in screen — select Balanced
- tapOn:
    text: "Balanced"
    optional: true
- waitForAnimationToEnd

# Should show ack message and return option
- assertVisible:
    text: ".*Return to Mitra Home.*"
    optional: true
