# Flow 5: Trigger flow — through support suggestion
# Validates: I Feel Triggered → OM → Try another way → reflection → Share → advice cards
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn: "My Routine"
- waitForAnimationToEnd

- tapOn:
    text: "I Feel Triggered"
    optional: true
- waitForAnimationToEnd

# OM chanting → "Try another way" proceeds to reflection (NOT "I feel calmer now" which exits to dashboard)
- tapOn:
    text: "Try another way"
    optional: true
- waitForAnimationToEnd

# Trigger reflection — select a feeling
- assertVisible:
    text: ".*How are you feeling.*"
    optional: true
- tapOn:
    text: ".*agitated.*|.*uncertain.*"
    optional: true
    index: 0

# Share button
- tapOn:
    text: "Share"
    optional: true
- waitForAnimationToEnd

# Should show advice/suggestion cards
- assertVisible:
    text: ".*Recommended.*|.*practice.*"
    optional: true
