# Flow 6: Mantra runner — complete full session
# Validates: dashboard → mantra card → info → Begin Chanting → rep select → runner → complete
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn: "My Routine"
- waitForAnimationToEnd

# Tap mantra practice card
- tapOn:
    text: "Mantra"
    optional: true
- waitForAnimationToEnd

# Should see info screen or runner
- assertVisible:
    text: ".*Begin Chanting.*|.*Choose Your Chant Count.*|.*Mantra.*"
    optional: true

# If on info, tap Begin Chanting
- tapOn:
    text: "Begin Chanting"
    optional: true
- waitForAnimationToEnd

# Rep selection — choose 9 reps (fastest)
- tapOn:
    text: "9"
    optional: true
- tapOn:
    text: "Begin"
    optional: true
- waitForAnimationToEnd

# Mantra runner — tap 9 times to complete
- repeat:
    times: 9
    commands:
      - tapOn:
          text: "TAP"
          optional: true
      - waitForAnimationToEnd:
          timeout: 500

# Should show completion screen
- assertVisible:
    text: ".*Complete.*|.*Return to Mitra Home.*"
    optional: true
