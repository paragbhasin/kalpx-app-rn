# Flow 9: Info back returns to source
# Validates: dashboard → mantra card → info screen → back → returns to dashboard (not stuck)
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn: "My Routine"
- waitForAnimationToEnd

# Tap mantra card on dashboard
- tapOn:
    text: "Mantra"
    optional: true
- waitForAnimationToEnd

# Should be on mantra info screen
- assertVisible:
    text: ".*Begin Chanting.*|.*Mantra.*"
    optional: true

# Go back
- tapOn:
    text: ".*back.*|.*←.*"
    optional: true
- waitForAnimationToEnd

# Should be back on dashboard, not stuck
- assertVisible:
    text: ".*Day.*|.*Mantra.*|.*Practice.*"
    optional: true
