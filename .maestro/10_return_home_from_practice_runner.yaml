# Flow 10: Return to Mitra Home from practice runner
# Validates: dashboard → practice → runner → Return to Mitra Home → dashboard
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn: "Guided Paths"
- waitForAnimationToEnd

# Enter practice flow
- tapOn:
    text: "Practice"
    optional: true
- waitForAnimationToEnd

# Start practice runner
- tapOn:
    text: ".*Begin Practice.*|.*Start.*"
    optional: true
- waitForAnimationToEnd

# Return home from runner
- tapOn:
    text: "Return to Mitra Home"
    optional: true
- waitForAnimationToEnd

# Should be back on dashboard
- assertVisible:
    text: ".*Day.*|.*Mantra.*|.*Practice.*"
    optional: true
