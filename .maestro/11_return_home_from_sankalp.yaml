# Flow 11: Return to Mitra Home from sankalp embody
# Validates: dashboard → sankalp → embody → Return to Mitra Home → dashboard
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn: "My Routine"
- waitForAnimationToEnd

# Enter sankalp flow
- tapOn:
    text: "Sankalp"
    optional: true
- waitForAnimationToEnd

# Start embody
- tapOn:
    text: ".*Embody.*|.*Begin.*"
    optional: true
- waitForAnimationToEnd

# Return home
- tapOn:
    text: "Return to Mitra Home"
    optional: true
- waitForAnimationToEnd

# Should be back on dashboard
- assertVisible:
    text: ".*Day.*|.*Mantra.*|.*Practice.*"
    optional: true
