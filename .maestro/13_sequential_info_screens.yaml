# Flow 13: Sequential info screens show correct data
# Validates: mantra info → exit → practice info → exit → each shows its own data
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn: "My Routine"
- waitForAnimationToEnd

# Open mantra info
- tapOn:
    text: "Mantra"
    optional: true
- waitForAnimationToEnd

# Verify mantra-specific content
- assertVisible:
    text: ".*Mantra.*|.*Chant.*|.*Begin Chanting.*"
    optional: true

# Exit back to dashboard
- tapOn:
    text: ".*back.*|.*←.*"
    optional: true
- waitForAnimationToEnd

# Open practice info
- tapOn:
    text: "Practice"
    optional: true
- waitForAnimationToEnd

# Verify practice-specific content (not mantra content)
- assertVisible:
    text: ".*Practice.*|.*Begin Practice.*|.*Step.*"
    optional: true

# Exit back to dashboard
- tapOn:
    text: ".*back.*|.*←.*"
    optional: true
- waitForAnimationToEnd

# Dashboard should be intact
- assertVisible:
    text: ".*Day.*"
    optional: true
