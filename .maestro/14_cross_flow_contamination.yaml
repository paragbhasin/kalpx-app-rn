# Flow 14: Cross-flow contamination check
# Validates: trigger flow → exit → mantra flow → mantra shows core data not trigger data
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn: "Guided Paths"
- waitForAnimationToEnd

# Enter trigger flow
- tapOn:
    text: "I Feel Triggered"
    optional: true
- waitForAnimationToEnd

# Exit trigger flow early
- tapOn:
    text: "Return to Mitra Home"
    optional: true
- waitForAnimationToEnd

# Now enter mantra flow
- tapOn:
    text: "Mantra"
    optional: true
- waitForAnimationToEnd

# Mantra info should show mantra content, not trigger content
- assertVisible:
    text: ".*Mantra.*|.*Chant.*|.*Begin Chanting.*"
    optional: true

# Should NOT show trigger-related content
- assertNotVisible:
    text: ".*Triggered.*|.*How are you feeling.*"
    optional: true
