# Flow 16: Deep link to mantra runner screen
# Validates: navigate directly to runner — screen renders without crash
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn: "My Routine"
- waitForAnimationToEnd

# Fast path: enter mantra and immediately begin
- tapOn:
    text: "Mantra"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Begin Chanting"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "9"
    optional: true
- tapOn:
    text: "Begin"
    optional: true
- waitForAnimationToEnd

# Runner should be active
- assertVisible:
    text: ".*TAP.*|.*chant.*|.*rep.*"
    optional: true

# Exit cleanly
- tapOn:
    text: "Return to Mitra Home"
    optional: true
- waitForAnimationToEnd
