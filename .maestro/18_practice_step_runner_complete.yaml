# Flow 18: Practice step runner complete
# Validates: dashboard → practice → steps → complete all → completion screen
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn: "My Routine"
- waitForAnimationToEnd

# Enter practice flow
- tapOn:
    text: "Practice"
    optional: true
- waitForAnimationToEnd

# Start practice
- tapOn:
    text: ".*Begin Practice.*|.*Start.*"
    optional: true
- waitForAnimationToEnd

# Step through practice steps
- tapOn:
    text: ".*Next.*|.*Continue.*|.*Done.*"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: ".*Next.*|.*Continue.*|.*Done.*"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: ".*Next.*|.*Continue.*|.*Complete.*|.*Done.*"
    optional: true
- waitForAnimationToEnd

# Should show completion or return
- assertVisible:
    text: ".*Complete.*|.*Return to Mitra Home.*"
    optional: true
