# Flow 19: Anchor timer complete
# Validates: dashboard → anchor timer → wait for timer → completion
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn: "My Routine"
- waitForAnimationToEnd

# Look for anchor/breathing practice
- tapOn:
    text: ".*Anchor.*|.*Breath.*|.*Prana.*"
    optional: true
- waitForAnimationToEnd

# Start timer
- tapOn:
    text: ".*Begin.*|.*Start.*"
    optional: true
- waitForAnimationToEnd

# Wait for the shortest timer to complete
- waitForAnimationToEnd:
    timeout: 10000

# Should show completion or be still running
- assertVisible:
    text: ".*Complete.*|.*Timer.*|.*Breathe.*"
    optional: true
