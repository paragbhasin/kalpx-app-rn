# Flow 20: Practice early exit
# Validates: practice → End Practice → dashboard (no completion tracked)
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn: "My Routine"
- waitForAnimationToEnd

# Enter practice flow
- tapOn:
    text: "Practice"
    optional: true
- waitForAnimationToEnd

# Start practice
- tapOn:
    text: ".*Begin Practice.*|.*Start.*"
    optional: true
- waitForAnimationToEnd

# Exit early via End Practice
- tapOn:
    text: ".*End Practice.*|.*Return to Mitra Home.*"
    optional: true
- waitForAnimationToEnd

# Should be back on dashboard — no completion
- assertVisible:
    text: ".*Day.*|.*Practice.*"
    optional: true
