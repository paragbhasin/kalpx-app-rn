# Flow 23: Sankalp once per day
# Validates: complete sankalp → return → cannot embody again same day
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn: "Guided Paths"
- waitForAnimationToEnd

# First sankalp embody
- tapOn:
    text: "Sankalp"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: ".*Embody.*|.*Begin.*"
    optional: true
- waitForAnimationToEnd

# Complete via hold
- longPressOn:
    text: ".*Hold.*|.*Embody.*"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# Return home
- tapOn:
    text: "Return to Mitra Home"
    optional: true
- waitForAnimationToEnd

# Second attempt — should be blocked or show completed state
- tapOn:
    text: "Sankalp"
    optional: true
- waitForAnimationToEnd

# Should show completed indicator or no Embody button
- assertVisible:
    text: ".*Complete.*|.*Done.*|.*Embodied.*"
    optional: true
