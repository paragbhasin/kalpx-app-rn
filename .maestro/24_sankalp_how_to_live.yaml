# Flow 24: Sankalp info shows how_to_live steps
# Validates: sankalp info screen renders how_to_live guidance
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn: "Guided Paths"
- waitForAnimationToEnd

# Enter sankalp flow
- tapOn:
    text: "Sankalp"
    optional: true
- waitForAnimationToEnd

# Should show sankalp content with how to live guidance
- assertVisible:
    text: ".*Sankalp.*|.*intention.*|.*resolve.*"
    optional: true

# Should show how_to_live steps or related guidance
- assertVisible:
    text: ".*live.*|.*embody.*|.*practice.*|.*step.*"
    optional: true
