# Flow 26: OM chanting to reflection
# Validates: OM chanting → "Try another way" → reflection screen renders
# Note: "I feel calmer now" now exits to dashboard; "Try another way" proceeds to reflection
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn: "My Routine"
- waitForAnimationToEnd

# Start trigger flow
- tapOn:
    text: "I Feel Triggered"
    optional: true
- waitForAnimationToEnd

# Should be on OM chanting (free_mantra_chanting)
- assertVisible:
    text: ".*OM.*|.*chant.*|.*I feel calmer now.*"
    optional: true

# Both exit options should be visible
- assertVisible:
    text: ".*Try another way.*"
    optional: true

# Proceed to reflection via "Try another way"
- tapOn:
    text: "Try another way"
    optional: true
- waitForAnimationToEnd

# Should be on reflection screen
- assertVisible:
    text: ".*How are you feeling.*|.*feeling.*"
    optional: true
