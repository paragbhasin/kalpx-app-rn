# Flow 27: Trigger advice card tap starts support runner
# Validates: trigger advice → tap suggestion card → starts support runner
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn: "My Routine"
- waitForAnimationToEnd

# Trigger flow through to advice
- tapOn:
    text: "I Feel Triggered"
    optional: true
- waitForAnimationToEnd

# OM chanting → "Try another way" proceeds to reflection
- tapOn:
    text: "Try another way"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: ".*agitated.*|.*uncertain.*"
    optional: true
    index: 0

- tapOn:
    text: "Share"
    optional: true
- waitForAnimationToEnd

# Should see suggestion cards
- assertVisible:
    text: ".*Recommended.*|.*practice.*|.*suggestion.*"
    optional: true

# Tap a suggestion card
- tapOn:
    text: ".*practice.*|.*mantra.*|.*breath.*"
    optional: true
    index: 0
- waitForAnimationToEnd

# Should enter support runner or info screen
- assertVisible:
    text: ".*Begin.*|.*Start.*|.*runner.*|.*info.*"
    optional: true
