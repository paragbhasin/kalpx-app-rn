# Flow 28: Trigger runner exit early — no false completion
# Validates: trigger runner → exit early → no completion tracked
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn: "My Routine"
- waitForAnimationToEnd

# Enter trigger flow
- tapOn:
    text: "I Feel Triggered"
    optional: true
- waitForAnimationToEnd

# Exit trigger flow early (before completing any support)
- tapOn:
    text: "Return to Mitra Home"
    optional: true
- waitForAnimationToEnd

# Should be on dashboard — no false completion of trigger support
- assertVisible:
    text: ".*Day.*|.*Mantra.*|.*Practice.*"
    optional: true

# Trigger should not show as completed
- assertNotVisible:
    text: ".*Trigger.*Complete.*"
    optional: true
