# Flow 29: Trigger state does not leak to check-in
# Validates: trigger flow → exit → check-in → check-in has clean state
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn: "My Routine"
- waitForAnimationToEnd

# Enter and exit trigger flow
- tapOn:
    text: "I Feel Triggered"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Return to Mitra Home"
    optional: true
- waitForAnimationToEnd

# Now enter check-in
- tapOn:
    text: "Quick Check-In"
    optional: true
- waitForAnimationToEnd

# Check-in should show clean emotion options, not trigger state
- assertVisible:
    text: ".*Balanced.*|.*Energized.*|.*Agitated.*"
    optional: true

# Should NOT show trigger-specific content
- assertNotVisible:
    text: ".*Triggered.*|.*OM.*|.*calmer.*"
    optional: true
