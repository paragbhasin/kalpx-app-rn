# Flow 30: Day 7 checkpoint — full path
#
# Validates: dashboard auto-routes to weekly_checkpoint when day_number === 7,
# the cycle_reflection block renders metrics + 4 feeling options + textarea +
# submit, submission navigates to checkpoint_results, results screen renders
# decision-tree action buttons, and tapping Continue lands on day_active.
#
# Pre-req: log in as test+day7@kalpx.com (Test1234!) before launching.
# Or: ensure journey/status returns dayNumber=7 for the current user via the
# seed_test_journey backend command.

appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

# Resume journey from home — should auto-navigate to checkpoint screen
- tapOn:
    text: "Resume|Continue|My Routine|Begin"
    optional: true
- waitForAnimationToEnd

# Day 7 checkpoint screen should render
- assertVisible:
    text: "Day 7|reflection|How has your practice felt"
- assertVisible: "I feel more steady"
- assertVisible: "I feel some shift"
- assertVisible: "I am still finding my way"
- assertVisible: "I still feel heaviness"

# Pick "I feel more steady"
- tapOn: "I feel more steady"
- waitForAnimationToEnd

# Optional reflection
- tapOn:
    text: "Optional|share a word"
    optional: true
- inputText: "test reflection from maestro"
- hideKeyboard
- waitForAnimationToEnd

# Submit
- tapOn: "Continue"
- waitForAnimationToEnd

# Results screen
- assertVisible:
    text: "Your steadiness shows|steady|shift|finding your way|lighter"

# Tap the primary action — should be Continue My Path or similar
- tapOn:
    text: "Continue My Path|Continue Current Path|Choose New Focus|Lighten My Path"
- waitForAnimationToEnd

# Should land on dashboard
- assertVisible:
    text: "Day|My Routine|Mitra"
    optional: true
