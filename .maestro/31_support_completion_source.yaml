# Flow 31: Support completion source should be "support"
# Validates: trigger suggestion → complete → source tracked as support flow
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn: "Guided Paths"
- waitForAnimationToEnd

# Enter trigger flow
- tapOn:
    text: "I Feel Triggered"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "I feel calmer now"
    optional: true
- waitForAnimationToEnd

# Select a feeling
- tapOn:
    text: ".*agitated.*|.*uncertain.*"
    optional: true
    index: 0

- tapOn:
    text: "Share"
    optional: true
- waitForAnimationToEnd

# Tap a suggestion card
- tapOn:
    text: ".*practice.*|.*mantra.*|.*breath.*"
    optional: true
    index: 0
- waitForAnimationToEnd

# Complete the support item (if possible)
- tapOn:
    text: ".*Complete.*|.*Done.*|.*Finish.*"
    optional: true
- waitForAnimationToEnd

# Should show support completion (not core completion)
- assertVisible:
    text: ".*Return to Mitra Home.*|.*Complete.*"
    optional: true
