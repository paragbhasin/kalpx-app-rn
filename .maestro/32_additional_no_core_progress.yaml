# Flow 32: Additional item completion does not affect core progress
# Validates: complete additional item → core progress unchanged
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn: "Guided Paths"
- waitForAnimationToEnd

# Look for additional items section on dashboard
- tapOn:
    text: ".*Additional.*|.*Extra.*|.*More.*"
    optional: true
- waitForAnimationToEnd

# Tap an additional item to complete
- tapOn:
    text: ".*Begin.*|.*Start.*"
    optional: true
- waitForAnimationToEnd

# Complete it
- tapOn:
    text: ".*Complete.*|.*Done.*|.*Finish.*"
    optional: true
- waitForAnimationToEnd

# Return to dashboard
- tapOn:
    text: "Return to Mitra Home"
    optional: true
- waitForAnimationToEnd

# Core progress should be unchanged — mantra/practice/sankalp not marked complete
- assertVisible:
    text: ".*Day.*"
    optional: true
