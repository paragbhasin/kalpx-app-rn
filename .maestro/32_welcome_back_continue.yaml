# Flow 32: Welcome back — continue path
#
# Validates: home screen detects welcomeBack flag from journey/status,
# renders WelcomeBack component (lotus + focus copy + 2 buttons), tapping
# "Continue with <focus>" calls mitraJourneyWelcomeBack('continue'), creates
# new cycle, and lands on day_active dashboard.
#
# Pre-req: log in as test+welcomeback@kalpx.com (Test1234!).

appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

# Welcome back screen should render on home (not regular dashboard)
- assertVisible: "Welcome back"
- assertVisible:
    text: "walking the path|completed.*days|practice is still remembered"
- assertVisible: "Start Fresh"

# Tap continue
- tapOn:
    text: "Continue with"
- waitForAnimationToEnd

# Should land on dashboard (day 1 of new cycle)
- assertVisible:
    text: "Day|Mitra|My Routine"
    optional: true
