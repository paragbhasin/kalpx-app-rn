# Flow 33: Welcome back — fresh path
#
# Validates: tapping "Start Fresh" on welcome-back screen calls
# mitraJourneyWelcomeBack('fresh'), resets screen state, and routes to
# discipline_select onboarding screen.
#
# Pre-req: log in as test+welcomeback@kalpx.com (Test1234!).
# NOTE: Run AFTER 32_welcome_back_continue.yaml has reset the user, OR
# re-seed via: docker exec kalpx-dev-web python manage.py seed_test_journey \
#   --email test+welcomeback@kalpx.com --day 14 --ended-days-ago 35

appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- assertVisible: "Welcome back"
- assertVisible: "Start Fresh"

- tapOn: "Start Fresh"
- waitForAnimationToEnd

# Should land on discipline_select onboarding
- assertVisible:
    text: "Choose your path|focus|discipline|Career|Health|Spiritual"
    optional: true
