# Flow 34: Energized check-in shows ack only
# Validates: check-in → energized → ack screen only (no suggestions)
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn: "Guided Paths"
- waitForAnimationToEnd

# Enter check-in
- tapOn:
    text: "Quick Check-In"
    optional: true
- waitForAnimationToEnd

# Select Energized
- tapOn:
    text: "Energized"
    optional: true
- waitForAnimationToEnd

# Should show ack message
- assertVisible:
    text: ".*Return to Mitra Home.*"
    optional: true

# Should NOT show support suggestions
- assertNotVisible:
    text: ".*Recommended.*|.*suggestion.*|.*Try.*"
    optional: true
