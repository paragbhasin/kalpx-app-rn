# Flow 35: Agitated check-in shows support suggestions / breath reset
# Validates: check-in → agitated → Proceed → should show breath reset or support suggestions
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn: "My Routine"
- waitForAnimationToEnd

# Enter check-in
- tapOn:
    text: "Quick Check-In"
    optional: true
- waitForAnimationToEnd

# Select Agitated
- tapOn:
    text: "Agitated"
    optional: true
- waitForAnimationToEnd

# Tap Proceed (if visible — check-in may show Proceed before breath reset)
- tapOn:
    text: "Proceed"
    optional: true
- waitForAnimationToEnd

# Should show breath reset screen or support suggestions
- assertVisible:
    text: ".*breath.*|.*support.*|.*calm.*|.*pause.*|.*OM.*|.*I feel better.*"
    optional: true
