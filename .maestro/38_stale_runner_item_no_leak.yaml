# Flow 38: Stale runner item does not leak
# Validates: complete mantra → exit → next flow has no stale runner data
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn: "My Routine"
- waitForAnimationToEnd

# Complete mantra runner
- tapOn:
    text: "Mantra"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Begin Chanting"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "9"
    optional: true
- tapOn:
    text: "Begin"
    optional: true
- waitForAnimationToEnd

- repeat:
    times: 9
    commands:
      - tapOn:
          text: "TAP"
          optional: true
      - waitForAnimationToEnd:
          timeout: 500

# Return home
- tapOn:
    text: "Return to Mitra Home"
    optional: true
- waitForAnimationToEnd

# Enter practice flow
- tapOn:
    text: "Practice"
    optional: true
- waitForAnimationToEnd

# Should NOT show stale mantra runner data (TAP, rep count, etc.)
- assertNotVisible:
    text: ".*TAP.*"
    optional: true

- assertNotVisible:
    text: ".*Choose Your Chant Count.*"
    optional: true
