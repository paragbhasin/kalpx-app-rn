# Flow 40: Flow instance replacement
# Validates: start flow → start different flow → first flow instance ended cleanly
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn: "My Routine"
- waitForAnimationToEnd

# Start mantra flow
- tapOn:
    text: "Mantra"
    optional: true
- waitForAnimationToEnd

# Go back and start a different flow instead
- tapOn:
    text: ".*back.*|.*←.*"
    optional: true
- waitForAnimationToEnd

# Start trigger flow
- tapOn:
    text: "I Feel Triggered"
    optional: true
- waitForAnimationToEnd

# Should be in trigger flow, not mantra
- assertVisible:
    text: ".*Recite.*|.*OM.*|.*chant.*|.*Triggered.*"
    optional: true

# Should NOT show mantra info content
- assertNotVisible:
    text: ".*Begin Chanting.*|.*Choose Your Chant Count.*"
    optional: true

# Clean exit
- tapOn:
    text: "Return to Mitra Home"
    optional: true
- waitForAnimationToEnd
