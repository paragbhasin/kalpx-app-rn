# Flow 41: System back from runner
# Validates: in runner → system back button → exits to previous screen
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn: "My Routine"
- waitForAnimationToEnd

# Enter mantra runner
- tapOn:
    text: "Mantra"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Begin Chanting"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "9"
    optional: true
- tapOn:
    text: "Begin"
    optional: true
- waitForAnimationToEnd

# Verify runner is active
- assertVisible:
    text: ".*TAP.*|.*chant.*"
    optional: true

# Press system back
- pressKey: back
- waitForAnimationToEnd

# Should exit runner — back to info, rep select, or dashboard
- assertVisible:
    text: ".*Mantra.*|.*Day.*|.*Begin Chanting.*|.*Choose.*"
    optional: true
