# Flow 43: System back from dashboard — should not crash
# Validates: on dashboard → system back → app does not crash
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn: "Guided Paths"
- waitForAnimationToEnd

# Should be on dashboard
- assertVisible:
    text: ".*Day.*|.*Mantra.*|.*Practice.*"
    optional: true

# Press system back — should not crash
- pressKey: back
- waitForAnimationToEnd

# App should still be responsive (either on home or dashboard)
- assertVisible:
    text: ".*Guided Paths.*|.*KalpX.*|.*Home.*|.*Day.*"
    optional: true
