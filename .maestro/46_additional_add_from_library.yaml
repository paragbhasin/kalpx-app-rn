# Flow 46: Additional item — add from library
# Validates: browse library → add item → appears in dashboard additional section
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn: "Guided Paths"
- waitForAnimationToEnd

# Look for add/browse additional items
- tapOn:
    text: ".*Add.*|.*Browse.*|.*Library.*|.*More Practices.*"
    optional: true
- waitForAnimationToEnd

# Should see library of available items
- assertVisible:
    text: ".*practice.*|.*mantra.*|.*item.*"
    optional: true

# Select an item to add
- tapOn:
    text: ".*Add.*|.*Select.*"
    optional: true
    index: 0
- waitForAnimationToEnd

# Return to dashboard
- tapOn:
    text: "Return to Mitra Home"
    optional: true
- waitForAnimationToEnd

# Additional item should now appear on dashboard
- assertVisible:
    text: ".*Additional.*|.*Extra.*"
    optional: true
