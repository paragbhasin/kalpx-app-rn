# Flow 48: Additional item — complete
# Validates: tap additional item → complete → marked done
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn: "Guided Paths"
- waitForAnimationToEnd

# Tap an additional/extra item on dashboard
- tapOn:
    text: ".*Additional.*|.*Extra.*|.*More.*"
    optional: true
- waitForAnimationToEnd

# Start the item
- tapOn:
    text: ".*Begin.*|.*Start.*"
    optional: true
- waitForAnimationToEnd

# Complete the item
- tapOn:
    text: ".*Complete.*|.*Done.*|.*Finish.*"
    optional: true
- waitForAnimationToEnd

# Return home
- tapOn:
    text: "Return to Mitra Home"
    optional: true
- waitForAnimationToEnd

# Item should show as completed on dashboard
- assertVisible:
    text: ".*Day.*"
    optional: true
