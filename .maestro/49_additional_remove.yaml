# Flow 49: Additional item — remove
# Validates: remove additional item → no longer visible on dashboard
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn: "Guided Paths"
- waitForAnimationToEnd

# Look for additional items section
- tapOn:
    text: ".*Additional.*|.*Extra.*|.*More.*"
    optional: true
- waitForAnimationToEnd

# Remove an item
- tapOn:
    text: ".*Remove.*|.*Delete.*|.*×.*"
    optional: true
- waitForAnimationToEnd

# Confirm removal if prompted
- tapOn:
    text: ".*Confirm.*|.*Yes.*|.*Remove.*"
    optional: true
- waitForAnimationToEnd

# Return to dashboard
- tapOn:
    text: "Return to Mitra Home"
    optional: true
- waitForAnimationToEnd

# Dashboard should not show the removed item
- assertVisible:
    text: ".*Day.*"
    optional: true
