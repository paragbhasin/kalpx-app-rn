# Flow 51: Post-completion "Try another way" on post_trigger_mantra
# Validates: dashboard → I Feel Triggered → OM → Try another way → select mantra → complete 9 reps → assert "I feel calmer now" + "Try another way" visible → tap "Try another way" → trigger_recheck
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn: "My Routine"
- waitForAnimationToEnd

# Enter trigger flow
- tapOn:
    text: "I Feel Triggered"
    optional: true
- waitForAnimationToEnd

# On OM chanting (free_mantra_chanting) — tap Try another way to proceed to reflection
- tapOn:
    text: "Try another way"
    optional: true
- waitForAnimationToEnd

# On trigger_reflection — select a feeling
- tapOn:
    text: ".*agitated.*|.*uncertain.*"
    optional: true
    index: 0

- tapOn:
    text: "Share"
    optional: true
- waitForAnimationToEnd

# Advice cards — tap a mantra suggestion
- tapOn:
    text: ".*mantra.*|.*chant.*"
    optional: true
    index: 0
- waitForAnimationToEnd

# On info screen — begin chanting
- tapOn:
    text: ".*Begin.*|.*Start.*"
    optional: true
- waitForAnimationToEnd

# Rep selection — choose 9 reps
- tapOn:
    text: "9"
    optional: true
- tapOn:
    text: "Begin"
    optional: true
- waitForAnimationToEnd

# Complete 9 reps on post_trigger_mantra runner
- repeat:
    times: 9
    commands:
      - tapOn:
          text: "TAP"
          optional: true
      - waitForAnimationToEnd:
          timeout: 500

# After completion, both buttons should be visible
- assertVisible:
    text: ".*I feel calmer now.*"
    optional: true

- assertVisible:
    text: ".*Try another way.*"
    optional: true

# Tap "Try another way" to go to trigger_recheck
- tapOn:
    text: "Try another way"
    optional: true
- waitForAnimationToEnd

# Should be on trigger_recheck screen
- assertVisible:
    text: ".*How.*feeling.*|.*still.*triggered.*|.*check.*"
    optional: true
