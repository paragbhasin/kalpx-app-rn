# Flow 53: Post-completion on trigger_practice_runner
# Validates: dashboard → I Feel Triggered → Try another way → select practice → start timer (1min) → assert "I feel calmer now" + "Try another way" visible
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn: "My Routine"
- waitForAnimationToEnd

# Enter trigger flow
- tapOn:
    text: "I Feel Triggered"
    optional: true
- waitForAnimationToEnd

# On OM chanting — tap Try another way
- tapOn:
    text: "Try another way"
    optional: true
- waitForAnimationToEnd

# On trigger_reflection — select a feeling
- tapOn:
    text: ".*agitated.*|.*uncertain.*"
    optional: true
    index: 0

- tapOn:
    text: "Share"
    optional: true
- waitForAnimationToEnd

# Advice cards — tap a practice suggestion
- tapOn:
    text: ".*practice.*|.*breath.*|.*ground.*"
    optional: true
    index: 0
- waitForAnimationToEnd

# On practice info or duration select — choose 1 min
- tapOn:
    text: ".*Begin.*|.*Start.*"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: ".*1 min.*|.*1min.*|.*1.*"
    optional: true
    index: 0
- waitForAnimationToEnd

- tapOn:
    text: "Begin"
    optional: true
- waitForAnimationToEnd

# Wait for practice timer to run (1 min + buffer)
- extendedWaitUntil:
    visible:
      text: ".*I feel calmer now.*|.*Try another way.*|.*Complete.*"
      optional: true
    timeout: 90000

# After completion, both options should be visible
- assertVisible:
    text: ".*I feel calmer now.*"
    optional: true

- assertVisible:
    text: ".*Try another way.*"
    optional: true
