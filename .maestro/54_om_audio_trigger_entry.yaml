# Flow 54: OM audio plays on trigger entry
# Validates: dashboard → I Feel Triggered → assert audio player visible on free_mantra_chanting screen
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn: "My Routine"
- waitForAnimationToEnd

# Enter trigger flow
- tapOn:
    text: "I Feel Triggered"
    optional: true
- waitForAnimationToEnd

# Should be on OM chanting screen (free_mantra_chanting)
- assertVisible:
    text: ".*OM.*|.*Recite.*|.*chant.*"
    optional: true

# Audio player block should be present
# (Maestro cannot verify audio playback, but can check player UI is rendered)
- assertVisible:
    text: ".*I feel calmer now.*"
    optional: true

- assertVisible:
    text: ".*Try another way.*"
    optional: true

# Return to dashboard
- tapOn:
    text: "Return to Mitra Home"
    optional: true
- waitForAnimationToEnd

- assertVisible:
    text: ".*Day.*|.*Mantra.*|.*Practice.*"
    optional: true
