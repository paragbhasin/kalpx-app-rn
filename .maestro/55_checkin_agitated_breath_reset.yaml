# Flow 55: Check-in agitated → breath reset → OM audio
# Validates: dashboard → Quick Check-In → Agitated → Proceed → breath reset screen with audio
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn: "My Routine"
- waitForAnimationToEnd

# Enter check-in
- tapOn:
    text: "Quick Check-In"
    optional: true
- waitForAnimationToEnd

# Select Agitated
- tapOn:
    text: "Agitated"
    optional: true
- waitForAnimationToEnd

# Tap Proceed (if visible)
- tapOn:
    text: "Proceed"
    optional: true
- waitForAnimationToEnd

# Should be on breath reset screen (checkin_breath_reset)
- assertVisible:
    text: ".*breath.*|.*pause.*|.*OM.*|.*calm.*"
    optional: true

# Audio player should be visible on breath reset
# (Maestro cannot verify audio playback, but checks UI presence)
- assertVisible:
    text: ".*I feel better now.*|.*I feel calmer.*|.*Return.*"
    optional: true

# Exit via "I feel better now" or Return
- tapOn:
    text: ".*I feel better now.*|.*I feel calmer.*"
    optional: true
- waitForAnimationToEnd

# Should return to dashboard
- assertVisible:
    text: ".*Day.*|.*Mantra.*|.*Practice.*"
    optional: true
