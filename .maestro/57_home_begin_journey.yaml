# Flow 57: Home journey-aware — begin (logged in without journey)
# Validates: launch app (logged in, no journey) → assert "Begin with KalpX Mitra" visible → tap → portal
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

# On Home screen (logged in but no active journey)
# Should show "Begin with KalpX Mitra" card
- assertVisible:
    text: ".*Begin with KalpX Mitra.*|.*personalized guide.*"
    optional: true

# Tap Begin with KalpX Mitra
- tapOn:
    text: ".*Begin with KalpX Mitra.*|.*Begin.*"
    optional: true
- waitForAnimationToEnd

# Should navigate to portal or onboarding
- assertVisible:
    text: ".*Choose your path.*|.*Begin with KalpX.*|.*portal.*|.*focus.*"
    optional: true
