# Flow 59: MitraPhilosophy screen
# Validates: navigate to MitraPhilosophy → assert "How KalpX Mitra Works" or philosophy content → tap "Begin Your Journey" → engine
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

# Open drawer to find MitraPhilosophy link
- tapOn:
    text: ".*menu.*|.*☰.*"
    optional: true

- swipe:
    direction: RIGHT
    duration: 500
    start: "0%, 50%"
    end: "80%, 50%"

- waitForAnimationToEnd

# Tap MitraPhilosophy or How It Works link (if in drawer)
- tapOn:
    text: ".*How.*Works.*|.*Philosophy.*|.*About Mitra.*"
    optional: true
- waitForAnimationToEnd

# Should show philosophy content
- assertVisible:
    text: ".*daily steps.*|.*change.*|.*practice.*|.*journey.*"
    optional: true

# Tap "Begin Your Journey" CTA
- tapOn:
    text: "Begin Your Journey"
    optional: true
- waitForAnimationToEnd

# Should navigate to engine (portal or dashboard)
- assertVisible:
    text: ".*Day.*|.*Mantra.*|.*Practice.*|.*Begin with KalpX.*|.*Choose your path.*"
    optional: true
