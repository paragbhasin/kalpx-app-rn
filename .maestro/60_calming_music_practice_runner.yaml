# Flow 60: Calming music on practice runner
# Validates: dashboard → tap practice card → info → begin practice → select 1min → practice runner loads
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn: "My Routine"
- waitForAnimationToEnd

# Tap practice card
- tapOn:
    text: ".*Practice.*|.*Mindful.*"
    optional: true
- waitForAnimationToEnd

# Should see info screen
- assertVisible:
    text: ".*Begin Practice.*|.*Start.*|.*Practice.*"
    optional: true

# Begin practice
- tapOn:
    text: ".*Begin Practice.*|.*Start.*"
    optional: true
- waitForAnimationToEnd

# Select 1 min duration
- tapOn:
    text: ".*1 min.*|.*1min.*"
    optional: true
- waitForAnimationToEnd

# Tap Begin to start
- tapOn:
    text: "Begin"
    optional: true
- waitForAnimationToEnd

# Practice runner should load (audio would play but Maestro cannot verify audio)
# Verify runner UI elements are present
- assertVisible:
    text: ".*End Practice.*|.*step.*|.*breath.*|.*Return to Mitra Home.*"
    optional: true
