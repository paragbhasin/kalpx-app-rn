# Flow 61: connection_named carry modal — full memory UX.
# Validates: modal opens with Sanatan context + why_we_ask + prompt,
# primary_label "Save this connection", confirmed state shows
# "Saved. You can name another.", add-another reopens fresh modal,
# return home navigates to dashboard.
# Pre-condition: test+day3@kalpx.com seeded via rooms_seed.py (repeat state).
appId: com.kalpx.app
env:
  EMAIL: test+day3@kalpx.com
  PASSWORD: Test1234!
---
# Close any modal left open from a prior test run (covers tab bar, breaks login.yaml step 0c)
- runFlow:
    when:
      visible:
        id: "step_modal_body"
    commands:
      - tapOn:
          id: "step_modal_cancel"
      - waitForAnimationToEnd

- runFlow:
    file: login_preserve_session.yaml
    env:
      EMAIL: test+day3@kalpx.com
      PASSWORD: Test1234!
- waitForAnimationToEnd

# Navigate to day-active if on welcome-back screen (render_home state)
- runFlow:
    file: navigate_to_day_active.yaml


# Open RoomEntrySheet from dashboard
- runFlow:
    file: open_room_entry_sheet.yaml
    env:
      ROOM_LABEL: "I feel alone"

# Life context picker may appear — skip it
- runFlow:
    when:
      visible:
        id: "life_context_picker_sheet"
    commands:
      - tapOn:
          id: "life_context_picker_skip"
      - waitForAnimationToEnd

# Room renders — wait for room container to be present
- extendedWaitUntil:
    visible:
      id: "room_renderer_room_connection"
    timeout: 35000
# Reset confirmed state if carry pill was already saved in a prior run
# ("Name another" button is on a TouchableOpacity — reliably visible to Maestro)
- runFlow:
    when:
      visible:
        text: "Name another"
    commands:
      - tapOn:
          text: "Name another"
      - waitForAnimationToEnd
# tapOn scrolls to find the element — no extendedWaitUntil needed.
# room_carry_connection_named is a stable testID based on writes_event, not position index.
- takeScreenshot: flow61_pre_carry_tap
- tapOn:
    id: "room_carry_connection_named"
- waitForAnimationToEnd

# Modal opens — assert memory_modal fields (title, sanatan context, why_we_ask, prompt)
- assertVisible:
    text: "Name someone who matters"
- assertVisible:
    text: "Sambandha reminds us that even one true bond can hold us."
- assertVisible:
    text: "Naming someone helps you return from feeling alone to one thread of care."
- assertVisible:
    text: "Who is close to your heart right now?"

# Type text, dismiss keyboard, then save
# keyboardShouldPersistTaps="handled": tapping non-interactive text in ScrollView dismisses keyboard
- tapOn:
    id: "step_modal_text_input"
- inputText: "someone I care about"
- tapOn:
    text: "Sambandha reminds us that even one true bond can hold us."
- waitForAnimationToEnd
- tapOn:
    id: "step_modal_text_done"
- waitForAnimationToEnd

# Confirmed state — modal closed, pill in confirmed state
- assertNotVisible:
    id: "step_modal_body"
- assertVisible:
    text: "Saved. You can name another."
- assertVisible:
    text: "Name another"
- assertVisible:
    text: "Return home"

# Add another → resets to pill state; must tap pill again to open fresh modal
- tapOn:
    text: "Name another"
- waitForAnimationToEnd

- tapOn:
    id: "room_carry_connection_named"
- waitForAnimationToEnd

- assertVisible:
    id: "step_modal_body"
- assertVisible:
    text: "Who is close to your heart right now?"

# Prior text not pre-populated
- assertNotVisible:
    text: "Maa"

# Cancel second modal
- tapOn:
    id: "step_modal_cancel"
- waitForAnimationToEnd

# Return home from confirmed state
- tapOn:
    text: "Return home"

- extendedWaitUntil:
    notVisible:
      id: "room_renderer_room_connection"
    timeout: 8000

- assertNotVisible:
    id: "room_renderer_room_connection"
