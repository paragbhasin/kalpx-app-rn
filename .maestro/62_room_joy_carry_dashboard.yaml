# Flow 62: joy_carry — no modal, navigates to dashboard.
# Validates: joy_carry emits no text-input modal (closing action),
# navigates directly to dashboard after tap.
# Pre-condition: test+day3@kalpx.com seeded (repeat state for room_joy).
appId: com.kalpx.app
env:
  EMAIL: test+day3@kalpx.com
  PASSWORD: Test1234!
---
# Close any modal left open from a prior test run
- runFlow:
    when:
      visible:
        id: "step_modal_body"
    commands:
      - tapOn:
          id: "step_modal_cancel"
      - waitForAnimationToEnd

- runFlow:
    file: login_preserve_session.yaml
    env:
      EMAIL: test+day3@kalpx.com
      PASSWORD: Test1234!
- waitForAnimationToEnd

# Navigate to day-active if on welcome-back screen (render_home state)
- runFlow:
    file: navigate_to_day_active.yaml

- runFlow:
    file: open_room_entry_sheet.yaml
    env:
      ROOM_LABEL: "I'm in a good place"

# Life context picker guard
- runFlow:
    when:
      visible:
        id: "life_context_picker_sheet"
    commands:
      - tapOn:
          id: "life_context_picker_skip"
      - waitForAnimationToEnd

# Room renders
- extendedWaitUntil:
    visible:
      id: "room_renderer_room_joy"
    timeout: 35000

# Tap joy_carry pill — must NOT open any modal
# room_carry_joy_carry is stable (writes_event-based testID)
- tapOn:
    id: "room_carry_joy_carry"

# No modal body visible — joy_carry opens no text input
- assertNotVisible:
    id: "step_modal_body"

# Navigated away from room
- extendedWaitUntil:
    notVisible:
      id: "room_renderer_room_joy"
    timeout: 8000

- assertNotVisible:
    id: "room_renderer_room_joy"
