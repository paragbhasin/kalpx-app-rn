# Flow 63: life-context picker — select a context → room renders with personalisation toast.
# Validates: picker sheet opens, option rows are tappable, picking "Relationships"
# closes the picker and renders the room, toast "Personalized for your context." appears.
# Pre-condition: test+day3@kalpx.com with CompanionState.life_context="self"
# (seeded by rooms_seed.py). "Myself" row should be visible in picker.
appId: com.kalpx.app
env:
  EMAIL: test+day3@kalpx.com
  PASSWORD: Test1234!
---
- runFlow:
    file: login.yaml
    env:
      EMAIL: test+day3@kalpx.com
      PASSWORD: Test1234!
- waitForAnimationToEnd

# Navigate to day-active if on welcome-back screen (render_home state)
- runFlow:
    file: navigate_to_day_active.yaml


- tapOn:
    id: "quick_support_more_ways"
- waitForAnimationToEnd

- tapOn:
    id: "room_entry_sheet_clarity"
- waitForAnimationToEnd

# Picker must appear
- assertVisible:
    id: "life_context_picker_sheet"

# "Myself" row visible (pre-seeded preference)
- assertVisible:
    id: "life_context_picker_self"

# Pick "Relationships" — different from stored preference to exercise context-change path
- tapOn:
    id: "life_context_picker_relationships"
- waitForAnimationToEnd

# Picker dismissed, room renders
- assertNotVisible:
    id: "life_context_picker_sheet"
- assertVisible:
    id: "room_renderer_room_clarity"

# Personalisation toast (BE applies life_context to selection)
- assertVisible:
    text: "Personalized for your context."
    optional: true
