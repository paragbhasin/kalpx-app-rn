# Flow 66: clarity inquiry — "truth" category → "Sit with the question" practice (3-min timer).
# Validates: InquiryModal opens, truth category shows correct anchor_line and
# reflective_prompt, "Sit with the question" button opens StepModal with
# a running timer (step_sit_ambient_3min → timer_sit body).
# Pre-condition: test+day3@kalpx.com (repeat state — clarity inquiry is repeat-only).
appId: com.kalpx.app
env:
  EMAIL: test+day3@kalpx.com
  PASSWORD: Test1234!
---
- runFlow:
    file: login.yaml
    env:
      EMAIL: test+day3@kalpx.com
      PASSWORD: Test1234!
- waitForAnimationToEnd

# Navigate to day-active if on welcome-back screen (render_home state)
- runFlow:
    file: navigate_to_day_active.yaml


- tapOn:
    id: "quick_support_more_ways"
- waitForAnimationToEnd

- tapOn:
    id: "room_entry_sheet_clarity"
- waitForAnimationToEnd

# Skip picker
- runFlow:
    when:
      visible:
        id: "life_context_picker_sheet"
    commands:
      - tapOn:
          id: "life_context_picker_skip"
      - waitForAnimationToEnd

- assertVisible:
    id: "room_renderer_room_clarity"

# Open inquiry
- tapOn:
    text: "Sit with the question"
- waitForAnimationToEnd

# InquiryModal opens — category list
- assertVisible:
    id: "inquiry_modal_category_list"

# Tap "I want to see what's true" (category id = "truth")
- tapOn:
    id: "inquiry_modal_category_truth"
- waitForAnimationToEnd

# Category detail renders — anchor line and reflective prompt
- assertVisible:
    id: "inquiry_modal_category_detail"
- assertVisible:
    text: "What you most want to be true"
- assertVisible:
    text: "What would be true here"

# "Sit with the question" practice button must be visible (step_sit_ambient_3min)
- assertVisible:
    id: "inquiry_modal_try_practice"

# Launch practice → StepModal opens with timer
- tapOn:
    id: "inquiry_modal_try_practice"
- waitForAnimationToEnd

- assertVisible:
    id: "step_modal_body"
- assertVisible:
    id: "step_modal_timer_digits"
- assertVisible:
    id: "step_modal_timer_start"

# Not a grounding or text input body
- assertNotVisible:
    id: "step_modal_grounding_progress"
- assertNotVisible:
    id: "step_modal_text_input"

# Cancel cleanly
- tapOn:
    id: "step_modal_cancel"
- waitForAnimationToEnd
