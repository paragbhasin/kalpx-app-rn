# Flow 67: clarity inquiry — "decision" category → "A ten-second pause" (grounding body).
# Validates: decision category shows anchor_line "Clarity is not the absence of pull",
# reflective_prompt "What is true here, before it has to become a decision?",
# "A ten-second pause" button opens StepModal with grounding body (step_grounding_palms_30s).
# Pre-condition: test+day3@kalpx.com (repeat state).
appId: com.kalpx.app
env:
  EMAIL: test+day3@kalpx.com
  PASSWORD: Test1234!
---
- runFlow:
    file: login.yaml
    env:
      EMAIL: test+day3@kalpx.com
      PASSWORD: Test1234!
- waitForAnimationToEnd

# Navigate to day-active if on welcome-back screen (render_home state)
- runFlow:
    file: navigate_to_day_active.yaml


- tapOn:
    id: "quick_support_more_ways"
- waitForAnimationToEnd

- tapOn:
    id: "room_entry_sheet_clarity"
- waitForAnimationToEnd

- runFlow:
    when:
      visible:
        id: "life_context_picker_sheet"
    commands:
      - tapOn:
          id: "life_context_picker_skip"
      - waitForAnimationToEnd

- assertVisible:
    id: "room_renderer_room_clarity"

- tapOn:
    text: "Sit with the question"
- waitForAnimationToEnd

- assertVisible:
    id: "inquiry_modal_category_list"

# Tap "A decision I'm sitting with" (category id = "decision")
- tapOn:
    id: "inquiry_modal_category_decision"
- waitForAnimationToEnd

- assertVisible:
    id: "inquiry_modal_category_detail"
- assertVisible:
    text: "Clarity is not the absence of pull"
- assertVisible:
    text: "What is true here, before it has to become a decision"

# Practice button visible
- assertVisible:
    id: "inquiry_modal_try_practice"

# Launch practice → grounding body
- tapOn:
    id: "inquiry_modal_try_practice"
- waitForAnimationToEnd

- assertVisible:
    id: "step_modal_body"
- assertVisible:
    id: "step_modal_grounding_progress"

# Not a timer body
- assertNotVisible:
    id: "step_modal_timer_digits"

# Cancel
- tapOn:
    id: "step_modal_cancel"
- waitForAnimationToEnd
