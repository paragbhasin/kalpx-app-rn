# Flow 69: inquiry "Journal on this" — type text → submit dispatches step completion.
# Validates: journal-on-this text input opens, typed text accepted,
# submit button enabled and closes the input view.
# Pre-condition: test+day3@kalpx.com (repeat state; clarity inquiry is repeat-only).
appId: com.kalpx.app
env:
  EMAIL: test+day3@kalpx.com
  PASSWORD: Test1234!
---
- runFlow:
    file: login.yaml
    env:
      EMAIL: test+day3@kalpx.com
      PASSWORD: Test1234!
- waitForAnimationToEnd

# Navigate to day-active if on welcome-back screen (render_home state)
- runFlow:
    file: navigate_to_day_active.yaml


- tapOn:
    id: "quick_support_more_ways"
- waitForAnimationToEnd

- tapOn:
    id: "room_entry_sheet_clarity"
- waitForAnimationToEnd

- runFlow:
    when:
      visible:
        id: "life_context_picker_sheet"
    commands:
      - tapOn:
          id: "life_context_picker_skip"
      - waitForAnimationToEnd

- assertVisible:
    id: "room_renderer_room_clarity"

- tapOn:
    text: "Sit with the question"
- waitForAnimationToEnd

- assertVisible:
    id: "inquiry_modal_category_list"

# Tap first category (decision)
- tapOn:
    id: "inquiry_modal_category_decision"
- waitForAnimationToEnd

- assertVisible:
    id: "inquiry_modal_category_detail"

# Open journal
- assertVisible:
    id: "inquiry_modal_open_journal"
- tapOn:
    id: "inquiry_modal_open_journal"
- waitForAnimationToEnd

# Journal text input visible
- assertVisible:
    id: "inquiry_modal_journal_input"

# Type text
- tapOn:
    id: "inquiry_modal_journal_input"
- inputText: "The real decision is whether to stay or go."

# Submit
- assertVisible:
    id: "inquiry_modal_journal_done"
- tapOn:
    id: "inquiry_modal_journal_done"
- waitForAnimationToEnd

# Modal closed or returns to category list — room still visible
- assertVisible:
    id: "room_renderer_room_clarity"
