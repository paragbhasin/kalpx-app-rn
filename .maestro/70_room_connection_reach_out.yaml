# Flow 70: connection_reach_out carry modal — save and copy message.
# Validates: ReachOutBody opens with Sanatan context + why_we_ask,
# message field required (contact optional), primary "Save and copy message"
# copies to clipboard + closes modal → confirmed state → stays in room.
# Pre-condition: test+day3@kalpx.com (repeat state for room_connection).
appId: com.kalpx.app
env:
  EMAIL: test+day3@kalpx.com
  PASSWORD: Test1234!
---
# Close any modal left open from a prior test run
- runFlow:
    when:
      visible:
        id: "step_modal_body"
    commands:
      - tapOn:
          id: "step_modal_cancel"
      - waitForAnimationToEnd

- runFlow:
    file: login_preserve_session.yaml
    env:
      EMAIL: test+day3@kalpx.com
      PASSWORD: Test1234!
- waitForAnimationToEnd

- runFlow:
    file: navigate_to_day_active.yaml

- runFlow:
    file: open_room_entry_sheet.yaml
    env:
      ROOM_LABEL: "I feel alone"

- runFlow:
    when:
      visible:
        id: "life_context_picker_sheet"
    commands:
      - tapOn:
          id: "life_context_picker_skip"
      - waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "room_renderer_room_connection"
    timeout: 35000

# Reset confirmed state if carry was already saved in a prior run
- runFlow:
    when:
      visible:
        text: "Add another"
    commands:
      - tapOn:
          text: "Add another"
      - waitForAnimationToEnd

# Tap carry pill (stable testID, not text-based)
- tapOn:
    id: "room_carry_connection_reach_out"
- waitForAnimationToEnd

# Modal — assert sanatan context and why_we_ask
- assertVisible:
    text: "Reach out to one person"
- assertVisible:
    text: "A short act of reaching is itself the practice of sambandha."
- assertVisible:
    text: "Writing the message — even without sending — brings the connection closer."

# Primary button label is "Save and copy message"
- assertVisible:
    text: "Save and copy message"

# Write a message (required field)
- tapOn:
    id: "step_modal_reach_out_message"
- inputText: "Thinking of you. Hope you are well."

# Save and copy
- tapOn:
    id: "step_modal_reach_out_copy_done"
- waitForAnimationToEnd

# Modal closed, confirmed state, still in room
- assertNotVisible:
    id: "step_modal_body"
- assertVisible:
    text: "Saved. You can add another."
- assertVisible:
    id: "room_renderer_room_connection"
