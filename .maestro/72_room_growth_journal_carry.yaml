# Flow 72: growth_journal carry modal — save → confirmed state → stays in room.
# Validates: memory_modal title "Write what you noticed", Sanatan context
# "Growth ripens", primary_label "Save this", confirmed "Saved. You can write another.",
# room visible after save.
# Pre-condition: test+day3@kalpx.com (repeat state for room_growth).
appId: com.kalpx.app
env:
  EMAIL: test+day3@kalpx.com
  PASSWORD: Test1234!
---
# Close any modal left open from a prior test run
- runFlow:
    when:
      visible:
        id: "step_modal_body"
    commands:
      - tapOn:
          id: "step_modal_cancel"
      - waitForAnimationToEnd

- runFlow:
    file: login_preserve_session.yaml
    env:
      EMAIL: test+day3@kalpx.com
      PASSWORD: Test1234!
- waitForAnimationToEnd

- runFlow:
    file: navigate_to_day_active.yaml

- runFlow:
    file: open_room_entry_sheet.yaml
    env:
      ROOM_LABEL: "I want to grow as a person"

- runFlow:
    when:
      visible:
        id: "life_context_picker_sheet"
    commands:
      - tapOn:
          id: "life_context_picker_skip"
      - waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "room_renderer_room_growth"
    timeout: 35000

# Reset confirmed state if carry was already saved in a prior run
- runFlow:
    when:
      visible:
        text: "Write another"
    commands:
      - tapOn:
          text: "Write another"
      - waitForAnimationToEnd

# Tap growth_journal carry pill (stable testID)
- tapOn:
    id: "room_carry_growth_journal"
- waitForAnimationToEnd

# Modal — title, sanatan context, prompt
- assertVisible:
    text: "Write what you noticed"
- assertVisible:
    text: "Growth ripens through one right action, not speed."
- assertVisible:
    text: "What did you notice, or what is forming?"

# Type and save — tap sanatan context to dismiss keyboard first
- tapOn:
    id: "step_modal_text_input"
- inputText: "I stayed patient through the difficult conversation."
- tapOn:
    text: "Growth ripens through one right action, not speed."
- waitForAnimationToEnd
- tapOn:
    id: "step_modal_text_done"
- waitForAnimationToEnd

# Confirmed, stays in room
- assertNotVisible:
    id: "step_modal_body"
- assertVisible:
    text: "Saved. You can write another."
- assertVisible:
    id: "room_renderer_room_growth"
