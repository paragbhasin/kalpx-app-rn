# Flow 74 (P2): room memory screen — GET /api/mitra/rooms/memory/ entries visible.
# Validates: after saving at least one carry event (run flows 61 or 71 first),
# the memory screen lists that entry. Requires RoomMemoryScreen to be
# reachable from the UI (nav path TBD — add entry point first if not wired).
# Pre-condition: test+day3@kalpx.com, at least 1 RoomMemory row written.
# NOTE: This flow is BLOCKED until the memory screen nav entry point is added to the UI.
# Placeholder for when RoomMemoryScreen.tsx is wired into the navigation stack.
appId: com.kalpx.app
env:
  EMAIL: test+day3@kalpx.com
  PASSWORD: Test1234!
---
- runFlow:
    file: login.yaml
    env:
      EMAIL: test+day3@kalpx.com
      PASSWORD: Test1234!
- waitForAnimationToEnd

# Navigate to memory screen (exact path depends on nav wiring — update when live)
# Expected path: drawer or profile → "Your Memories" or similar
- tapOn:
    text: "Your Memories|Room Memory|Memories"
    optional: true
- waitForAnimationToEnd

# Memory list renders — at minimum one entry from prior save
- assertVisible:
    text: "connection_named|Name someone|joy_named|Write what.*good"
    optional: true

# If screen not yet reachable, assert on API directly via __DEV__ log (manual check).
