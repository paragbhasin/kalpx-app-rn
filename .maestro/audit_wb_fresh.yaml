appId: com.kalpx.app
---
# Case 2: WB → Begin Fresh
# Persona: test+welcomeback2@kalpx.com (gap=14d, spiritualgrowth)
# Expected: WB chips → tap Begin fresh → welcome_onboarding/turn_1
- runFlow:
    file: login.yaml
    env:
      EMAIL: test+welcomeback2@kalpx.com
      PASSWORD: Test1234!
- waitForAnimationToEnd
- takeScreenshot: audit_case2_01_after_login_wb2

- assertVisible:
    text: "Welcome back|welcome back"
- assertVisible:
    text: "Begin fresh|fresh"
- takeScreenshot: audit_case2_02_wb_chips

- tapOn:
    text: "Begin fresh"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "journey|path|intention|Begin|growth|healing|peace|focus|career"
    timeout: 20000
- takeScreenshot: audit_case2_03_after_fresh_final_destination

# Final destination must be onboarding (NOT dashboard)
# Deny: no day number, no triad
- assertNotVisible:
    text: "My Routine"
    optional: true
