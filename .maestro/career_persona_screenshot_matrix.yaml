# Career-persona screenshot matrix (2026-04-14)
#
# Captures one screenshot per high-value moment for the career-struggle
# persona (test+day7@kalpx.com, scan_focus=workstress). Requires:
#   - Tokens for test+day7@ pre-injected into AsyncStorage (see /tmp/day7_pair.json)
#   - Backend healthy on dev.kalpx.com
#   - Metro running on :8081 with dev-client bundle
#   - useBootstrapAuth hook (commit 109d301) — auto-resumes session on cold-start
#
# Runs ~3 min. Output: ~/kalpx-app-rn/screenshots/career_persona_2026_04_14/M*.png
#
# Moments covered (15 of 47 — the ones reachable from day7 user without extra seeding):
#   M1-home, M5-dashboard, M8-focus-chip, M10-M12-triad, M13-mantra_ui,
#   M16-info, M17-mantra-runner, M18-sankalp-runner, M19-practice-runner,
#   M24-day7-checkpoint, M35-why-this-L1, M36-L2-sheet, M37-L3-sheet,
#   M46-grief-room, M47-loneliness-room
#
# Not covered here (require extra state seeding):
#   M2-M7 onboarding (needs no-journey user)
#   M14/M15 path milestone (requires cycle 2+ journey)
#   M21/M32-34 trigger (requires trigger flow entry)
#   M23 weekly reflection (backend generation async; separate flow)
#   M25 day 14 checkpoint (requires day14 user)
#   M28 predictive alert (requires seeded alert)
#   M30 recommended additional (embedded on dashboard — sampled via dashboard shot)
#   M38/M39/M40/M41/M42/M43/M44/M45 (require seeded state)

appId: com.kalpx.app
---
# ─────────────────── M1 — Authed Home (journey-resume variant) ───────────
- launchApp:
    clearState: false   # keep tokens in AsyncStorage
- waitForAnimationToEnd
- takeScreenshot: "screenshots/career_persona_2026_04_14/M01_home_authed"

# ─────────────────── M5/M8 — Companion dashboard day_active ───────────
- tapOn: "Reflect on My Journey"
- waitForAnimationToEnd
- takeScreenshot: "screenshots/career_persona_2026_04_14/M05_dashboard_hero"

# Triad cards should be visible on this surface (M10/M11/M12/M13/M35)
- takeScreenshot: "screenshots/career_persona_2026_04_14/M10_triad_cards"

# ─────────────────── M16 — Info reveal ───────────
# Tap mantra card → info overlay
- tapOn:
    text: ".*Mantra.*"
    optional: true
    index: 0
- waitForAnimationToEnd
- takeScreenshot: "screenshots/career_persona_2026_04_14/M16_info_reveal_mantra"

# Why-this L2 chip → opens L2 sheet
- tapOn:
    text: "Why this.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "screenshots/career_persona_2026_04_14/M36_whythis_L2"

# Go deeper → L3
- tapOn:
    text: "Go deeper"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "screenshots/career_persona_2026_04_14/M37_whythis_L3"

# Back to info reveal, then runner
- back
- back
- waitForAnimationToEnd

# ─────────────────── M17 — Mantra runner ───────────
- tapOn:
    text: ".*Begin.*|.*Start.*"
    optional: true
    index: 0
- waitForAnimationToEnd
- takeScreenshot: "screenshots/career_persona_2026_04_14/M17_mantra_runner"
- back
- waitForAnimationToEnd

# ─────────────────── Back to dashboard ───────────
- takeScreenshot: "screenshots/career_persona_2026_04_14/M05_dashboard_post_info"

# ─────────────────── M24 — Day 7 checkpoint ───────────
# Navigate via menu or deep link if available. Attempt deep link via Menu tab.
- tapOn:
    text: "Menu"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: ".*[Cc]heckpoint.*|.*Day 7.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "screenshots/career_persona_2026_04_14/M24_day7_checkpoint"

# ─────────────────── M46 — Grief room (if reachable from menu) ───────────
- back
- waitForAnimationToEnd
- tapOn:
    text: ".*grief.*|.*Grief.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "screenshots/career_persona_2026_04_14/M46_grief_room"
- back
- waitForAnimationToEnd

# ─────────────────── M47 — Loneliness room ───────────
- tapOn:
    text: ".*loneliness.*|.*Loneliness.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "screenshots/career_persona_2026_04_14/M47_loneliness_room"
- back

# ─────────────────── Final: back to home ───────────
- tapOn:
    text: "Home"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "screenshots/career_persona_2026_04_14/M01_home_final"
