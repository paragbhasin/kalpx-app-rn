# career_persona_screenshot_matrix_v2 — reliable per-user screenshot flow.
#
# Preconditions:
#   - Tokens pre-injected into AsyncStorage (script handles this outside)
#   - useBootstrapAuth hook auto-resumes session on cold-start (commit 109d301)
#   - Backend healthy on dev.kalpx.com
#
# Captures: ~16 surfaces reachable without deep additional state seeding.
#
# Output path: screenshots/career_persona_2026_04_14/<ref>/M*.png
# The outer script moves shots into per-user directories after each run.

appId: com.kalpx.app
---
- launchApp:
    clearState: false
- waitForAnimationToEnd
- takeScreenshot: "screenshots/career_persona_2026_04_14/M01_home_authed"

# Navigate into journey
- tapOn:
    text: "Reflect on My Journey"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "screenshots/career_persona_2026_04_14/M07_journey_visualizer"

# Tap Continue to reach the actual companion_dashboard
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "screenshots/career_persona_2026_04_14/M05_dashboard_hero"
- takeScreenshot: "screenshots/career_persona_2026_04_14/M10_triad_cards"

# Try tapping the mantra card area — use common text tokens
- tapOn:
    text: ".*Hare Krishna.*|.*Śāntākāraṃ.*|.*Om Namah.*|.*Mantra.*"
    optional: true
    index: 0
- waitForAnimationToEnd
- takeScreenshot: "screenshots/career_persona_2026_04_14/M16_info_reveal_mantra"

# Try "Go deeper" for L2/L3 traversal (may or may not be present)
- tapOn:
    text: "Go deeper"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "screenshots/career_persona_2026_04_14/M36_whythis_L2"
- tapOn:
    text: "Go deeper"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "screenshots/career_persona_2026_04_14/M37_whythis_L3"

# Back twice to return to dashboard
- back
- back
- waitForAnimationToEnd
- takeScreenshot: "screenshots/career_persona_2026_04_14/M05_dashboard_post_info"

# Try starting the mantra runner
- tapOn:
    text: ".*Begin.*|.*Start.*|.*Sit.*"
    optional: true
    index: 0
- waitForAnimationToEnd
- takeScreenshot: "screenshots/career_persona_2026_04_14/M17_mantra_runner"
- back
- waitForAnimationToEnd

# Tabs — exercise them for coverage
- tapOn:
    text: "Notifications"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "screenshots/career_persona_2026_04_14/M_tab_notifications"

- tapOn:
    text: "Profile"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "screenshots/career_persona_2026_04_14/M_tab_profile"

- tapOn:
    text: "Menu"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "screenshots/career_persona_2026_04_14/M_tab_menu"

# Attempt grief room via menu (if visible)
- tapOn:
    text: ".*Grief.*|.*grief.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "screenshots/career_persona_2026_04_14/M46_grief_room"
- back
- waitForAnimationToEnd

# Loneliness room
- tapOn:
    text: ".*Loneliness.*|.*loneliness.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "screenshots/career_persona_2026_04_14/M47_loneliness_room"
- back
- waitForAnimationToEnd

# Final — Home tab
- tapOn:
    text: "Home"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "screenshots/career_persona_2026_04_14/M01_home_final"
