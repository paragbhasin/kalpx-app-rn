# Mitra v3 Moment 24 — Day 7 Checkpoint flow
# Validates: on day 7, cycle_transitions/day_7 renders the CheckpointDay7Block
# with intro → body (grid + reflection + decision). Tapping "Continue my path"
# calls the existing checkpoint_submit action (backend contract preserved),
# backend acknowledges, user lands on day 8 dashboard.
#
# Web parity: route_checkpoint_day_7.md + actionExecutor.ts case "checkpoint_submit".
# Pre-req: seed journey to day 7 (test+day7@kalpx.com or seed_test_journey cmd).

appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn:
    text: "Resume|Continue|My Routine|Begin"
    optional: true
- waitForAnimationToEnd

# Intro step
- assertVisible: "DAY 7"
- assertVisible:
    text: "You’ve been at this a week|been at this a week"
- tapOn: "Show me"
- waitForAnimationToEnd

# Body step
- assertVisible: "WHAT TO CARRY"
- tapOn:
    text: "What do you want to carry into next week"
    optional: true
- inputText: "keep the wednesday mantra ritual"
- hideKeyboard

# Decision (primary)
- tapOn: "Continue my path"
- waitForAnimationToEnd

# Should land on day 8 dashboard (or checkpoint_results)
- assertVisible:
    text: "Day|Mitra|Routine"
