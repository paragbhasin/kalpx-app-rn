# cross-companion-state-404.yaml
# Validates: if GET /api/mitra/companion-state/ returns 404, the slice remains
# at defaults and the app does not crash.
#
# Assumes dev harness intercepts this endpoint with a 404 response when the
# env var MAESTRO_MOCK_COMPANION_STATE_404=true is set (hook on axios in
# Networks/axios.ts — wired by test harness).
appId: com.kalpx.app
env:
  MAESTRO_MOCK_COMPANION_STATE_404: "true"
---
- launchApp
- waitForAnimationToEnd

# App must render without a crash dialog.
- assertNotVisible:
    text: ".*crashed.*|.*unexpected error.*"
    optional: true

# Navigate into a surface that would read companionState.volatility / mood.
- tapOn:
    text: "My Routine"
    optional: true
- waitForAnimationToEnd

# Defaults: volatility=0, mood=steady → no "volatile" indicator visible.
- assertNotVisible:
    text: "volatile"
    optional: true

# Log assertion: slice should NOT have dispatched a rejection beyond fetch.
- assertTrue:
    condition: ${!output.logs.contains("Unhandled Rejection in companionState")}
    optional: true
