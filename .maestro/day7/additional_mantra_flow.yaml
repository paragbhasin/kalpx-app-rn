# additional_mantra_flow — day7 additional library exercised with a MANTRA item.
# Entry: dashboard → My Routine (drawer) → Add from Library → search "Om Gam" →
# tap item → runner mounts with source=additional_library, item_type=mantra →
# complete 9 reps → return home → core triad ✓ state UNCHANGED.
#
# Assertion strategy:
# - assertVisible on the real mantra runner ("TAP" or "/9" counter) not optional
# - assertNotVisible on support CTA ("I feel calmer now") to catch source bleed
# - core mantra (Śāntākāraṃ) must NOT be the item picked — we pick "Ganapataye"
# - dashboard assertion after return: "Day 7 of 14" still present, no day advance
appId: com.kalpx.app
---
- launchApp:
    clearState: false
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Day 7 of 14"
    timeout: 20000
- takeScreenshot: "screenshots/day7_maestro/additional_mantra/01_dashboard_pre"

# Open My Routine / additional entry
- tapOn:
    text: "My Routine"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: ".*Add.*|.*Browse.*|.*Library.*|.*More Practices.*|.*\\+.*"
    index: 0
- extendedWaitUntil:
    visible: ".*Search.*|.*library.*|.*Library.*"
    timeout: 15000
- takeScreenshot: "screenshots/day7_maestro/additional_mantra/02_library_modal"

# Search for a mantra DIFFERENT from the core (Śāntākāraṃ)
- tapOn:
    id: "library-search-input"
    optional: true
- tapOn:
    text: ".*Search.*"
    optional: true
- inputText: "Ganapataye"
- hideKeyboard
- extendedWaitUntil:
    visible: ".*Ganapataye.*|.*Gam.*|.*Ganesh.*"
    timeout: 15000
- takeScreenshot: "screenshots/day7_maestro/additional_mantra/03_search_results"

- tapOn:
    text: ".*Ganapataye.*|.*Om Gam.*|.*Gam.*"
    index: 0
- waitForAnimationToEnd
- takeScreenshot: "screenshots/day7_maestro/additional_mantra/04_info_screen"

# Info → Begin Chanting → rep select → runner
- tapOn:
    text: ".*Begin Chanting.*|.*Begin.*|.*Start.*"
    index: 0
- waitForAnimationToEnd
- tapOn:
    text: "9"
    optional: true
- tapOn:
    text: "Begin"
    optional: true
- extendedWaitUntil:
    visible: ".*TAP.*|.*/9.*|.*/27.*"
    timeout: 15000
- takeScreenshot: "screenshots/day7_maestro/additional_mantra/05_runner"

# source-bleed guard: additional runner must NOT show support terminal CTA
- assertNotVisible: "I feel calmer now"
# item-identity guard: must not be the day7 core mantra
- assertNotVisible: "Śāntākāraṃ Bhujagaśayanaṃ"

- repeat:
    times: 9
    commands:
      - tapOn:
          text: "TAP"
          optional: true
      - waitForAnimationToEnd:
          timeout: 400

- tapOn:
    text: ".*Complete.*|.*Return to Mitra.*|.*Done.*"
    optional: true
- extendedWaitUntil:
    visible: "Day 7 of 14"
    timeout: 20000
- takeScreenshot: "screenshots/day7_maestro/additional_mantra/06_dashboard_post"

# Core triad MUST be unchanged (additional never marks core done).
# If core mantra row shows ✓ after this flow, that's a source-leak bug.
- assertVisible: "Day 7 of 14"
- assertVisible:
    text: ".*Śāntākāraṃ.*|.*Mantra.*"
- stopApp
