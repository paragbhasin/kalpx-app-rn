# additional_sankalp_flow — day7 additional library exercised with a SANKALP item.
# Must render the sankalp embody surface (Affirm/Hold/Commit), NOT a mantra counter.
appId: com.kalpx.app
---
- launchApp:
    clearState: false
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Day 7 of 14"
    timeout: 20000
- takeScreenshot: "screenshots/day7_maestro/additional_sankalp/01_dashboard_pre"

- tapOn:
    text: "My Routine"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: ".*Add.*|.*Browse.*|.*Library.*|.*More Practices.*|.*\\+.*"
    index: 0
- extendedWaitUntil:
    visible: ".*Search.*|.*library.*|.*Library.*"
    timeout: 15000
- takeScreenshot: "screenshots/day7_maestro/additional_sankalp/02_library_modal"

# Search for a sankalp — use a term unlikely to match core ("I rest my mind")
- tapOn:
    id: "library-search-input"
    optional: true
- tapOn:
    text: ".*Search.*"
    optional: true
- inputText: "intention"
- hideKeyboard
- extendedWaitUntil:
    visible: ".*intention.*|.*Sankalp.*|.*I choose.*|.*Today.*"
    timeout: 15000
- takeScreenshot: "screenshots/day7_maestro/additional_sankalp/03_search_results"

# Pick a sankalp result (any row tagged as sankalp). Avoid the core sankalp text.
- assertNotVisible: "Today, I rest my mind in the present"
- tapOn:
    text: ".*intention.*|.*Sankalp.*|.*I choose.*|.*I commit.*"
    index: 0
- waitForAnimationToEnd
- takeScreenshot: "screenshots/day7_maestro/additional_sankalp/04_info_screen"

- tapOn:
    text: ".*Begin.*|.*Start.*|.*Embody.*|.*Affirm.*"
    index: 0
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: ".*Affirm.*|.*Embody.*|.*Hold.*|.*Commit.*"
    timeout: 15000
- takeScreenshot: "screenshots/day7_maestro/additional_sankalp/05_runner"

# Surface-correctness guard: sankalp runner, not mantra counter
- assertNotVisible: "108"
- assertNotVisible: "mantra-bead-tap"
- assertNotVisible: "I feel calmer now"

- longPressOn:
    text: ".*Hold.*|.*Commit.*|.*Affirm.*"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- tapOn:
    text: ".*Complete.*|.*Return to Mitra.*|.*Done.*"
    optional: true
- extendedWaitUntil:
    visible: "Day 7 of 14"
    timeout: 20000
- takeScreenshot: "screenshots/day7_maestro/additional_sankalp/06_dashboard_post"

- assertVisible: "Day 7 of 14"
# Core sankalp must still exist as its own row
- assertVisible:
    text: ".*Today, I rest my mind.*|.*Sankalp.*|.*Intention.*"
- stopApp
