# morning_core_flow — day7 completes the full dashboard triad (mantra/sankalp/practice).
# CRITICAL: assertVisible on real content (Śāntākāraṃ) catches silent no-op taps.
# Tokens pre-injected into AsyncStorage by runner; useBootstrapAuth hydrates Redux.
appId: com.kalpx.app
---
- launchApp:
    clearState: false
- waitForAnimationToEnd
# Stabilizer: RN bootstrap + Redux hydration via useBootstrapAuth can take ~3-5s.
# Without this, the first viewHierarchy query can 500 with kAXErrorInvalidUIElement.
- waitForAnimationToEnd:
    timeout: 6000
- extendedWaitUntil:
    visible: "Day 7 of 14"
    timeout: 25000
- takeScreenshot: "screenshots/day7_maestro/morning_core/01_dashboard_pre"

# ---- MANTRA ----
- tapOn:
    text: ".*Mantra.*|.*Śāntākāraṃ.*|.*chant.*"
    index: 0
- extendedWaitUntil:
    visible: ".*Śāntākāraṃ.*|.*Begin Chanting.*|.*Choose.*Chant.*"
    timeout: 15000
- takeScreenshot: "screenshots/day7_maestro/morning_core/02_mantra_info"

- tapOn:
    text: "Begin Chanting"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "9"
    optional: true
- tapOn:
    text: "Begin"
    optional: true
- extendedWaitUntil:
    visible: ".*TAP.*|.*tap.*bead.*|.*/9.*|.*/27.*"
    timeout: 15000
- takeScreenshot: "screenshots/day7_maestro/morning_core/03_mantra_runner"

- repeat:
    times: 27
    commands:
      - tapOn:
          text: "TAP"
          optional: true
      - waitForAnimationToEnd:
          timeout: 400

- tapOn:
    text: ".*Complete.*|.*Return to Mitra Home.*|.*Done.*"
    optional: true
- extendedWaitUntil:
    visible: "Day 7 of 14"
    timeout: 20000
- takeScreenshot: "screenshots/day7_maestro/morning_core/04_dashboard_post_mantra"

# ---- SANKALP ----
- tapOn:
    text: ".*Sankalp.*|.*Intention.*|.*Vow.*"
    index: 0
- extendedWaitUntil:
    visible: ".*Sankalp.*|.*Hold.*|.*Begin.*"
    timeout: 15000
- takeScreenshot: "screenshots/day7_maestro/morning_core/05_sankalp_info"

- tapOn:
    text: ".*Begin.*|.*Hold.*|.*Start.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "screenshots/day7_maestro/morning_core/06_sankalp_runner"

# Long-press sankalp hold button if present
- longPressOn:
    text: ".*Hold.*"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- tapOn:
    text: ".*Complete.*|.*Return to Mitra Home.*|.*Done.*"
    optional: true
- extendedWaitUntil:
    visible: "Day 7 of 14"
    timeout: 20000
- takeScreenshot: "screenshots/day7_maestro/morning_core/07_dashboard_post_sankalp"

# ---- PRACTICE ----
- tapOn:
    text: ".*Practice.*|.*Pranayama.*|.*Breath.*"
    index: 0
- extendedWaitUntil:
    visible: ".*Practice.*|.*Begin.*|.*Start.*"
    timeout: 15000
- takeScreenshot: "screenshots/day7_maestro/morning_core/08_practice_info"

- tapOn:
    text: ".*Begin.*|.*Start.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "screenshots/day7_maestro/morning_core/09_practice_runner"

- tapOn:
    text: ".*Complete.*|.*Return to Mitra Home.*|.*Done.*|.*Finish.*"
    optional: true
- extendedWaitUntil:
    visible: "Day 7 of 14"
    timeout: 20000
- takeScreenshot: "screenshots/day7_maestro/morning_core/10_dashboard_all_done"

# Final assertion: still on day 7 (not advanced), dashboard reachable
- assertVisible: "Day 7 of 14"

- stopApp
