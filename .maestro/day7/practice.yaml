appId: com.kalpx.app
name: practice_flow
---
- killApp: com.kalpx.app
- launchApp:
    appId: com.kalpx.app
    clearState: false
- extendedWaitUntil:
    visible: "Today"
    timeout: 20000
- takeScreenshot: ~/kalpx-app-rn/screenshots/day7_maestro/practice/01_dashboard
- tapOn:
    text: "Prithvi Mudra"
- extendedWaitUntil:
    visible: "Step|Next|Begin|Prithvi"
    timeout: 15000
- takeScreenshot: ~/kalpx-app-rn/screenshots/day7_maestro/practice/02_runner_entry
- assertVisible: "Prithvi|Step"
# Step through: up to 8 Next taps (will silently pass if runner auto-advances)
- repeat:
    times: 8
    commands:
      - runFlow:
          when:
            visible: "Next"
          commands:
            - tapOn: "Next"
            - waitForAnimationToEnd:
                timeout: 2000
- takeScreenshot: ~/kalpx-app-rn/screenshots/day7_maestro/practice/03_after_steps
- extendedWaitUntil:
    visible: "Kept|Complete|Return"
    timeout: 20000
- assertVisible: "Kept|Complete"
- takeScreenshot: ~/kalpx-app-rn/screenshots/day7_maestro/practice/04_completion
- tapOn:
    text: "Return to Mitra"
- extendedWaitUntil:
    visible: "Today"
    timeout: 15000
- takeScreenshot: ~/kalpx-app-rn/screenshots/day7_maestro/practice/05_dashboard_return
- assertVisible: ".*✓.*|.*Kept.*"
- stopApp
