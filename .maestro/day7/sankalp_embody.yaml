appId: com.kalpx.app
name: sankalp_embody_flow
---
- killApp: com.kalpx.app
- launchApp:
    appId: com.kalpx.app
    clearState: false
- extendedWaitUntil:
    visible: "Today"
    timeout: 20000
- takeScreenshot: ~/kalpx-app-rn/screenshots/day7_maestro/sankalp_embody/01_dashboard
- tapOn:
    text: "Today, I rest my mind in the present"
- extendedWaitUntil:
    visible: "Sankalp|Affirm|Embody|Hold|Commit"
    timeout: 15000
- takeScreenshot: ~/kalpx-app-rn/screenshots/day7_maestro/sankalp_embody/02_surface
# BUG CHECK: if this is a mantra counter instead of sankalp surface, fail.
- assertNotVisible: "108"
- assertNotVisible: "mantra-bead-tap"
- assertVisible:
    text: "Affirm|Embody|Hold|Commit|I rest my mind"
- tapOn:
    text: "Affirm|Embody|Hold|Commit"
- extendedWaitUntil:
    visible: "Kept|Return|Complete"
    timeout: 15000
- takeScreenshot: ~/kalpx-app-rn/screenshots/day7_maestro/sankalp_embody/03_completion
- tapOn:
    text: "Return to Mitra"
- extendedWaitUntil:
    visible: "Today"
    timeout: 15000
- takeScreenshot: ~/kalpx-app-rn/screenshots/day7_maestro/sankalp_embody/04_dashboard_return
- assertVisible: ".*✓.*|.*Kept.*"
- stopApp
