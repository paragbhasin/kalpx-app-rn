# support_practice_flow — support lane recommends a breath/PRACTICE as recovery.
# Most common support routing (grief room / loneliness / overwhelm → pranayama).
appId: com.kalpx.app
---
- launchApp:
    clearState: false
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Day 7 of 14"
    timeout: 20000
- takeScreenshot: "screenshots/day7_maestro/support_practice/01_dashboard"

- tapOn:
    text: ".*How are you.*|.*Share.*|.*check.*in.*|.*Trigger.*"
    index: 0
- waitForAnimationToEnd
- tapOn:
    text: ".*[Aa]nxious.*|.*[Oo]verwhelm.*|.*[Aa]gitated.*|.*[Dd]rained.*"
    index: 0
- tapOn:
    text: ".*Next.*|.*Continue.*|.*Share.*|.*Submit.*"
    optional: true
- extendedWaitUntil:
    visible: ".*breath.*|.*Pranayama.*|.*practice.*|.*try.*|.*here.*"
    timeout: 20000
- takeScreenshot: "screenshots/day7_maestro/support_practice/02_advice"

- assertVisible:
    text: ".*breath.*|.*Pranayama.*|.*Practice.*|.*Anulom.*|.*Bhramari.*|.*Nadi.*"

- tapOn:
    text: ".*breath.*|.*Pranayama.*|.*Practice.*|.*Anulom.*|.*Bhramari.*|.*Nadi.*"
    index: 0
- waitForAnimationToEnd
- tapOn:
    text: ".*Begin.*|.*Start.*|.*Try.*"
    optional: true
- extendedWaitUntil:
    visible: "Step|Next|Inhale|Exhale|Begin|breath"
    timeout: 20000
- takeScreenshot: "screenshots/day7_maestro/support_practice/03_runner"

# Surface-correctness: practice step runner, not mantra counter
- assertNotVisible: "108"
- assertNotVisible: "mantra-bead-tap"

- repeat:
    times: 8
    commands:
      - runFlow:
          when:
            visible: "Next"
          commands:
            - tapOn: "Next"
            - waitForAnimationToEnd:
                timeout: 2000

- tapOn:
    text: ".*Complete.*|.*Done.*|.*Finish.*"
    optional: true
- extendedWaitUntil:
    visible: "I feel calmer now"
    timeout: 20000
- takeScreenshot: "screenshots/day7_maestro/support_practice/04_calmer_cta"

- assertVisible: "I feel calmer now"
- tapOn:
    text: "I feel calmer now"
- extendedWaitUntil:
    visible: "Day 7 of 14"
    timeout: 20000
- takeScreenshot: "screenshots/day7_maestro/support_practice/05_dashboard_clean"

- assertVisible: "Day 7 of 14"
- assertNotVisible: "I feel calmer now"
- assertNotVisible: ".*[Dd]rained.*"
- assertNotVisible: ".*[Aa]nxious.*"
- stopApp
