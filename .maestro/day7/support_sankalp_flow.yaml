# support_sankalp_flow — support lane recommends a SANKALP/affirmation as recovery.
# Runner must render sankalp embody surface (Affirm/Hold/Commit), NOT mantra counter.
# Known product risk: support lane may default to mantra/practice; if no sankalp
# advice card appears, we note it as a product gap (support→sankalp unreachable).
appId: com.kalpx.app
---
- launchApp:
    clearState: false
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Day 7 of 14"
    timeout: 20000
- takeScreenshot: "screenshots/day7_maestro/support_sankalp/01_dashboard"

# Enter composer path (more likely to surface sankalp options than direct trigger)
- tapOn:
    text: ".*How are you.*|.*Share.*|.*check.*in.*|.*Trigger.*"
    index: 0
- waitForAnimationToEnd
- tapOn:
    text: ".*[Ll]ost.*|.*[Dd]oubt.*|.*[Ss]cattered.*|.*[Dd]rained.*|.*[Aa]nxious.*"
    index: 0
- tapOn:
    text: ".*Next.*|.*Continue.*|.*Share.*|.*Submit.*"
    optional: true
- extendedWaitUntil:
    visible: ".*here.*|.*try.*|.*suggest.*|.*Sankalp.*|.*intention.*|.*affirm.*|.*practice.*|.*mantra.*"
    timeout: 20000
- takeScreenshot: "screenshots/day7_maestro/support_sankalp/02_advice"

# Product-reality guard: if no sankalp/affirmation card surfaces, the flow will
# fail on the next assertVisible — that's the honest signal (support→sankalp gap).
- assertVisible:
    text: ".*Sankalp.*|.*Intention.*|.*Affirm.*|.*commit.*|.*I choose.*|.*I rest.*"

- tapOn:
    text: ".*Sankalp.*|.*Intention.*|.*Affirm.*|.*I choose.*|.*I commit.*"
    index: 0
- waitForAnimationToEnd
- tapOn:
    text: ".*Begin.*|.*Start.*|.*Embody.*|.*Affirm.*"
    optional: true
- extendedWaitUntil:
    visible: ".*Affirm.*|.*Embody.*|.*Hold.*|.*Commit.*"
    timeout: 20000
- takeScreenshot: "screenshots/day7_maestro/support_sankalp/03_runner"

# Surface-correctness: sankalp embody, NOT a mantra counter
- assertNotVisible: "108"
- assertNotVisible: "mantra-bead-tap"
- assertNotVisible: "/9"
- assertNotVisible: "/27"

- longPressOn:
    text: ".*Hold.*|.*Commit.*|.*Affirm.*"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- tapOn:
    text: ".*Complete.*|.*Done.*|.*Finish.*"
    optional: true
- extendedWaitUntil:
    visible: "I feel calmer now"
    timeout: 20000
- takeScreenshot: "screenshots/day7_maestro/support_sankalp/04_calmer_cta"

- assertVisible: "I feel calmer now"
- tapOn:
    text: "I feel calmer now"
- extendedWaitUntil:
    visible: "Day 7 of 14"
    timeout: 20000
- takeScreenshot: "screenshots/day7_maestro/support_sankalp/05_dashboard_clean"

- assertVisible: "Day 7 of 14"
- assertNotVisible: "I feel calmer now"
- assertNotVisible: ".*[Dd]rained.*"
- stopApp
