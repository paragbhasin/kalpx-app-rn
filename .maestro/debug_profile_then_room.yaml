appId: com.kalpx.app
---
# Cancel modal (left open from prior debug flow)
- runFlow:
    when:
      visible:
        id: "step_modal_body"
    commands:
      - tapOn:
          id: "step_modal_cancel"
      - waitForAnimationToEnd

# Tap Profile tab (simulates what login_preserve_session.yaml does)
- tapOn:
    text: "Profile, tab, 3 of 4"
- waitForAnimationToEnd

# Return to Home tab
- tapOn:
    text: "Home, tab, 1 of 4"
- waitForAnimationToEnd

# Navigate to day-active if needed
- runFlow:
    when:
      notVisible:
        id: "quick_support_more_ways"
    commands:
      - tapOn:
          id: "home_continue_cta"
          optional: true
      - waitForAnimationToEnd

# Open room
- scrollUntilVisible:
    element:
      id: "quick_support_more_ways"
    direction: DOWN
    timeout: 8000
- waitForAnimationToEnd
- tapOn:
    id: "quick_support_more_ways"
- extendedWaitUntil:
    visible:
      id: "room_entry_sheet_header"
    timeout: 6000
- tapOn:
    text: "I feel alone"
- waitForAnimationToEnd

# Life context picker guard
- runFlow:
    when:
      visible:
        id: "life_context_picker_sheet"
    commands:
      - tapOn:
          id: "life_context_picker_skip"
      - waitForAnimationToEnd

# Check carry pill
- extendedWaitUntil:
    visible:
      id: "room_renderer_room_connection"
    timeout: 10000
- extendedWaitUntil:
    visible:
      text: "Name someone who matters"
    timeout: 10000
- tapOn:
    text: "Name someone who matters"
- assertVisible:
    text: "Who is close to your heart right now?"
