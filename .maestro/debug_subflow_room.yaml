appId: com.kalpx.app
---
# Cancel any open modal
- runFlow:
    when:
      visible:
        id: "step_modal_body"
    commands:
      - tapOn:
          id: "step_modal_cancel"
      - waitForAnimationToEnd

# Go Home (no Profile navigation)
- tapOn:
    text: "Home, tab, 1 of 4"
- waitForAnimationToEnd

# Use subflows (same as flow 61)
- runFlow:
    file: navigate_to_day_active.yaml

- runFlow:
    file: open_room_entry_sheet.yaml
    env:
      ROOM_LABEL: "I feel alone"

# Life context picker guard
- runFlow:
    when:
      visible:
        id: "life_context_picker_sheet"
    commands:
      - tapOn:
          id: "life_context_picker_skip"
      - waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "room_renderer_room_connection"
    timeout: 10000
- extendedWaitUntil:
    visible:
      text: "Name someone who matters"
    timeout: 10000
- tapOn:
    text: "Name someone who matters"
- assertVisible:
    text: "Who is close to your heart right now?"
