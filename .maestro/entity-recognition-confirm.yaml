# Week 6 — Moment 29 Entity Recognition confirm
# Validates: overlay opens with entity_recognition_pending seeded ->
# "Yes that's them" dispatches confirm_entity -> PATCH /entities/{id}/ fires
# -> overlay dismisses -> pending cleared.
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn:
    text: "My Routine"
    optional: true
- waitForAnimationToEnd

# Entity overlay (triggered automatically when eligible).
- assertVisible:
    text: "Have I got this right?|QUICK CHECK"
    optional: true

- tapOn:
    text: "Yes that's them"
    optional: true
- waitForAnimationToEnd

- assertNotVisible:
    text: "Have I got this right?"
