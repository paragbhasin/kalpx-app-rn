# Mitra v3 Moment 34 — Evening Reflection flow
# Validates: dashboard → reflection/evening route → 3-chip + optional text →
# submit → ack beat → auto-return to dashboard. POST to gratitude-ledger fires
# (signal_type=evening_reflection); 404-tolerant (ack still renders).
#
# Web parity: route_reflection_evening.md §3, §6.
# REG-015: evening_reflection_draft is cleared after submit (assert no stale
# text on next open).

appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

# Enter evening reflection (deep link OR nav)
- runFlow:
    when:
      visible: "Evening reflection|How did today land"
    commands:
      - tapOn: "Evening reflection"

- assertVisible: "How did today land?"
- assertVisible: "Steady"
- assertVisible: "Mixed"
- assertVisible: "Hard"

- tapOn: "Mixed"
- waitForAnimationToEnd

- tapOn:
    text: "One line, if anything wants naming."
    optional: true
- inputText: "work pressed in, but i kept the mantra"
- hideKeyboard

- tapOn: "Set it down"
- waitForAnimationToEnd

# Ack beat
- assertVisible:
    text: "Thank you for showing up"

# Auto-return to dashboard within a few seconds
- extendedWaitUntil:
    visible: "Day|My Routine|Mitra"
    timeout: 6000
