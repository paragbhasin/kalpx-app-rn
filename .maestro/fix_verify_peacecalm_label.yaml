# Fix 1+3+7 verification: peacecalm active user dashboard
# Checks: "Peace & Calm" or "Support Path" visible; "Peacecalm" raw string absent
# Persona: test+peacecalm@kalpx.com (day 3, category=peacecalm)
appId: com.kalpx.app
env:
  EMAIL: test+peacecalm@kalpx.com
  PASSWORD: Test1234!
---
- runFlow:
    file: login.yaml
    env:
      EMAIL: ${EMAIL}
      PASSWORD: ${PASSWORD}
- waitForAnimationToEnd
- waitForAnimationToEnd

# Assert the raw un-humanized string is NOT shown
- assertNotVisible:
    text: "Peacecalm"
    optional: true

# The dashboard should show path label (Support Path) or focus phrase (Peace & Calm)
# Either surface confirms Fix 1+3 are working.
- assertVisible:
    text: "Support Path|Peace & Calm|peace.*calm"
    optional: true
