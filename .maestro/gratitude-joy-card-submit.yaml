# Week 7 — Gratitude joy-signal card submission.
# Spec: embedded_gratitude_joy_card.md.
# Card renders on dashboard when joy_signal is set; after submit, card
# collapses and signal is cleared.
appId: com.kalpx.app
---
- launchApp:
    arguments:
      joy_signal_fixture: true
- waitForAnimationToEnd

- tapOn:
    text: "My Routine"
    optional: true
- waitForAnimationToEnd

- assertVisible:
    id: "gratitude-joy-card"
    optional: true
- assertVisible:
    text: "NOTICED"
    optional: true

- tapOn:
    id: "gratitude-joy-card"
    optional: true
- inputText: "a quiet coffee with my father"

- tapOn:
    text: "Hold this"
    optional: true
- waitForAnimationToEnd

# Card collapses after submit.
- assertNotVisible:
    id: "gratitude-joy-card"
    optional: true
