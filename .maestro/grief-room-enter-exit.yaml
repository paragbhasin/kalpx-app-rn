# Week 7 — Grief room enter / exit with REG-015 isolation.
# Spec: route_support_grief.md.
# Assert: runner_* untouched, no timer on screen, no completion event,
# exit link visible and restores dashboard.
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn:
    text: "My Routine"
    optional: true
- waitForAnimationToEnd

# Enter grief from whichever surface exposes it (support chip / dashboard link).
- tapOn:
    text: ".*support/grief.*|.*Grief.*"
    optional: true
- waitForAnimationToEnd

# Room renders: presence line + Sit with me CTA + exit link.
- assertVisible:
    text: ".*I'm here.*|.*No rush.*"
    optional: true
- assertVisible:
    text: "Sit with me"
    optional: true
- assertVisible:
    text: "I'll come back to this"
    optional: true

# Assert NO timer/counter artifacts (REG-015 / spec tone).
- assertNotVisible:
    text: ".*[0-9]+:[0-9]+.*"
    optional: true
- assertNotVisible:
    text: ".*reps.*|.*rounds.*|.*complete.*"
    optional: true

# Sit stays in room — no navigation.
- tapOn:
    text: "Sit with me"
    optional: true
- waitForAnimationToEnd
- assertVisible:
    text: "I'll come back to this"
    optional: true

# Exit → back to dashboard.
- tapOn:
    text: "I'll come back to this"
    optional: true
- waitForAnimationToEnd

- assertVisible:
    text: ".*Day.*|.*Mantra.*|.*Practice.*"
    optional: true
