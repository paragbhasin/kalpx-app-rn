# Week 7 — Grief room under prefersReducedMotion=true.
# Spec: route_support_grief.md §5 (accessibility).
# When reduced_motion_preference is true, the breath orb renders STATIC —
# the animated testID `grief-breath-orb-animated` must NOT appear.
appId: com.kalpx.app
---
# Note: prefersReducedMotion is toggled in OS accessibility settings. Test
# harness should pre-set reduced_motion_preference=true via launch args.
- launchApp:
    arguments:
      reduced_motion_preference: true
- waitForAnimationToEnd

- tapOn:
    text: ".*support/grief.*|.*Grief.*"
    optional: true
- waitForAnimationToEnd

- assertVisible:
    id: "grief-breath-guide"
    optional: true

# The animated variant must be ABSENT under reduced motion.
- assertNotVisible:
    id: "grief-breath-orb-animated"
    optional: true

# Exit link still reachable.
- assertVisible:
    text: "I'll come back to this"
    optional: true
- tapOn:
    text: "I'll come back to this"
    optional: true
