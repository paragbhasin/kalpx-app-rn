# Flow: log in as a test persona via the real login UI.
#
# RELIABLE LOGIN — key learnings baked in:
#
#   1. NO clearState / clearKeychain — those trigger the Expo dev menu via
#      the Maestro driver shake gesture. The dev menu opens before the YAML
#      starts, so no guards inside the YAML can catch it.
#
#   2. Navigate Home → Menu → Log In to get a FRESHLY MOUNTED login screen.
#      React Native unmounts the screen on navigate-away, so Formik state
#      resets and the fields are empty on re-entry. inputText then types
#      into an empty field (no append problem).
#
#   3. NO hideKeyboard — this app uses a custom keyboard dismiss that Maestro
#      cannot trigger. Just tap the next field; focus moves and keyboard follows.
#
#   4. LOGIN button uses exact regex "^LOGIN$" to avoid fuzzy-matching
#      "Login With Google" (which sits above it and has "login" in the label).
#
#   5. Conditional logout: if a previous test left the user logged in, the
#      drawer shows "Log Out" not "Log In". The runFlow guard below logs out
#      first so the drawer always reaches "Log In".
#
# Usage (standalone, default persona test+day3@kalpx.com):
#   maestro test .maestro/login.yaml
#
# Usage (override persona via env):
#   maestro test -e EMAIL=test+wb@kalpx.com \
#                -e PASSWORD=Test1234! \
#                .maestro/login.yaml
#
# Usage (as a subflow in a multi-case runner):
#   - runFlow:
#       file: login.yaml
#       env:
#         EMAIL: test+wb@kalpx.com
#         PASSWORD: Test1234!
#   - waitForAnimationToEnd
#
# Pre-condition: app is running, Expo dev menu is NOT open, Metro is connected.
# If the dev menu is open, dismiss it manually (tap Dismiss or Reload) before
# running this flow.
#
# Notes:
# - Test users must have soft_verified=True on dev backend.
# - Passwords for all test personas are Test1234! per seed_test_journey.py.
# - reCAPTCHA v3 is bypassed in __DEV__ builds: LoginScreen.tsx:512 calls
#   handleRecaptchaToken("dev-bypass-token") directly. No Google dialog appears.

appId: com.kalpx.app
env:
  EMAIL: test+day3@kalpx.com
  PASSWORD: Test1234!
---

# ── Step 0a: escape Login screen if already there ────────────────────────
# If a prior test left the app stuck on the Login screen the tab bar is
# inaccessible. Tap "Skip" (bottom link) to return to guest home first.
- runFlow:
    when:
      visible: "Connect to Your Roots"
    commands:
      - tapOn:
          text: "Skip"
      - waitForAnimationToEnd

# ── Step 0b: dismiss any open drawer ─────────────────────────────────────
# Unconditional: tap the left-edge overlay area (15%, 50%).
# If a drawer is open (slides in from right), this taps the dimmed backdrop
# and closes it. If no drawer is open, this taps the Home screen content
# area which is harmless.
- tapOn:
    point: "15%, 50%"
- waitForAnimationToEnd

# ── Step 0c: land on Home tab ────────────────────────────────────────────
- tapOn:
    text: "Home, tab, 1 of 4"
- waitForAnimationToEnd

# ── Step 1: open the Menu drawer ─────────────────────────────────────────
- tapOn:
    text: "Menu, tab, 4 of 4"
- waitForAnimationToEnd

# ── Step 2: log out if a previous test left a session open ───────────────
# Use testID (drawer_logout_btn) — the TextComponent wrapping the Logout
# text is not accessible to Maestro's text matcher.
- runFlow:
    when:
      visible:
        id: "drawer_logout_btn"
    commands:
      - tapOn:
          id: "drawer_logout_btn"
      - waitForAnimationToEnd
      # Drawer stays open after logout and now shows Log In — no re-open needed

# ── Step 3: navigate to Login screen ─────────────────────────────────────
# "Log In" button (testID drawer_login_btn) is now guaranteed visible.
- tapOn:
    id: "drawer_login_btn"
- waitForAnimationToEnd

# ── Step 4: confirm we landed on LoginScreen.tsx ─────────────────────────
- assertVisible: "Connect to Your Roots"

# ── Step 5: fill credentials ─────────────────────────────────────────────
# Formik can retain state if the Login screen was not freshly unmounted.
# To clear reliably:
#   1. Tap label/placeholder to focus the field (cursor at start)
#   2. Tap far-right of field (85%) to move cursor past any existing text
#   3. eraseText: 50 deletes leftward from cursor (clears the field)
#   4. inputText types into the now-empty field
- tapOn:
    text: "Username"
- tapOn:
    point: "85%, 43%"
- eraseText: 50
- inputText: ${EMAIL}

- tapOn:
    text: "Password"
- tapOn:
    point: "85%, 51%"
- eraseText: 50
- inputText: ${PASSWORD}

# ── Step 6: submit ───────────────────────────────────────────────────────
# Exact regex avoids fuzzy match hitting "Login With Google".
# In __DEV__, handleRecaptchaToken("dev-bypass-token") fires immediately —
# no Google dialog, no reCAPTCHA network call.
- tapOn:
    text: "^LOGIN$"

# ── Step 7: wait for the overlay to clear ────────────────────────────────
- extendedWaitUntil:
    notVisible: "Signing in..."
    timeout: 30000

# ── Step 8: dismiss the one-shot location-confirm overlay if present ─────
- tapOn:
    text: "Not now|Maybe later|Skip|Cancel"
    optional: true

# ── Step 9: assert login succeeded ───────────────────────────────────────
# Positive assertion: guest home never shows these; logged-in home always does.
# "notVisible: Sign in..." was a false-positive — it passed even on failed login.
- extendedWaitUntil:
    visible:
      text: "My Routine|Day|Welcome back|welcome back"
    timeout: 15000
