# Subflow: login_preserve_session
# Logs in as the specified persona WITHOUT logging out first if already logged in.
# This preserves the active session, which is required for room repeat-state carry
# pills (connection_named, growth_journal, joy_named, release_named) — after
# logout+re-login the room renders in cold-start mode and carry actions are absent.
#
# IMPORTANT: does NOT tap the Profile tab or open the Menu drawer when already logged in.
# Profile tab navigation triggers a Profile API call that causes a brief auth state flux,
# making the subsequent room render fetch fail and return the buildExitOnlyFallback
# envelope (only a "Return" exit action, no carry chips).
#
# Login state detection: "Connect to Your Roots" screen visibility only.
#   "Connect to Your Roots" visible → on Login screen → full login via Menu drawer.
#   "Connect to Your Roots" not visible → already in main app, logged in → Home tab only.
#
# Usage:
#   - runFlow:
#       file: login_preserve_session.yaml
#       env:
#         EMAIL: test+day3@kalpx.com
#         PASSWORD: Test1234!
appId: com.kalpx.app
env:
  EMAIL: test+day3@kalpx.com
  PASSWORD: Test1234!
---

# ── Step 1: if on Login screen, do full login via Menu drawer ─────────────────
# Only runs when "Connect to Your Roots" is visible (logged-out state).
# Does NOT tap Profile tab — Profile nav causes room render failure on subsequent open.
- runFlow:
    when:
      visible: "Connect to Your Roots"
    commands:
      - tapOn:
          text: "Home, tab, 1 of 4"
      - waitForAnimationToEnd
      - tapOn:
          text: "Menu, tab, 4 of 4"
      - waitForAnimationToEnd
      - extendedWaitUntil:
          visible:
            id: "drawer_login_btn"
          timeout: 5000
      - tapOn:
          id: "drawer_login_btn"
      - waitForAnimationToEnd
      - assertVisible: "Connect to Your Roots"
      - tapOn:
          id: "login_email_input"
      - eraseText: 100
      - inputText: ${EMAIL}
      - tapOn:
          id: "login_password_input"
      - eraseText: 100
      - inputText: ${PASSWORD}
      - tapOn:
          point: "50%, 10%"
      - waitForAnimationToEnd
      - tapOn:
          text: "^LOGIN$"
      - extendedWaitUntil:
          notVisible: "Signing in..."
          timeout: 30000
      - tapOn:
          text: "Not now|Maybe later|Skip|Cancel"
          optional: true
      - extendedWaitUntil:
          visible:
            text: "Home, tab, 1 of 4"
          timeout: 45000

# ── Step 2: land on Home tab root ────────────────────────────────────────────
# Single tap: switches to Home tab if on another tab, or is a no-op if already there.
# A second tap on the active Home tab triggers a home-screen re-fetch that resets to
# render_home state, causing the next room render to be cold-start (carry chips absent).
# One tap is sufficient — any pushed room screen is handled by per-flow back-navigation.
- tapOn:
    text: "Home, tab, 1 of 4"
- waitForAnimationToEnd
