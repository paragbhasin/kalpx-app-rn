# Week 3 — Mantra Runner (Moment 17) full completion
# Spec: route_practice_mantra_runner.md
# Regression guards: REG-001 (no circular loop on exit),
#   REG-003 (runner_* cleared by completion_return unmount),
#   REG-015 (source=core logged, not inherited from another flow)
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

# Enter via dashboard triad (core path -> source=core)
- tapOn: "My Routine"
- waitForAnimationToEnd

- tapOn:
    text: "Mantra"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Begin Chanting"
    optional: true
- waitForAnimationToEnd

# Rep selection — choose 108 (default per spec)
- tapOn:
    text: "108"
    optional: true
- tapOn:
    text: "Begin"
    optional: true
- waitForAnimationToEnd

# Immersive runner — should see count 0 and of 108
- assertVisible:
    text: "of 108"
    optional: true

# 108 taps through click-through. Use repeat to drive the MantraRunnerDisplay
# Pressable. Tap anywhere inside the screen center.
- repeat:
    times: 108
    commands:
      - tapOn:
          point: "50%,50%"
      - waitForAnimationToEnd:
          timeout: 200

# Completion return transient should render with the mantra variant message
- assertVisible:
    text: "108 in. Kept."
    timeout: 4000

# Primary CTA present, 44x44-reachable (REG-016)
- assertVisible: "Return to Mitra Home"

- tapOn: "Return to Mitra Home"
- waitForAnimationToEnd

# Back on dashboard, runner_active_item cleared (REG-003): the dashboard
# should NOT show any active-runner indicator.
- assertVisible:
    text: ".*Routine.*|.*Today.*"
    optional: true
