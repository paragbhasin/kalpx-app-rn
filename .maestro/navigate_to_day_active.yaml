# Subflow: navigate_to_day_active
# Called at the start of room flows to ensure we're on the day-active screen.
# After login, test+day3 shows the welcome-back (render_home) screen which does NOT
# have quick_support_more_ways. This subflow taps home_continue_cta if needed.
# Uses extendedWaitUntil instead of waitForAnimationToEnd so we block until the
# backend-driven day_active content actually loads (not just the animation).
appId: com.kalpx.app
---
- runFlow:
    when:
      notVisible:
        id: "quick_support_more_ways"
    commands:
      - tapOn:
          id: "home_continue_cta"
          optional: true
      - extendedWaitUntil:
          visible:
            id: "quick_support_more_ways"
          timeout: 15000
