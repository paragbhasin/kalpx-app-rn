# Phase B — Welcome Back Triad Diagnostic
#
# Verifies that after tapping Continue on the welcome-back surface, the
# resulting daily_view carries the prior cycle's full triad (title + audio),
# not empty items. This catches the reuse_triad=False bug where seed personas
# without transition_type="continue_same" got an empty triad.
#
# Pre-req persona: test+welcomeback@kalpx.com
#   - journey 3816: completed 7 days ago, transition_type=continue_same
#   - additional items: sitali + abhyanga (both source=additional_recommended)
#   - triad: mantra.anahata_bija / forgive_one / practice.anahata_humming
#
# STOP criteria: any step failure = Phase B FAIL → full execution stops.

appId: com.kalpx.app
---
- runFlow:
    file: login.yaml
    env:
      EMAIL: test+welcomeback@kalpx.com
      PASSWORD: Test1234!

- waitForAnimationToEnd

# ── Phase B-1: Welcome Back surface must render ──────────────────────────
# gap_days=7 → "medium" tier → shows WelcomeBack block with headline copy
- assertVisible:
    text: "Welcome back|welcome back"
- assertVisible:
    text: "Continue|Your Path|Spiritual"
    optional: true

- takeScreenshot: phase_b_01_welcome_back_surface

# ── Phase B-2: Tap Continue ──────────────────────────────────────────────
- tapOn:
    text: "Continue"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "Day|Mitra|My Routine"
    timeout: 20000

- takeScreenshot: phase_b_02_after_continue

# ── Phase B-3: Triad items must have real titles (not empty) ─────────────
# The key diagnostic: if triad reuse worked, mantra title "Anahata (Heart
# Chakra)" and practice title "Anahata Humming" must both appear on screen.
# If reuse failed, the home shows blank rows or no items.
- scrollUntilVisible:
    element:
      text: "Anahata|Humming|forgive"
    direction: DOWN
    timeout: 15000
- assertVisible:
    text: "Anahata|Humming|forgive"

- takeScreenshot: phase_b_03_triad_visible

# ── Phase B-4: Additional items carried forward ──────────────────────────
# additional_items 2 from seed (sitali + abhyanga, source=additional_recommended)
# should appear in the ADDITIONAL PRACTICES section after carry.
- scrollUntilVisible:
    element:
      text: "Sitali|Abhyanga|ADDITIONAL"
    direction: DOWN
    timeout: 10000
    optional: true
- assertVisible:
    text: "Sitali|Abhyanga|ADDITIONAL"
    optional: true

- takeScreenshot: phase_b_04_additional_items

# ── Phase B-5: Day number is Day 1 of new cycle (not Day 15) ────────────
- assertVisible:
    text: "Day 1"
