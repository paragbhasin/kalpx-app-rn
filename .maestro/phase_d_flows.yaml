# Phase D — FE Rendered-Surface Verification
# All 8 cases. Each uses login.yaml subflow for clean state.
# Personas: all soft_verified=True, password=Test1234!

appId: com.kalpx.app
---

# ════════════════════════════════════════════════════════
# CASE 1: Welcome Back → Continue
# ════════════════════════════════════════════════════════
- runFlow:
    file: login.yaml
    env:
      EMAIL: test+wb@kalpx.com
      PASSWORD: Test1234!

- waitForAnimationToEnd

# Welcome Back surface must render with headline + chips
- assertVisible:
    text: "Welcome back|welcome back"
- takeScreenshot: d_case1_01_wb_surface_top

- scrollUntilVisible:
    element:
      text: "Continue|Anahata|forgive|Sitali|Abhyanga"
    direction: DOWN
    timeout: 10000
- takeScreenshot: d_case1_02_wb_surface_bottom

# Tap Continue
- tapOn:
    text: "Continue"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "Day|Mitra|My Routine"
    timeout: 20000
- takeScreenshot: d_case1_03_daily_view_top

# Triad titles must be present (not blank)
- scrollUntilVisible:
    element:
      text: "Anahata|Humming|forgive"
    direction: DOWN
    timeout: 15000
- assertVisible:
    text: "Anahata|Humming|forgive"
- takeScreenshot: d_case1_04_triad_visible

# Additional items carried
- scrollUntilVisible:
    element:
      text: "Sitali|Abhyanga|ADDITIONAL"
    direction: DOWN
    timeout: 10000
- assertVisible:
    text: "Sitali|Abhyanga|ADDITIONAL"
- takeScreenshot: d_case1_05_additional_items

# Day 1 of new cycle
- assertVisible:
    text: "Day 1"


# ════════════════════════════════════════════════════════
# CASE 2: Day 14 → Deepen
# ════════════════════════════════════════════════════════
- runFlow:
    file: login.yaml
    env:
      EMAIL: test+d14deep@kalpx.com
      PASSWORD: Test1234!

- waitForAnimationToEnd
- takeScreenshot: d_case2_01_d14_home

# Navigate to Day 14 checkpoint
- tapOn:
    text: "Resume|Continue|My Routine|Begin|Day 14"
    optional: true
- waitForAnimationToEnd

# Should be at Day 14 checkpoint or auto-routed
- assertVisible:
    text: "Day 14|14-Day|completion|Evolution|cycle"
- takeScreenshot: d_case2_02_d14_checkpoint

# Step through screens to reach decisions
- tapOn:
    text: "Begin Reflection|Reflect|Continue|Next"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Continue|Next|Choices"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Continue|Next|Choices"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: d_case2_03_d14_decisions

# Deepen preview card must show
- assertVisible:
    text: "Deepen|deeper"
- assertVisible:
    text: "Shanti|practice|mantra"
    optional: true
- takeScreenshot: d_case2_04_deepen_preview

# Tap Deepen
- tapOn:
    text: "Deepen Practice|Deepen"
- waitForAnimationToEnd
- takeScreenshot: d_case2_05_after_deepen

# Finale / ceremony screen
- assertVisible:
    text: "deeper|cycle|begin|A new"
    optional: true
- takeScreenshot: d_case2_06_finale


