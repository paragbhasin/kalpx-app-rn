# Week 3 — Practice Timer (Moment 19) full completion + early exit
# Spec: route_practice_timer.md
# Regression guards: REG-001 (return-home navigates, never pops); REG-003
#   (runner_* cleared after early exit so the next flow starts clean);
#   REG-015 (source=core preserved through completion); REG-016 (End Practice
#   sticky link >= 44x44 reachability).
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn: "My Routine"
- waitForAnimationToEnd

- tapOn:
    text: "Practice"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Begin practice"
    optional: true
- waitForAnimationToEnd

# Immersive practice timer should be visible
- assertVisible:
    text: "End Practice"
    timeout: 4000

# --- Early exit path: End Practice link does NOT fire track_completion ---
- tapOn: "End Practice"
- waitForAnimationToEnd
# Should land on dashboard, NOT on completion_return
- assertNotVisible:
    text: "Done. Notice what stayed."
- assertVisible:
    text: ".*Routine.*|.*Today.*"
    optional: true

# --- Full timer elapse path ---
- tapOn: "My Routine"
- waitForAnimationToEnd

- tapOn:
    text: "Practice"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Begin practice"
    optional: true
- waitForAnimationToEnd

# Wait for timer to elapse (practices default ~60s). Test configurations may
# mock duration to 3s via the duration_key seed.
- waitForAnimationToEnd:
    timeout: 65000

# Completion return transient
- assertVisible:
    text: "Done. Notice what stayed."
    timeout: 8000

- tapOn: "Return to Mitra Home"
- waitForAnimationToEnd
