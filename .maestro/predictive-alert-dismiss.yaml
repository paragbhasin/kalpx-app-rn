# Week 6 — Moment 28 Predictive Alert dismissal cooldown
# Validates: card shows when predictive_alert data seeded -> tap "Later" ->
# card disappears -> not re-shown in same session (7d cooldown via
# predictive_alert_dismissed_at).
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn:
    text: "My Routine"
    optional: true
- waitForAnimationToEnd

- assertVisible:
    text: "Want to prepare?"
    optional: true

- tapOn:
    text: "Later"
- waitForAnimationToEnd

# Card must be gone.
- assertNotVisible:
    text: "Want to prepare?"

# Scroll / re-render: still gone.
- scroll
- assertNotVisible:
    text: "Want to prepare?"
