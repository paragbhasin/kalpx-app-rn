# Mitra v3 Moment 26 — Resilience Narrative 404 fallback
# Validates: when /api/mitra/resilience-narrative/ returns 404 (feature flag
# off), the card renders its local template fallback — NO crash, NO empty
# state. The fallback copy is a Mitra-voice "showed up / that's the practice"
# line.
#
# This mirrors ResilienceNarrativeCard.tsx FALLBACK constant and
# fetch_resilience_narrative 404-tolerance in actionExecutor.ts.
# Web parity: embedded_resilience_narrative_card.md §11 "Error & Edge States".

appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

# Assuming this build runs against a dev backend with the feature flag OFF,
# the card will populate with the fallback copy.

- assertVisible: "WHAT'S GROWING"
- assertVisible:
    text: "This week you showed up|showed up"
- assertVisible:
    text: "That's the practice|keeping track"

# No crash / empty state
- assertNotVisible: "Something went wrong"
- assertNotVisible: "Error"

# Card is still interactive
- assertVisible: "Thanks for noticing"
