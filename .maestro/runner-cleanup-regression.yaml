# Week 3 — Runner cleanup regression (REG-003)
# Validates: start runner -> runner_active_item populated; background;
# foreground; still populated; complete runner; runner_active_item cleared
# (verified by the absence of any runner-active dashboard indicator after
# return home).
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn: "My Routine"
- waitForAnimationToEnd

- tapOn:
    text: "Mantra"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Begin Chanting"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "9"
    optional: true
- tapOn:
    text: "Begin"
    optional: true
- waitForAnimationToEnd

# Runner is active: runner_active_item populated
- assertVisible:
    text: "of 9"
    optional: true

# Background / foreground
- pressKey: Home
- waitForAnimationToEnd:
    timeout: 2000
- launchApp:
    clearState: false
- waitForAnimationToEnd

# State preserved — still inside runner
- assertVisible:
    text: "of 9"
    optional: true

# Complete the runner
- repeat:
    times: 9
    commands:
      - tapOn:
          point: "50%,50%"
      - waitForAnimationToEnd:
          timeout: 200

- assertVisible:
    text: "108 in. Kept."
    timeout: 4000

- tapOn: "Return to Mitra Home"
- waitForAnimationToEnd

# After completion + return home, runner_active_item MUST be cleared. Re-open
# the dashboard — no "Resume practice" or in-progress indicator should be
# visible. (REG-003 guard: would regress if the cleanup in
# CompletionReturnTransient unmount or track_completion handler was removed.)
- assertNotVisible:
    text: "Resume practice"
- assertNotVisible:
    text: "of 9"
