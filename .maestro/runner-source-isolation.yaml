# Week 3 — Runner source isolation (REG-015)
# Validates that runner_source is explicitly set by the entry action and
# NEVER inherited from a prior flow. Entry from core -> source=core; entry
# from additional_recommended -> source=additional_recommended. Contamination
# would manifest as the completion return firing track_completion with the
# wrong source (detectable via backend logs in full regression), OR as the
# dashboard attributing completion to the wrong card.
#
# This Maestro flow exercises the nav path; cross-source contamination is
# also covered by e2e/flow-integration-batch7.spec.js (web contract).
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

# --- Flow A: CORE entry ---
- tapOn: "My Routine"
- waitForAnimationToEnd

- tapOn:
    text: "Mantra"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Begin Chanting"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "9"
    optional: true
- tapOn:
    text: "Begin"
    optional: true
- waitForAnimationToEnd

- assertVisible:
    text: "of 9"
    optional: true

- repeat:
    times: 9
    commands:
      - tapOn:
          point: "50%,50%"
      - waitForAnimationToEnd:
          timeout: 200

- assertVisible:
    text: "108 in. Kept.|Held. Carry it into the day.|Done. Notice what stayed."
    timeout: 4000

- tapOn: "Return to Mitra Home"
- waitForAnimationToEnd

# --- Flow B: ADDITIONAL_RECOMMENDED entry ---
# Navigate via additional items rail (if present) — core practice should be
# marked complete from Flow A but additional items should be actionable.
- tapOn:
    text: "Additional|Recommended"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Begin"
    optional: true
- waitForAnimationToEnd

# No stale runner copy from Flow A (e.g. "108 in. Kept.") should be visible
# while the additional runner is mounting.
- assertNotVisible:
    text: "108 in. Kept."
