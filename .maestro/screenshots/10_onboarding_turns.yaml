# Captures Moments 1-7 (welcome onboarding conversation thread).
# Pre-req: app installed fresh or logged out so onboarding is the entry state.
# Output: screenshots for every turn — copy into Figma as frames.
appId: com.kalpx.app
---
- launchApp

# Expo dev-client may show a server chooser before the JS bundle loads.
- tapOn:
    text: "http://localhost:8081"
    optional: true
- tapOn:
    text: "Fetch development servers"
    optional: true
- waitForAnimationToEnd:
    timeout: 15000

# Dismiss the Expo developer menu overlay if it appears
- tapOn:
    text: "Continue"
    optional: true

- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: 01_launch_screen

# Tap the legacy Home "Begin Journey" or Continue button to route to Mitra.
# With v3 routing landed, no-journey users now land on welcome_onboarding/turn_1.
- tapOn:
    text: "Begin Journey"
    optional: true
- tapOn:
    text: "Begin your journey"
    optional: true
- tapOn:
    text: "Start"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 6000

# Moment 1 — Turn 1 Welcome ("I'm Mitra")
- takeScreenshot: 02_moment_01_welcome

# Tap the "I'm ready" chip to advance to Turn 2
- tapOn:
    text: "I'm ready"
    optional: true
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: 03_moment_02_friction

# Turn 2 — pick a friction chip
- tapOn:
    text: "work"
    optional: true
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: 04_moment_03_state

# Turn 3 — pick a state chip
- tapOn:
    text: "steady"
    optional: true
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: 05_moment_04_voice_fork

# Turn 4 — pick text path (skip voice consent)
- tapOn:
    text: "Keep it written"
    optional: true
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: 06_moment_05_guidance_mode

# Turn 5 — pick Hybrid mode
- tapOn:
    text: "Hybrid"
    optional: true
- waitForAnimationToEnd:
    timeout: 6000
- takeScreenshot: 07_moment_06_recognition

# Turn 6 — acknowledge
- tapOn:
    text: "Got it"
    optional: true
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: 08_moment_07_path_emerges
- tapOn:
    text: "I'm ready"
    optional: true

# Moment 2 — Friction question
- takeScreenshot: 02_onboarding_turn_2_friction
- tapOn:
    text: "work"
    index: 0
    optional: true

# Moment 3 — State reflection
- takeScreenshot: 03_onboarding_turn_3_state
- tapOn:
    text: "steady"
    index: 0
    optional: true

# Moment 4 — Voice / text fork
- takeScreenshot: 04_onboarding_turn_4_fork
- tapOn:
    text: "Keep it written"
    optional: true

# Moment 5 — Guidance mode picker
- takeScreenshot: 05_onboarding_turn_5_mode
- tapOn:
    text: "Hybrid"
    optional: true

# Moment 6 — First recognition
- takeScreenshot: 06_onboarding_turn_6_recognition
- tapOn:
    text: "Got it"
    optional: true

# Moment 7 — Path emerges
- takeScreenshot: 07_onboarding_turn_7_path
