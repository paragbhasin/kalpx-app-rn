# Captures support path (20, 21, 22, 31, 38, 42), reflection (23, 34),
# checkpoints (24, 25), grief (46), loneliness (47), Why-This (36, 37).
# Pre-req: logged-in account with an active journey.
appId: com.kalpx.app
---
- launchApp

# Moment 20 — Trigger entry + Moment 42 — Sound bridge
- tapOn:
    text: "I Feel Triggered"
    optional: true
- takeScreenshot: 20_trigger_entry
- tapOn:
    text: "Continue"
    optional: true
- takeScreenshot: 42_sound_bridge_transient
- back
- back

# Moment 21 — Check-in regulation + Moment 22 — Balanced ack
- tapOn:
    text: "How are you landing"
    optional: true
- takeScreenshot: 21a_checkin_notice
- tapOn:
    text: "steady"
    optional: true
- takeScreenshot: 21b_checkin_name
- tapOn:
    text: "Continue"
    optional: true
- takeScreenshot: 21c_checkin_settle
- tapOn:
    text: "Done"
    optional: true
- takeScreenshot: 22_balanced_ack_overlay
- tapOn:
    text: "Got it"
    optional: true

# Moment 38 — Voice consent (first mic tap)
- tapOn:
    id: "mic_button"
    optional: true
- takeScreenshot: 38_voice_consent_sheet
- tapOn:
    text: "Not today"
    optional: true

# Moment 31 — Voice note sheet (if consent granted)
# Skip unless you've already accepted consent in an earlier run
# - tapOn: { id: "mic_button", optional: true }
# - takeScreenshot: 31_voice_note_sheet

# Moment 34 — Evening reflection (requires evening local time)
# Tip: change device time to evening, or seed the state:
#      ADB: adb shell "date MMDDhhmm"
#      iOS sim: Settings → Date & Time → manual
- tapOn:
    text: "How did today land"
    optional: true
- takeScreenshot: 34_evening_reflection

# Moment 23 — Weekly reflection (Sunday or week 7)
- tapOn:
    text: "Weekly Reflection"
    optional: true
- takeScreenshot: 23_weekly_reflection

# Moment 24/25 — Checkpoints (requires day 7 or 14)
# Seed via backend: POST /api/mitra/journey/seed/?day=7
- tapOn:
    text: "Checkpoint"
    optional: true
- takeScreenshot: 24_checkpoint_day_7_or_14

# Moment 46 — Grief room (deep link works even without dashboard card)
- openLink: "mitra://support/grief"
- takeScreenshot: 46_grief_room
- tapOn:
    text: "I'll come back to this"
    optional: true

# Moment 47 — Loneliness room
- openLink: "mitra://support/loneliness"
- takeScreenshot: 47_loneliness_room_with_companioned_chant
- tapOn:
    text: "I feel less alone now"
    optional: true

# Moment 36 — Why-This L2 (tap any principle_hint link on dashboard)
- launchApp
- tapOn:
    text: "Why this"
    optional: true
- takeScreenshot: 36_why_this_l2_sheet

# Moment 37 — Why-This L3 (source)
- tapOn:
    text: "Go deeper"
    optional: true
- takeScreenshot: 37_why_this_l3_sheet
