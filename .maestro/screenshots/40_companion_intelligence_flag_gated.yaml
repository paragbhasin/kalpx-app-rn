# Captures Moments 26, 27, 28, 29, 30, 39, 44, 45 — ALL flag-gated.
# Run this AFTER backend turns on the corresponding flags; otherwise cards hide
# and screenshots will be of empty dashboard.
#
# Required flags (enable on backend first):
#   - MITRA_V3_POST_CONFLICT       (Moment 39)
#   - MITRA_V3_JOY_SIGNAL           (Moments 44, 45)
#   - MITRA_V3_RESILIENCE_NARRATIVE (Moment 26)
#   - (Prep/predictive/entity/recommended use existing AI endpoints)
#
# Pre-req: logged-in account with seeded data:
#   - At least one LifeLedgerEntity with friction_trend=up (for alert + entity)
#   - One open DissonanceThread <18h old (for post-conflict)
#   - Recent steady streak (for joy signal)
appId: com.kalpx.app
---
- launchApp

# Moment 8-15 — Dashboard with Week 6/7 cards visible
- takeScreenshot: 08_dashboard_with_week6_cards

# Moment 28 — Predictive alert card
- tapOn:
    id: "predictive_alert_card"
    optional: true
- takeScreenshot: 28_predictive_alert_card

# Moment 27 — Prep coaching sheet (tap "Help me prepare" on alert)
- tapOn:
    text: "Help me prepare"
    optional: true
- takeScreenshot: 27_prep_coaching_sheet
- tapOn:
    text: "Got it"
    optional: true

# Moment 30 — Recommended additional card (below triad, post core completion)
- scroll
- takeScreenshot: 30_recommended_additional_card

# Moment 29 — Entity recognition sheet (auto-opens when provisional entity ready)
- takeScreenshot: 29_entity_recognition_sheet

# Moment 39 — Post-conflict gentleness card (morning after a conflict event)
- takeScreenshot: 39_post_conflict_gentleness_card

# Moment 26 — Resilience narrative (weekly card)
- scroll
- takeScreenshot: 26_resilience_narrative_card

# Moment 45 — Gratitude/joy card (when joy signal detected)
- takeScreenshot: 45_gratitude_joy_card

# Moment 44 — Season change banner (first day of new Ritu)
- takeScreenshot: 44_season_change_banner
