# Week 7 — Season change banner dismiss.
# Spec: embedded_season_change_banner.md.
# Dismiss sets season_banner_dismissed_at; reload → banner hidden.
appId: com.kalpx.app
---
- launchApp:
    arguments:
      season_signal_fixture: true
- waitForAnimationToEnd

- tapOn:
    text: "My Routine"
    optional: true
- waitForAnimationToEnd

- assertVisible:
    id: "season-change-banner"
    optional: true
- assertVisible:
    text: ".*season is shifting.*"
    optional: true

- tapOn:
    id: "season-change-banner"
    optional: true
- waitForAnimationToEnd

# After dismiss and re-render, banner is hidden.
- assertNotVisible:
    id: "season-change-banner"
    optional: true

# Re-launch to confirm 7-day hide persists.
- launchApp
- waitForAnimationToEnd
- tapOn:
    text: "My Routine"
    optional: true
- assertNotVisible:
    id: "season-change-banner"
    optional: true
