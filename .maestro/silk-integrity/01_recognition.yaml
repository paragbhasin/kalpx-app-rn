# Silk Integrity Flow 01 — Onboarding Recognition (Turn 7)
# MDR-S1-13. Verifies 7-step DoD chain for the recognition beat.
# Prerequisite: EXPO_PUBLIC_MITRA_V3_NEW_DASHBOARD=1, dev build, clean auth.
appId: com.kalpx.mitra
---
- launchApp
- runFlow: common/guest_enter.yaml
# Walk Turns 1-6 (tap first chip each turn)
- repeat:
    times: 6
    commands:
      - tapOn:
          index: 0
          traits: [Button]
      - waitForAnimationToEnd
# Turn 7 — recognition
- assertVisible: RECOGNITION
- assertNotVisible:
    text: "I'm returning"
- assertNotVisible:
    text: "(translation missing)"
# DoD step 5-6: verify the recognition_line rendered and no English fallback
- assertVisible:
    pattern: ".{20,}"
- takeScreenshot: silk_01_recognition_turn7
