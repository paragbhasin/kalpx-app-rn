# Silk Integrity Flow 03 — Triad Reveal (Turn 8)
# Group A. Chains from Flow 02 (recognition → CTA → Turn 8).
# Selector risk: YES — triad cards need testIDs.
# Deny: "Today's anchor"/"Today's vow"/"Today's practice".
appId: com.kalpx.mitra
---
- launchApp:
    clearState: true
- runFlow: 02_recognition.yaml
# Advance from recognition → triad reveal
# SELECTOR_PATCH_NEEDED: recognition primary CTA has no testID.
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 10000
# Triad cards — assert 3 distinct items render (via pattern-scan)
- extendedWaitUntil:
    visible:
      pattern: ".{10,}"
    timeout: 10000
# Deny-list sovereignty fallbacks
- assertNotVisible: "Today's anchor"
- assertNotVisible: "Today's vow"
- assertNotVisible: "Today's practice"
- takeScreenshot: silk_03_triad_reveal
- runFlow: common/assert_no_english_fallback.yaml
