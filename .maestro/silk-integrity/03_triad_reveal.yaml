# Silk Integrity Flow 03 — Triad Reveal (Turn 8)
# Group A. Chains from Flow 02 (recognition → triad reveal surface).
# v3 Flow Contract §D (2026-04-19): `onboarding_recognition_continue`
# advances to `onboarding_triad_reveal_root`.
#
# Deny: "Today's anchor" / "Today's vow" / "Today's practice" (§A sovereignty).
appId: com.kalpx.app
---
- launchApp:
    clearState: true
- runFlow: 02_recognition.yaml
- tapOn:
    id: "onboarding_recognition_continue"
- waitForAnimationToEnd:
    timeout: 10000
- extendedWaitUntil:
    visible:
      id: "onboarding_triad_reveal_root"
    timeout: 15000
- assertVisible:
    id: "onboarding_triad_begin_journey"
# Sovereignty deny — legacy triad copy must not leak onto reveal surface.
- assertNotVisible: "Today's anchor"
- assertNotVisible: "Today's vow"
- assertNotVisible: "Today's practice"
- takeScreenshot: silk_03_triad_reveal
- runFlow: common/assert_no_english_fallback.yaml
