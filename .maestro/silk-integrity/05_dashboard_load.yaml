# Silk Integrity Flow 05 — Dashboard Load (returning user, mid-journey)
# Group B. Persona: smoke+triad (day 3/14).
#
# v3 /journey/home/ may return ONE of two layouts for this persona
# depending on prior activity:
#   - momentum (M10_practice_incomplete) — headline "Welcome back, …" +
#     body "Your practice is still here for today." + "Continue today's
#     practice" + 3 chips
#   - choice (M9_morning_triggered) — same headline + body about
#     yesterday + "What feels right for you today?" + 4 chips
# Both share "Welcome back, <name>." and "Talk with Mitra" + check-in
# chip, so this flow asserts only the cross-layout signals. Flow 07/08
# cover the check-in surfaces specifically.
appId: com.kalpx.app
---
- launchApp:
    clearState: false
- runFlow: common/login_as_smoke_persona.yaml
# Cross-layout signal: "Welcome back, <name>." headline is always on
# the top of /journey/home/ render surface for returning users.
- extendedWaitUntil:
    visible: ".*Welcome back.*"
    timeout: 25000
# Chips common to both momentum and choice layouts.
- assertVisible: ".*Talk with Mitra.*"
# Check-in + support chips render in both layouts (labels differ
# slightly, so accept either exact match).
- extendedWaitUntil:
    visible: ".*Start with a check-in.*"
    timeout: 5000
    optional: true
- extendedWaitUntil:
    visible: ".*I need some support.*"
    timeout: 5000
    optional: true
# Deny-list: legacy onboarding greetings must never render on a
# returning user.
- assertNotVisible: "Welcome, friend."
- assertNotVisible: "You're here. Begin wherever feels right."
- takeScreenshot: silk_05_dashboard_load
- runFlow: common/assert_no_english_fallback.yaml
