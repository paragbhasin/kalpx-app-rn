# Silk Integrity Flow 06 — Joy Room (M48) — Track 1
# MDR-S1-13. Verifies end-to-end: dashboard chip → M48 resolve → UI render.
appId: com.kalpx.mitra
---
- launchApp
- runFlow: common/persona_day3.yaml
# Dashboard chip — Track 1 sovereignty-strict (chip hides if BE misses label)
- assertVisible:
    id: "quick_support_joy_chip"
- tapOn: { id: "quick_support_joy_chip" }
- waitForAnimationToEnd
# Joy Room opens — M48 resolve produces opening_line + options
- assertVisible:
    id: "joy_room_opening_line"
    pattern: ".{10,}"
# No English fallback
- assertNotVisible: "(opening missing)"
- assertNotVisible: "Good to sit with you today."  # universal default — should render only if no mode specified
- takeScreenshot: silk_06_joy_room_open
# Walk option → mantra runner → completion
- tapOn: { id: "joy_walk_option" }
- waitForAnimationToEnd
# return_to_source → back to joy_room
- assertVisible: { id: "joy_room_opening_line" }
- takeScreenshot: silk_06_joy_room_return
