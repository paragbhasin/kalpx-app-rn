# Silk Integrity Flow 07 — Quick Check-in (balanced)
# Group B. Persona: smoke+triad. Phase 3 selector-patch: checkin state
# chips now expose testID="checkin_state_<state>" (Agent X adds to
# QuickCheckinBlock).
appId: com.kalpx.app
---
- launchApp:
    clearState: false
- runFlow: common/login_as_smoke_persona.yaml
- runFlow: common/wait_for_dashboard.yaml
# Returning user may land on the momentum ContinueJourney surface
# (§E.1). Advance past it to expose the QuickSupportBlock testIDs.
- runFlow: common/enter_core_view.yaml
- tapOn:
    id: "quick_support_checkin"
- waitForAnimationToEnd:
    timeout: 8000
# State chips don't have dedicated testIDs yet (P5 follow-up); use label
# pattern as the pre-rollout selector.
- tapOn:
    id: "checkin_state_balanced"
    optional: true
- tapOn:
    text: "(Balanced|Steady|Good|Calm|I'm okay)"
    optional: true
- waitForAnimationToEnd
# Balanced ack surface — pattern check (no explicit deep prompts)
- extendedWaitUntil:
    visible:
      text: ".{15,}"
    timeout: 8000
- takeScreenshot: silk_07_checkin_balanced
- runFlow: common/assert_no_english_fallback.yaml
