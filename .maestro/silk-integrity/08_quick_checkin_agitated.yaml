# Silk Integrity Flow 08 — Quick Check-in (agitated → suggestions)
# Group B. Persona: smoke+triad. Phase 3 selector-patch: checkin state
# chips now expose testID="checkin_state_<state>" (Agent X adds to
# QuickCheckinBlock).
appId: com.kalpx.app
---
- launchApp:
    clearState: false
- runFlow: common/login_as_smoke_persona.yaml
- runFlow: common/wait_for_dashboard.yaml
- tapOn:
    id: "quick_support_checkin"
- waitForAnimationToEnd:
    timeout: 8000
- tapOn:
    id: "checkin_state_agitated"
    optional: true
- tapOn:
    text: "(Agitated|Overwhelmed|Tense|Anxious|Scattered)"
    optional: true
- waitForAnimationToEnd
# Suggestions surface — at least one suggestion row with testID.
- extendedWaitUntil:
    visible:
      id: "checkin_suggestion_0"
    timeout: 10000
    optional: true
- extendedWaitUntil:
    visible:
      text: ".{15,}"
    timeout: 10000
- takeScreenshot: silk_08_checkin_agitated
- runFlow: common/assert_no_english_fallback.yaml
