# Silk Integrity Flow 09 — Triggered flow (I Feel Triggered → reset)
# Group B. Persona: smoke+triad. Selector risk: LOW (".*I Feel Triggered.*" stable).
appId: com.kalpx.app
---
- launchApp:
    clearState: false
- runFlow: common/login_as_smoke_persona.yaml
- runFlow: common/wait_for_dashboard.yaml
# Phase 3: QuickSupportBlock exposes testID="quick_support_triggered".
- tapOn:
    id: "quick_support_triggered"
- waitForAnimationToEnd:
    timeout: 10000
# Trigger-reset screen should render prompt copy
- extendedWaitUntil:
    visible:
      text: ".{15,}"
    timeout: 10000
- takeScreenshot: silk_09_triggered_flow
- runFlow: common/assert_no_english_fallback.yaml
