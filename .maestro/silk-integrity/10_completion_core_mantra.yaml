# Silk Integrity Flow 10 — Completion Return (core × mantra)
# MDR-S1-13 + post-S1-12 (read_more_label slot-lift + fallback drop).
appId: com.kalpx.mitra
---
- launchApp
- runFlow: common/persona_day3.yaml
- tapOn: { id: "triad_card_mantra" }
- waitForAnimationToEnd
- tapOn: { id: "mantra_runner_start" }
- waitForAnimationToEnd
- tapOn: { id: "mantra_runner_complete_shortcut" }  # test hook
- waitForAnimationToEnd
# CompletionReturnTransient — M_completion_return_core_mantra_en
- assertVisible:
    id: "completion_message"
    pattern: ".{10,}"
- assertVisible:
    id: "completion_wisdom_anchor_line"
    text: "Action without grasping carries its own fullness."
- assertVisible:
    id: "completion_read_more"
    text: "Read more →"
# Hard deny-list
- assertNotVisible: "How did that feel?"  # MDR-S1-12 dropped
- assertVisible:
    id: "completion_reflection_placeholder"
    # Current wording from M_completion_return reflection_prompt slot
    pattern: "Anything to carry"
- takeScreenshot: silk_10_completion_core_mantra
