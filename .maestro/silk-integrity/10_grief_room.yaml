# Silk Integrity Flow 10 — Grief Room (M46)
# Group C. Persona: smoke+triad. Phase 3 selector-patch: more_support row
# + room opening_line now expose testIDs.
# Deny: "Grief Room" body, "I'm here if you need more.".
appId: com.kalpx.app
---
- launchApp:
    clearState: false
- runFlow: common/login_as_smoke_persona.yaml
- runFlow: common/wait_for_dashboard.yaml
# Open MoreSupportSheet
- tapOn:
    text: ".*More support.*"
- waitForAnimationToEnd
- tapOn:
    id: "more_support_grief_row"
    optional: true
- tapOn:
    text: "(grief|loss|heavy|mourning)"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000
# Grief room opening line — testID-first, pattern fallback.
- extendedWaitUntil:
    visible:
      id: "grief_room_opening_line"
    timeout: 10000
    optional: true
- extendedWaitUntil:
    visible:
      text: ".{15,}"
    timeout: 10000
- assertNotVisible: "Grief Room"
- assertNotVisible: "I'm here if you need more."
- takeScreenshot: silk_10_grief_room
- runFlow: common/assert_no_english_fallback.yaml
