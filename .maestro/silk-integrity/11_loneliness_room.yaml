# Silk Integrity Flow 11 — Loneliness Room (M47)
# Group C. Persona: smoke+triad. Phase 3 selector-patch: more_support row
# + room opening_line now expose testIDs.
# Deny: "Loneliness Room" body, "I'm here if you need more.".
appId: com.kalpx.app
---
- launchApp:
    clearState: true
- runFlow: common/login_as_smoke_persona.yaml
- runFlow: common/wait_for_dashboard.yaml
- tapOn:
    text: ".*More support.*"
- waitForAnimationToEnd
- tapOn:
    id: "more_support_loneliness_row"
    optional: true
- tapOn:
    text: "(lonely|loneliness|alone|isolation)"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000
- extendedWaitUntil:
    visible:
      id: "loneliness_room_opening_line"
    timeout: 10000
    optional: true
- extendedWaitUntil:
    visible:
      text: ".{15,}"
    timeout: 10000
- assertNotVisible: "Loneliness Room"
- assertNotVisible: "I'm here if you need more."
- takeScreenshot: silk_11_loneliness_room
- runFlow: common/assert_no_english_fallback.yaml
