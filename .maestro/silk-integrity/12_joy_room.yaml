# Silk Integrity Flow 12 — Joy Room (M48, Track 1)
# Group C. Persona: smoke+triad (joy_label must be BE-seeded).
# Phase 3 selector-patch: joy_room_opening_line testID now expected.
appId: com.kalpx.app
---
- launchApp:
    clearState: false
- runFlow: common/login_as_smoke_persona.yaml
- runFlow: common/wait_for_dashboard.yaml
# Advance past momentum ContinueJourney (§E.1) to full dashboard.
- runFlow: common/enter_core_view.yaml
# Joy chip — sovereignty-strict, only present when backend seeded.
# Runtime 2026-04-19: chip renders with testID `quick_support_joy_chip`
# (v3 Flow Contract §G) but the "I'm in a good place" display label
# doesn't round-trip through accessibilityText; key off testID only.
- extendedWaitUntil:
    visible:
      id: "quick_support_joy_chip"
    timeout: 10000
- tapOn:
    id: "quick_support_joy_chip"
- waitForAnimationToEnd:
    timeout: 8000
# Joy Room opens — testID-first assertion, pattern fallback.
- extendedWaitUntil:
    visible:
      id: "joy_room_opening_line"
    timeout: 10000
    optional: true
- extendedWaitUntil:
    visible:
      text: ".{10,}"
    timeout: 10000
- assertNotVisible: "(opening missing)"
- takeScreenshot: silk_12_joy_room
- runFlow: common/assert_no_english_fallback.yaml
