# Silk Integrity Flow 13 — Growth Room (M49, Track 1)
# Group C. Persona: smoke+triad (growth_label + M49_inquiry_seeds seeded).
# Phase 3 selector-patch: growth_room_opening_line + inquiry_category_*
# testIDs now expected.
appId: com.kalpx.app
---
- launchApp:
    clearState: false
- runFlow: common/login_as_smoke_persona.yaml
- runFlow: common/wait_for_dashboard.yaml
# Advance past momentum ContinueJourney (§E.1) to full dashboard.
- runFlow: common/enter_core_view.yaml
# Growth chip — Track 1 founder-locked. Runtime 2026-04-19: chip's
# display label doesn't round-trip via accessibilityText; stable key
# is the v3 §G testID.
- extendedWaitUntil:
    visible:
      id: "quick_support_growth_chip"
    timeout: 10000
- tapOn:
    id: "quick_support_growth_chip"
- waitForAnimationToEnd:
    timeout: 8000
- extendedWaitUntil:
    visible:
      id: "growth_room_opening_line"
    timeout: 10000
    optional: true
- extendedWaitUntil:
    visible:
      text: ".{10,}"
    timeout: 10000
# Inquiry category chips expose testID="inquiry_category_<decision|relationship|stuck|practice|other>"
- extendedWaitUntil:
    visible:
      id: "inquiry_category_decision"
    timeout: 5000
    optional: true
- extendedWaitUntil:
    visible:
      id: "inquiry_seat_prompt"
    timeout: 5000
    optional: true
- assertNotVisible: "(opening missing)"
- takeScreenshot: silk_13_growth_room
- runFlow: common/assert_no_english_fallback.yaml
