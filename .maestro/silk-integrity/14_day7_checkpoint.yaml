# Silk Integrity Flow 14 — Day 7 Checkpoint (M24)
# Group D. Persona: persona_day7 (canonical seeded persona).
# Phase 3 selector-patch: checkpoint_day_7_* testIDs now expected.
# Deny: "Seven days.", "One week of showing up.".
env:
  PERSONA_EMAIL: "persona_day7@kalpx.com"
  PERSONA_PASSWORD: "smoke-dev-only-do-not-use-in-prod"
appId: com.kalpx.mitra
---
- launchApp:
    clearState: true
- runFlow:
    file: common/login_as_persona.yaml
    env:
      PERSONA_EMAIL: ${PERSONA_EMAIL}
      PERSONA_PASSWORD: ${PERSONA_PASSWORD}
- runFlow: common/wait_for_dashboard.yaml
# Canonical testID assertions for the checkpoint surface.
- extendedWaitUntil:
    visible:
      id: "checkpoint_day_7_narrative"
    timeout: 12000
    optional: true
- extendedWaitUntil:
    visible:
      id: "checkpoint_day_7_headline"
    timeout: 5000
    optional: true
- extendedWaitUntil:
    visible:
      pattern: ".{20,}"
    timeout: 12000
- assertNotVisible: "Seven days."
- assertNotVisible: "One week of showing up."
- takeScreenshot: silk_14_day7
- runFlow: common/assert_no_english_fallback.yaml
