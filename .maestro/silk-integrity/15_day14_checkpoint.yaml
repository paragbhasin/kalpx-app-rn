# Silk Integrity Flow 15 — Day 14 Checkpoint (M25)
# Group D. Persona: persona_day14 (canonical seeded persona).
# Phase 3 selector-patch: checkpoint_day_14_* testIDs now expected.
# Deny: pre-S1-10 "Fourteen days.", "sealed. Something has settled.".
env:
  PERSONA_EMAIL: "persona_day14@kalpx.com"
  PERSONA_PASSWORD: "smoke-dev-only-do-not-use-in-prod"
appId: com.kalpx.app
---
- launchApp:
    clearState: false
- runFlow:
    file: common/login_as_persona.yaml
    env:
      PERSONA_EMAIL: ${PERSONA_EMAIL}
      PERSONA_PASSWORD: ${PERSONA_PASSWORD}
- runFlow: common/wait_for_dashboard.yaml
- extendedWaitUntil:
    visible:
      id: "checkpoint_day_14_narrative"
    timeout: 12000
    optional: true
- extendedWaitUntil:
    visible:
      id: "checkpoint_day_14_summary"
    timeout: 5000
    optional: true
# Day 14 narrative should render with interpolated count "N of 14"
- extendedWaitUntil:
    visible:
      text: "\\d+ of 14"
    timeout: 12000
# Hard deny — pre-S1-10 hardcoded templates
- assertNotVisible: "Fourteen days. Two weeks of showing up."
- assertNotVisible: "sealed. Something has settled."
- takeScreenshot: silk_15_day14
- runFlow: common/assert_no_english_fallback.yaml
