# Silk Integrity Flow 16 — Completion Return (core × mantra)
# Group E. Persona: smoke+triad. Family: core_mantra → gita anchor.
# Phase 3 selector-patch: core_item_mantra + mantra_runner_start/complete +
# completion_* testIDs now expected.
# Deny: MDR-S1-12 "How did that feel?".
appId: com.kalpx.app
---
- launchApp:
    clearState: false
- runFlow: common/login_as_smoke_persona.yaml
- runFlow: common/wait_for_dashboard.yaml
# Advance past momentum ContinueJourney to full dashboard (smoke+triad day N).
- runFlow: common/enter_core_view.yaml
# Tap the mantra triad card to open mantra runner
- tapOn:
    id: "core_item_mantra"
- waitForAnimationToEnd:
    timeout: 8000
# Wave 3 (2026-04-19) PROVISIONAL: core mantra lands on canonical rich
# runner (cycle_transitions/offering_reveal). No mantra_runner_start/
# _complete testIDs exist on this surface — tap the __DEV__-gated
# test_runner_force_complete hook to fire the REAL complete_runner
# action per variant. YAML will be finalized after Batch B proof.
- tapOn:
    id: "test_runner_force_complete"
- waitForAnimationToEnd:
    timeout: 10000
# CompletionReturnTransient — core_mantra anchor (gita).
- extendedWaitUntil:
    visible:
      id: "completion_message"
    timeout: 10000
    optional: true
- extendedWaitUntil:
    visible:
      id: "completion_wisdom_anchor_line"
    timeout: 10000
    optional: true
- extendedWaitUntil:
    visible:
      text: ".{10,}"
    timeout: 10000
- assertNotVisible: "How did that feel?"
- takeScreenshot: silk_16_completion_core_mantra
- runFlow: common/assert_no_english_fallback.yaml
