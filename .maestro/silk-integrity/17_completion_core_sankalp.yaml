# Silk Integrity Flow 17 — Completion Return (core × sankalp)
# Flow group: E (Completion flows)
# Persona: smoke+triad@kalpx.com (triad sankalp.permission_to_rest locked)
# Completion family: core_sankalp → yoga_sutras wisdom anchor
# Phase 3 selector-patch: core_item_sankalp + sankalp_hold + completion_*
# testIDs now expected.
# Deny-list tier: MDR-S1-12
appId: com.kalpx.app
---
- launchApp:
    clearState: false
- runFlow: common/login_as_smoke_persona.yaml
- runFlow: common/wait_for_dashboard.yaml
- runFlow: common/enter_core_view.yaml
- tapOn:
    id: "core_item_sankalpa"
- waitForAnimationToEnd:
    timeout: 8000
# Wave 3 (2026-04-19) PROVISIONAL — canonical rich runner hook
- tapOn:
    id: "test_runner_force_complete"
- waitForAnimationToEnd:
    timeout: 10000
- extendedWaitUntil:
    visible:
      id: "completion_message"
    timeout: 10000
    optional: true
- extendedWaitUntil:
    visible:
      id: "completion_wisdom_anchor_line"
    timeout: 10000
    optional: true
- extendedWaitUntil:
    visible:
      text: ".{10,}"
    timeout: 10000
- assertNotVisible: "How did that feel?"
- assertNotVisible: "Your Sankalp is Alive."
- takeScreenshot: silk_17_completion_core_sankalp
- runFlow: common/assert_no_english_fallback.yaml
