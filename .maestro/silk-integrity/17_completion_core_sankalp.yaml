# Silk Integrity Flow 17 — Completion Return (core × sankalp)
# Flow group: E (Completion flows)
# 7-layer coverage — see flow 16 template.
# Persona: smoke+triad@kalpx.com (triad sankalp.permission_to_rest locked)
# Completion family: core_sankalp → yoga_sutras wisdom anchor
# Deny-list tier: MDR-S1-12
# Known selector risk: MEDIUM
appId: com.kalpx.mitra
---
- launchApp:
    clearState: true
- runFlow: common/login_as_smoke_persona.yaml
- runFlow: common/wait_for_dashboard.yaml
# SELECTOR_PATCH_NEEDED: triad sankalp card needs testID="core_item_sankalp".
- tapOn:
    text: "(Sankalp|permission to rest|Permission)"
- waitForAnimationToEnd:
    timeout: 8000
# SankalpHoldBlock — hold to complete
# SELECTOR_PATCH_NEEDED: sankalp hold button needs testID="sankalp_hold".
- longPressOn:
    text: "(Hold|Press|Begin)"
    optional: true
- waitForAnimationToEnd:
    timeout: 10000
- tapOn:
    text: "(Done|Complete|I'm done)"
    optional: true
- extendedWaitUntil:
    visible:
      pattern: ".{10,}"
    timeout: 10000
- assertNotVisible: "How did that feel?"
- assertNotVisible: "Your Sankalp is Alive."
- takeScreenshot: silk_17_completion_core_sankalp
- runFlow: common/assert_no_english_fallback.yaml
