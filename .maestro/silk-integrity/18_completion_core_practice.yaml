# Silk Integrity Flow 18 — Completion Return (core × practice)
# Flow group: E (Completion flows)
# Persona: smoke+triad@kalpx.com (triad practice.mindful_55_walking locked)
# Completion family: core_practice → ayurveda/dinacharya wisdom anchor
# Phase 3 selector-patch: core_item_practice + practice_runner_start/complete +
# completion_* testIDs now expected.
# Deny-list tier: MDR-S1-12 + runner fallbacks
appId: com.kalpx.app
---
- launchApp:
    clearState: false
- runFlow: common/login_as_smoke_persona.yaml
- runFlow: common/wait_for_dashboard.yaml
- runFlow: common/enter_core_view.yaml
- tapOn:
    id: "core_item_ritual"
- waitForAnimationToEnd:
    timeout: 8000
# Wave 3 (2026-04-19) PROVISIONAL — canonical rich runner hook
- tapOn:
    id: "test_runner_force_complete"
- waitForAnimationToEnd:
    timeout: 10000
- extendedWaitUntil:
    visible:
      id: "completion_message"
    timeout: 10000
    optional: true
- extendedWaitUntil:
    visible:
      id: "completion_wisdom_anchor_line"
    timeout: 10000
    optional: true
- extendedWaitUntil:
    visible:
      text: ".{10,}"
    timeout: 10000
- assertNotVisible: "How did that feel?"
- takeScreenshot: silk_18_completion_core_practice
- runFlow: common/assert_no_english_fallback.yaml
