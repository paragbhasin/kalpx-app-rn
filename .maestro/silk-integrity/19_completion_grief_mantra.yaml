# Silk Integrity Flow 19 — Completion Return (grief × mantra)
# Flow group: E (Completion flows)
# Persona: smoke+triad@kalpx.com
# Completion family: support_grief → source-aware wisdom anchor
# Phase 3 selector-patch: grief_mantra_option + completion_* testIDs expected.
# Deny-list tier: grief + MDR-S1-12
appId: com.kalpx.app
---
- launchApp:
    clearState: false
- runFlow: common/login_as_smoke_persona.yaml
- runFlow: common/wait_for_dashboard.yaml
- runFlow: common/enter_core_view.yaml
# Wave 3 (2026-04-19): testID-first entry chain
- tapOn:
    id: "quick_support_more_label"
- waitForAnimationToEnd:
    timeout: 4000
- tapOn:
    id: "more_support_grief_row"
- extendedWaitUntil:
    visible:
      id: "grief_room_opening_line"
    timeout: 10000
# Grief room options reveal on timeout (30s) or tap-to-reveal; tap into
# the room body to force-advance to options.
- tapOn:
    id: "grief_room_opening_line"
    optional: true
- waitForAnimationToEnd:
    timeout: 4000
- tapOn:
    id: "grief_mantra_option"
- waitForAnimationToEnd:
    timeout: 6000
# Wave 3 (2026-04-19) PROVISIONAL — canonical rich runner hook
- tapOn:
    id: "test_runner_force_complete"
- waitForAnimationToEnd:
    timeout: 10000
- extendedWaitUntil:
    visible:
      id: "completion_message"
    timeout: 10000
    optional: true
- extendedWaitUntil:
    visible:
      id: "completion_wisdom_anchor_line"
    timeout: 10000
    optional: true
- extendedWaitUntil:
    visible:
      text: ".{10,}"
    timeout: 10000
- assertNotVisible: "How did that feel?"
- takeScreenshot: silk_19_completion_grief_mantra
- runFlow: common/assert_no_english_fallback.yaml
