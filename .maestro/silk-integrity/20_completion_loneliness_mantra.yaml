# Silk Integrity Flow 20 — Completion Return (loneliness × mantra)
# Flow group: E (Completion flows)
# Persona: smoke+triad@kalpx.com
# Completion family: support_loneliness + mantra source
# Phase 3 selector-patch: loneliness_mantra_option + completion_* testIDs expected.
# Deny-list tier: loneliness + MDR-S1-12
appId: com.kalpx.app
---
- launchApp:
    clearState: false
- runFlow: common/login_as_smoke_persona.yaml
- runFlow: common/wait_for_dashboard.yaml
- runFlow: common/enter_core_view.yaml
# Wave 3 (2026-04-19): harness timing fix
- scrollUntilVisible:
    element:
      id: "quick_support_more_label"
    direction: DOWN
    timeout: 8000
- waitForAnimationToEnd:
    timeout: 1500
- tapOn:
    id: "quick_support_more_label"
# Batch 1B H-3 (2026-04-19): MoreSupportSheet refactored so row testIDs
# are reachable on iOS (no more Pressable-flatten). Tap by testID.
# Sheet uses slide animation — waitForAnimationToEnd before assertion
# so the mount completes before Maestro queries the hierarchy.
- waitForAnimationToEnd:
    timeout: 3000
- extendedWaitUntil:
    visible:
      id: "more_support_loneliness_row"
    timeout: 10000
- tapOn:
    id: "more_support_loneliness_row"
- extendedWaitUntil:
    visible:
      id: "loneliness_room_opening_line"
    timeout: 10000
- tapOn:
    id: "loneliness_room_opening_line"
    optional: true
- waitForAnimationToEnd:
    timeout: 4000
- extendedWaitUntil:
    visible:
      id: "loneliness_bhakti_option"
    timeout: 4000
- tapOn:
    id: "loneliness_bhakti_option"
- extendedWaitUntil:
    visible:
      id: "test_runner_force_complete"
    timeout: 8000
# Wave 3 (2026-04-19) PROVISIONAL — canonical rich runner hook
- tapOn:
    id: "test_runner_force_complete"
- waitForAnimationToEnd:
    timeout: 10000
- extendedWaitUntil:
    visible:
      id: "completion_message"
    timeout: 10000
    optional: true
- extendedWaitUntil:
    visible:
      id: "completion_wisdom_anchor_line"
    timeout: 10000
    optional: true
- extendedWaitUntil:
    visible:
      text: ".{10,}"
    timeout: 10000
- assertNotVisible: "How did that feel?"
- takeScreenshot: silk_20_completion_loneliness_mantra
- runFlow: common/assert_no_english_fallback.yaml
