# Silk Integrity Flow 21 — Completion Return (joy × mantra)
# Flow group: E (Completion flows)
# Persona: smoke+triad@kalpx.com
# Completion family: support_joy + mantra source (bhakti_maitri bridge)
# Phase 3 selector-patch: joy_walk_option + completion_* testIDs expected.
# Deny-list tier: MDR-S1-12 + translation-missing
appId: com.kalpx.app
---
- launchApp:
    clearState: false
- runFlow: common/login_as_smoke_persona.yaml
- runFlow: common/wait_for_dashboard.yaml
- runFlow: common/enter_core_view.yaml
- runFlow: common/scroll_to_quick_support.yaml
# Wave 3 (2026-04-19): testID-first entry chain
- tapOn:
    id: "quick_support_joy_chip"
- extendedWaitUntil:
    visible:
      id: "joy_room_opening_line"
    timeout: 10000
# Joy options reveal on 2s timeout; wait it out.
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    id: "joy_chant_option"
- waitForAnimationToEnd:
    timeout: 6000
# Wave 3 (2026-04-19) PROVISIONAL — canonical rich runner hook
- tapOn:
    id: "test_runner_force_complete"
- waitForAnimationToEnd:
    timeout: 10000
- extendedWaitUntil:
    visible:
      id: "completion_message"
    timeout: 10000
    optional: true
- extendedWaitUntil:
    visible:
      id: "completion_wisdom_anchor_line"
    timeout: 10000
    optional: true
- extendedWaitUntil:
    visible:
      text: ".{10,}"
    timeout: 10000
- assertNotVisible: "How did that feel?"
- takeScreenshot: silk_21_completion_joy_mantra
- runFlow: common/assert_no_english_fallback.yaml
