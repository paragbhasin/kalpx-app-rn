# Silk Integrity Flow 22 — Completion Return (growth × mantra)
# Flow group: E (Completion flows)
# Persona: smoke+triad@kalpx.com
# Completion family: support_growth + mantra source
# Phase 3 selector-patch: inquiry_category_* + completion_* testIDs expected.
# Deny-list tier: MDR-S1-12 + translation-missing
appId: com.kalpx.app
---
- launchApp:
    clearState: true
- runFlow: common/login_as_smoke_persona.yaml
- runFlow: common/wait_for_dashboard.yaml
- extendedWaitUntil:
    visible: "I want to go deeper"
    timeout: 10000
- tapOn: "I want to go deeper"
- waitForAnimationToEnd:
    timeout: 8000
# Pick an inquiry category, then drill into a mantra offering.
- tapOn:
    id: "inquiry_category_decision"
    optional: true
- tapOn:
    text: "(decision|relationship|stuck|practice)"
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: "inquiry_decision_mantra_option"
    optional: true
- tapOn:
    text: "(chant|mantra|inquiry)"
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: "mantra_runner_start"
    optional: true
- tapOn:
    text: "(Start|Begin|Play)"
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: "mantra_runner_complete"
    optional: true
- tapOn:
    text: "(Done|Complete|I'm done)"
    optional: true
- extendedWaitUntil:
    visible:
      id: "completion_message"
    timeout: 10000
    optional: true
- extendedWaitUntil:
    visible:
      id: "completion_wisdom_anchor_line"
    timeout: 10000
    optional: true
- extendedWaitUntil:
    visible:
      text: ".{10,}"
    timeout: 10000
- assertNotVisible: "How did that feel?"
- takeScreenshot: silk_22_completion_growth_mantra
- runFlow: common/assert_no_english_fallback.yaml
