# Silk Integrity Flow 22 — Completion Return (growth × mantra)
# Flow group: E (Completion flows)
# Persona: smoke+triad@kalpx.com
# Completion family: support_growth + mantra source
# Phase 3 selector-patch: inquiry_category_* + completion_* testIDs expected.
# Deny-list tier: MDR-S1-12 + translation-missing
appId: com.kalpx.app
---
- launchApp:
    clearState: false
- runFlow: common/login_as_smoke_persona.yaml
- runFlow: common/wait_for_dashboard.yaml
- runFlow: common/enter_core_view.yaml
# Wave 3 (2026-04-19): harness timing fix — inline scroll. Bypasses
# inquiry sub-flow — mantra pill is a sibling option on growth_room.
- scrollUntilVisible:
    element:
      id: "quick_support_growth_chip"
    direction: DOWN
    timeout: 8000
- waitForAnimationToEnd:
    timeout: 1500
- tapOn:
    id: "quick_support_growth_chip"
- extendedWaitUntil:
    visible:
      id: "growth_room_opening_line"
    timeout: 10000
# Growth uses 10s silence tolerance; wait options to auto-reveal.
- waitForAnimationToEnd:
    timeout: 12000
- extendedWaitUntil:
    visible:
      id: "growth_mantra_option"
    timeout: 4000
- tapOn:
    id: "growth_mantra_option"
- extendedWaitUntil:
    visible:
      id: "test_runner_force_complete"
    timeout: 8000
# Wave 3 (2026-04-19) PROVISIONAL — canonical rich runner hook
- tapOn:
    id: "test_runner_force_complete"
- waitForAnimationToEnd:
    timeout: 10000
- extendedWaitUntil:
    visible:
      id: "completion_message"
    timeout: 10000
    optional: true
- extendedWaitUntil:
    visible:
      id: "completion_wisdom_anchor_line"
    timeout: 10000
    optional: true
- extendedWaitUntil:
    visible:
      text: ".{10,}"
    timeout: 10000
- assertNotVisible: "How did that feel?"
- takeScreenshot: silk_22_completion_growth_mantra
- runFlow: common/assert_no_english_fallback.yaml
