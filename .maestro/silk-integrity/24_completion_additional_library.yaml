# Silk Integrity Flow 24 — Completion Return (additional × library)
# Flow group: E (Completion flows)
# Persona: persona_additional_library (canonical seeded persona).
# Phase 3 selector-patch: additional_items_* + completion_* testIDs expected.
# Deny-list tier: MDR-S1-12 + runner fallbacks
env:
  PERSONA_EMAIL: "persona_additional_library@kalpx.com"
  PERSONA_PASSWORD: "smoke-dev-only-do-not-use-in-prod"
appId: com.kalpx.mitra
---
- launchApp:
    clearState: true
- runFlow:
    file: common/login_as_persona.yaml
    env:
      PERSONA_EMAIL: ${PERSONA_EMAIL}
      PERSONA_PASSWORD: ${PERSONA_PASSWORD}
- runFlow: common/wait_for_dashboard.yaml
# Scroll to reveal the additional items surface (likely below fold).
- scroll
- extendedWaitUntil:
    visible:
      id: "additional_items_surface"
    timeout: 8000
    optional: true
- tapOn:
    id: "additional_item_0"
    optional: true
- tapOn:
    text: "(Additional|More|Library)"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "(Start|Begin|Play)"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "(Done|Complete|I'm done)"
    optional: true
- extendedWaitUntil:
    visible:
      id: "completion_message"
    timeout: 10000
    optional: true
- extendedWaitUntil:
    visible:
      id: "completion_wisdom_anchor_line"
    timeout: 10000
    optional: true
- extendedWaitUntil:
    visible:
      pattern: ".{10,}"
    timeout: 10000
- assertNotVisible: "How did that feel?"
- takeScreenshot: silk_24_completion_additional_library
- runFlow: common/assert_no_english_fallback.yaml
