# Silk Integrity Flow 27 — Additional Items Surface
# Flow group: F (Dashboard parity surfaces)
# 7-layer coverage:
#   L1 additional items ContentPacks | L2 resolver picks additional list
#   L3 /journey/home/ returns additional_items array | L4 FE renders AdditionalItemsSectionBlock
#   L5 additional items visible | L6 no core-items fallback
#   L7 MitraDecisionLog row |
# Persona: smoke+triad@kalpx.com (also any additional-seeded persona).
# Phase 3 selector-patch: additional_items_surface testID now expected
# (Agent X adds to AdditionalItemsSectionBlock).
appId: com.kalpx.app
---
- launchApp:
    clearState: false
# persona_additional_library@kalpx.com has pre-seeded additional items
# (smoke+triad does not; would hard-fail at the additional_items_surface
# testID wait).
- runFlow:
    file: common/login_as_persona.yaml
    env:
      PERSONA_EMAIL: "persona_additional_library@kalpx.com"
      PERSONA_PASSWORD: "smoke-dev-only-do-not-use-in-prod"
- runFlow: common/wait_for_dashboard.yaml
# Scroll dashboard to expose Additional Items section.
- scroll
- scroll
- extendedWaitUntil:
    visible:
      id: "additional_items_surface"
    timeout: 10000
# Soft label check (non-failing) as a belt-and-braces assertion.
- extendedWaitUntil:
    visible:
      text: "(Additional|More offerings|Library)"
    timeout: 5000
    optional: true
- takeScreenshot: silk_27_additional_items_surface
- runFlow: common/assert_no_english_fallback.yaml
