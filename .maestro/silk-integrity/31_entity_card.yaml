# Silk Integrity Flow 31 — Entity Recognition Card (M29)
# Flow group: F (Dashboard parity surfaces)
# 7-layer coverage:
#   L1 M29 entity_card ContentPack | L2 resolver picks entity variant
#   L3 /journey/home/ returns entity_card slot | L4 FE mounts EntityRecognitionCard
#   L5 entity card renders | L6 no fallback
#   L7 MitraDecisionLog row |
# Persona: smoke+triad@kalpx.com
# Phase 3 selector-patch: entity_recognition_card testID now expected.
# Deny-list tier: generic
appId: com.kalpx.app
---
- launchApp:
    clearState: true
- runFlow: common/login_as_smoke_persona.yaml
- runFlow: common/wait_for_dashboard.yaml
- scroll
# M29 entity card surfaces only when backend has seeded entity events
# for the persona. Kept as a soft check (optional) since surface
# conditions aren't deterministic on the current dev seed.
- extendedWaitUntil:
    visible:
      id: "entity_recognition_card"
    timeout: 10000
    optional: true
- extendedWaitUntil:
    visible:
      text: ".{10,}"
    timeout: 10000
    optional: true
- takeScreenshot: silk_31_entity_card
- runFlow: common/assert_no_english_fallback.yaml
