# common/connect_dev_client.yaml
# Post-clearState bridge from Expo dev-client launcher to the Login screen.
#
# Speed note: Previously waited up to 180s on "Begin your journey" THEN
# dismissed Dev Menu — wasted ~90s of the bundle-load window. Now we
# race: as soon as the Dev Menu header ("Runtime version") shows, tap
# the X close button (75%, 34%). "Runtime version" text appears the
# moment the dev-client connects — typically 3-5s after openLink —
# long before the Welcome screen finishes rendering underneath.
#
# Flow:
#   1. openLink deep-link to Metro
#   2. Dismiss iOS scheme confirmation (if present)
#   3. Wait for Dev Menu signal ("Runtime version") — fast
#   4. Tap the X close button at 75%, 34% of the sheet
#   5. Dismiss dev-menu first-run tutorial ("Continue") if present
#   6. Wait for Welcome screen text
#   7. Welcome → "Begin your journey →"
#   8. Intro → "I'm returning"
#   9. Assert Login screen
appId: com.kalpx.app
---
- openLink: "com.kalpx.app://expo-development-client/?url=http%3A%2F%2Flocalhost%3A8081"
- tapOn:
    text: "Open"
    optional: true
# Dismiss first-run tutorial if it appears before the Dev Menu proper.
- extendedWaitUntil:
    visible: "Continue"
    timeout: 3000
    optional: true
- tapOn:
    text: "Continue"
    optional: true
# Wait for Dev Menu sheet to appear (detect via "Runtime version" text
# which is unique to the dev-client panel). Usually 3-5s.
- extendedWaitUntil:
    visible: ".*Runtime version.*"
    timeout: 30000
    optional: true
# Dismiss by tapping the X close button in the sheet header.
- tapOn:
    point: "75%, 34%"
    optional: true
# Bundle may still be loading under the menu. Now wait for Welcome.
- extendedWaitUntil:
    visible: ".*Begin your journey.*"
    timeout: 180000
# If Dev Menu re-appears (race: menu pops AFTER bundle-loads event),
# tap X once more defensively.
- tapOn:
    point: "75%, 34%"
    optional: true
- tapOn: ".*Begin your journey.*"
- extendedWaitUntil:
    visible: "I'm returning"
    timeout: 20000
- tapOn: "I'm returning"
- extendedWaitUntil:
    visible: "LOGIN"
    timeout: 20000
