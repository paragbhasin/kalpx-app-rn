# common/login_as_persona.yaml
# Parameterized login. Consumers pass PERSONA_EMAIL + PERSONA_PASSWORD.
#
# Delegates to fast_login_as_persona.yaml which uses `clearState:
# false` + Profile/Logout navigation to skip the ~90s bundle reload.
# First flow of a cold batch should call `common/warmup.yaml` before
# these runs.
appId: com.kalpx.app
---
- runFlow:
    file: fast_login_as_persona.yaml
    env:
      PERSONA_EMAIL: ${PERSONA_EMAIL}
      PERSONA_PASSWORD: ${PERSONA_PASSWORD}
