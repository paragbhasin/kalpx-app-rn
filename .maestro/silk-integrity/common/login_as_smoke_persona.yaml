# common/login_as_smoke_persona.yaml
# Logs in as the canonical smoke persona seeded on dev.
# Journey 3/14. Triad: soham / permission_to_rest / mindful_55_walking.
# Canonical dev-only password (see PERSONAS.md). Never use outside dev.
#
# Routes through fast_login_as_persona.yaml which uses `clearState:
# false` + Profile/Logout navigation to skip the ~90s cold bundle
# reload. ~3.4x speedup per flow vs the prior cold path.
# First flow of a cold batch should call `common/warmup.yaml` to prime
# the bundle + reach Login screen before these fast logins start.
appId: com.kalpx.app
---
- runFlow:
    file: fast_login_as_persona.yaml
    env:
      PERSONA_EMAIL: "smoke+triad@kalpx.com"
      PERSONA_PASSWORD: "smoke-dev-only-do-not-use-in-prod"
