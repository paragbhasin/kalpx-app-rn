# common/wait_for_dashboard.yaml
# Waits until dashboard is render-ready.
# Accepts either the full dashboard signal (QuickSupportBlock "I Feel
# Triggered" chip visible — smoke+triad post-practice) OR the
# momentum-layout surface ("Welcome back" greeting — smoke+triad
# day-3 pre-practice via /journey/home/). Both are valid render-ready
# states depending on persona day + practice-done state.
#
# Text matchers wrapped in .* to tolerate Ionicons icon-prefix glyphs
# that get concatenated into the element's accessibility text.
appId: com.kalpx.app
---
- extendedWaitUntil:
    visible: ".*I Feel Triggered.*"
    timeout: 20000
    optional: true
- extendedWaitUntil:
    visible: ".*Welcome back.*"
    timeout: 10000
    optional: true
- extendedWaitUntil:
    visible: ".*Quick Check-in.*"
    timeout: 5000
    optional: true
