# common/warmup.yaml
# Cold-start + bundle-load primer. Run ONCE at the start of a batch
# before any fast_login flows. Leaves the app on the Login screen.
#
# All subsequent flows in the batch use `fast_login_as_persona.yaml`
# which starts with `clearState: false` — so the bundle stays loaded
# + dev-client stays connected.
#
# Time cost: ~90-120s (mostly bundle download). Pays back after the
# 2nd flow in a batch.
appId: com.kalpx.app
---
- launchApp:
    clearState: true
- runFlow: connect_dev_client.yaml
