# Week 4 REG-015 — Trigger round 2 must not carry state from round 1
# Asserts: trigger_round increments; no contamination of trigger_mantra_text
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

# Round 1
- tapOn:
    text: "I feel triggered."
    optional: true
- waitForAnimationToEnd
- tapOn:
    point: "50%,50%"
- waitForAnimationToEnd
- tapOn:
    text: ".*Return to Mitra Home.*|.*I feel calmer now.*"
    optional: true
- waitForAnimationToEnd

# Round 2 — back on dashboard
- tapOn:
    text: "I feel triggered."
    optional: true
- waitForAnimationToEnd

# Sound bridge should again be pristine (REG-015 — round counter bumped)
- assertVisible:
    text: ".*Hum with me.*|.*ॐ.*"
    optional: true
- tapOn:
    point: "50%,50%"
- waitForAnimationToEnd

# Mantra runner — must not show state bleed
- assertNotVisible:
    text: "recheck"
    optional: true

- tapOn:
    text: ".*Return to Mitra Home.*|.*I feel calmer now.*"
    optional: true
