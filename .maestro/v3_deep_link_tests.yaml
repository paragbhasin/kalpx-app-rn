# ══════════════════════════════════════════════════════════════════════════
- openLink: "kalpx://mitra/welcome_onboarding/turn_1"
- waitForAnimationToEnd
- takeScreenshot: "screenshots/v3_deep_link_welcome_onboarding_turn_1"
