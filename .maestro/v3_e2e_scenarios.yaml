# ══════════════════════════════════════════════════════════════════════════
# SCENARIO G: Welcome-back after 30-day absence
# User: test+absent30d@kalpx.com — last_active 30+ days ago
# ══════════════════════════════════════════════════════════════════════════

- launchApp:
    clearState: true
    clearKeychain: true
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "Development servers"
    commands:
      - tapOn:
          text: "http://.*:8081.*"
      - extendedWaitUntil:
          notVisible: "Development servers"
          timeout: 90000
      - waitForAnimationToEnd
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd

- runFlow:
    file: login.yaml
    env:
      EMAIL: test+absent30d@kalpx.com
      PASSWORD: Test1234!
- waitForAnimationToEnd

# Welcome-back screen should auto-render
- assertVisible:
    text: ".*Welcome back.*|.*welcome back.*"
    optional: true
- takeScreenshot: "screenshots/v3_e2e_G_welcome_back"

# Welcome-back line should reference the user's path intent
- assertVisible:
    text: ".*walking.*|.*practice.*|.*remembered.*|.*path.*"
    optional: true

# Two options: continue or start fresh
- assertVisible:
    text: ".*Continue.*|.*Start Fresh.*"
    optional: true

# Tap continue
- tapOn:
    text: ".*Continue with.*"
    optional: true
- waitForAnimationToEnd

# Should land on dashboard (day 1 of new cycle)
- assertVisible:
    text: ".*Day.*|.*Mitra.*|.*My Routine.*"
    optional: true
- takeScreenshot: "screenshots/v3_e2e_G_welcome_back_dashboard"
