      visible: "Development servers"
    commands:
      - tapOn:
          text: "http://.*:8081.*"
      - extendedWaitUntil:
          notVisible: "Development servers"
          timeout: 90000
      - waitForAnimationToEnd
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd

- runFlow:
    file: login.yaml
    env:
      EMAIL: test+day14unresolved@kalpx.com
      PASSWORD: Test1234!
- waitForAnimationToEnd

# Should auto-route to day 14 checkpoint
- tapOn:
    text: "My Routine|Resume|Continue|Begin"
    optional: true
- waitForAnimationToEnd

# Verify day 14 framing
- assertVisible:
    text: ".*Two weeks.*|.*14.*|.*journey.*|.*reflection.*"
