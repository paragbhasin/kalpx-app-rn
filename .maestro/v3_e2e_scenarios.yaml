# v3 End-to-End Scenario Flows
#
# Seven user-journey scenarios covering fresh onboarding, support flows,
# crisis, checkpoints, and return-after-absence. Each scenario uses a
# dedicated test user seeded on dev via seed_test_journey.py.
#
# Pre-reqs:
#   - Dev build running on iPhone 15 Pro simulator (com.kalpx.app)
#   - Metro bundler on :8081
#   - Backend healthy on dev.kalpx.com
#   - Test users seeded with soft_verified=True
#
# Run:
#   maestro test .maestro/v3_e2e_scenarios.yaml
#
# All test user passwords: Test1234!

appId: com.kalpx.app
tags:
  - v3
  - e2e
  - regression
---

# ══════════════════════════════════════════════════════════════════════════
# SCENARIO A: Fresh user onboarding (8 turns -> dashboard with triad)
# User: test+fresh1@kalpx.com — no journey, no prior onboarding
# ══════════════════════════════════════════════════════════════════════════

- launchApp:
    clearState: true
    clearKeychain: true
- waitForAnimationToEnd

# Dev-client launcher bypass (debug builds only)
- runFlow:
    when:
      visible: "Development servers"
    commands:
      - tapOn:
          text: "http://.*:8081.*"
      - extendedWaitUntil:
          notVisible: "Development servers"
          timeout: 90000
      - waitForAnimationToEnd

# Expo tutorial overlay bypass
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd

# Login as fresh user via drawer
- tapOn: "Menu"
- waitForAnimationToEnd
- tapOn: "Log In"
- waitForAnimationToEnd
- assertVisible: "Connect to Your Roots"
- tapOn:
    text: "Username"
- inputText: "test+fresh1@kalpx.com"
- hideKeyboard
- tapOn:
    text: "Password"
- inputText: "Test1234!"
- hideKeyboard
- tapOn: "LOGIN"
- extendedWaitUntil:
    notVisible: "Signing in..."
    timeout: 30000
- tapOn:
    text: "Not now|Maybe later|Skip|Cancel"
    optional: true
- waitForAnimationToEnd

# Turn 1 — Intro
- assertVisible: "I'm Mitra"
- assertVisible: "I'd like that"
- takeScreenshot: "screenshots/v3_e2e_A_turn1"
- tapOn: "I'd like that"
- waitForAnimationToEnd

# Turn 2 — What's alive
- assertVisible: "What's alive for you?"
- takeScreenshot: "screenshots/v3_e2e_A_turn2"
- tapOn: "Work needs more clarity"
- waitForAnimationToEnd

# Turn 3 — Texture
- assertVisible:
    text: ".*texture.*|.*feels like.*"
- takeScreenshot: "screenshots/v3_e2e_A_turn3"
- tapOn: "Heavy — everything weighs"
- waitForAnimationToEnd

# Turn 4 — Voice/text
- assertVisible: "Keep it written"
- takeScreenshot: "screenshots/v3_e2e_A_turn4"
- tapOn: "Keep it written"
- waitForAnimationToEnd

# Turn 5 — Guidance mode
- assertVisible:
    text: ".*blend.*|.*living traditions.*"
- takeScreenshot: "screenshots/v3_e2e_A_turn5"
- tapOn:
    text: ".*blend.*|.*A blend.*"
- waitForAnimationToEnd

# Turn 6 — Recognition
- assertVisible:
    text: ".*RECOGNITION.*|.*recognition.*|.*briefing.*"
- takeScreenshot: "screenshots/v3_e2e_A_turn6"
- tapOn: "Show me my path first"
- waitForAnimationToEnd

# Turn 7 — Path emerges (triad cards)
- assertVisible: "Your mantra"
- assertVisible: "Your intention"
- assertVisible: "Your practice"
- takeScreenshot: "screenshots/v3_e2e_A_turn7"
- tapOn: "I'm ready"
- waitForAnimationToEnd

# Landing: Dashboard with triad
- takeScreenshot: "screenshots/v3_e2e_A_dashboard_landing"
- assertVisible:
    text: ".*Day.*|.*Mantra.*|.*Mitra.*"
    optional: true


# ══════════════════════════════════════════════════════════════════════════
# SCENARIO B: Support flow (trigger) from dashboard
# User: test+day3@kalpx.com — active journey, day 3
# ══════════════════════════════════════════════════════════════════════════

# Re-login as day3 user
- launchApp:
    clearState: true
    clearKeychain: true
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "Development servers"
    commands:
      - tapOn:
          text: "http://.*:8081.*"
      - extendedWaitUntil:
          notVisible: "Development servers"
          timeout: 90000
      - waitForAnimationToEnd
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd

- runFlow:
    file: login.yaml
    env:
      EMAIL: test+day3@kalpx.com
      PASSWORD: Test1234!
- waitForAnimationToEnd

# Navigate to dashboard
- tapOn:
    text: "My Routine|Resume|Continue|Begin"
    optional: true
- waitForAnimationToEnd

# Enter trigger flow
- tapOn:
    text: ".*Triggered.*|.*I Feel Triggered.*|.*triggered.*"
    optional: true
- waitForAnimationToEnd

# Verify trigger screen
- assertVisible:
    text: ".*triggered.*|.*Triggered.*|.*feeling.*"
    optional: true
- takeScreenshot: "screenshots/v3_e2e_B_trigger_entry"

# Suggestions should appear after selection
- tapOn:
    text: ".*anxiety.*|.*anger.*|.*overwhelm.*|.*fear.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "screenshots/v3_e2e_B_trigger_suggestions"

# Return to dashboard
- tapOn:
    text: ".*Return.*|.*Back.*|.*Home.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "screenshots/v3_e2e_B_return_dashboard"


# ══════════════════════════════════════════════════════════════════════════
# SCENARIO C: Grief room from deep link
# User: same session (day3) — grief room is accessible to any active user
# ══════════════════════════════════════════════════════════════════════════

- openLink: "kalpx://mitra/support_grief/room"
- waitForAnimationToEnd

# Verify grief room renders
- takeScreenshot: "screenshots/v3_e2e_C_grief_room_entry"

# Opening line should be present (slot-resolved — cannot predict text)
# But screen should NOT be blank
- assertNotVisible:
    text: "undefined|null|NaN"
    optional: true

# Pill options should be visible
- assertVisible:
    text: ".*Sit with me.*|.*I'll come back.*"
    optional: true
- takeScreenshot: "screenshots/v3_e2e_C_grief_room_pills"

# Exit grief room
- tapOn:
    text: ".*I'll come back.*|.*Exit.*|.*Back.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "screenshots/v3_e2e_C_grief_exit"


# ══════════════════════════════════════════════════════════════════════════
# SCENARIO D: Crisis room
# ══════════════════════════════════════════════════════════════════════════

- openLink: "kalpx://mitra/crisis_room/grounding"
- waitForAnimationToEnd

# Verify crisis room renders with opening line
- assertVisible:
    text: ".*I hear.*|.*safe.*|.*here.*|.*grounding.*"
    optional: true
- takeScreenshot: "screenshots/v3_e2e_D_crisis_room"

# Hotlines should be visible (India + US numbers)
- assertVisible:
    text: ".*helpline.*|.*AASRA.*|.*Vandrevala.*|.*988.*|.*741741.*|.*crisis.*"
    optional: true
- takeScreenshot: "screenshots/v3_e2e_D_crisis_hotlines"

# Opening line should be present
- assertNotVisible:
    text: "undefined|null|NaN"
    optional: true

# Exit crisis room
- tapOn:
    text: ".*Return.*|.*Back.*|.*I'm okay.*|.*Exit.*"
    optional: true
- waitForAnimationToEnd


# ══════════════════════════════════════════════════════════════════════════
# SCENARIO E: Day 7 checkpoint (auto-routes)
# User: test+day7@kalpx.com — journey at day 7
# ══════════════════════════════════════════════════════════════════════════

- launchApp:
    clearState: true
    clearKeychain: true
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "Development servers"
    commands:
      - tapOn:
          text: "http://.*:8081.*"
      - extendedWaitUntil:
          notVisible: "Development servers"
          timeout: 90000
      - waitForAnimationToEnd
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd

- runFlow:
    file: login.yaml
    env:
      EMAIL: test+day7@kalpx.com
      PASSWORD: Test1234!
- waitForAnimationToEnd

# Navigate to routine — should auto-route to checkpoint
- tapOn:
    text: "My Routine|Resume|Continue|Begin"
    optional: true
- waitForAnimationToEnd

# Verify day 7 checkpoint framing
- assertVisible:
    text: ".*Has.*|.*Day 7.*|.*reflection.*|.*practice felt.*"
    optional: true
- takeScreenshot: "screenshots/v3_e2e_E_day7_checkpoint"

# Verify feeling options
- assertVisible:
    text: ".*steady.*|.*shift.*|.*finding my way.*|.*heaviness.*"
    optional: true

# Select a feeling
- tapOn:
    text: ".*steady.*"
    optional: true
- waitForAnimationToEnd

# Submit
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd

# Checkpoint results
- takeScreenshot: "screenshots/v3_e2e_E_day7_results"

# Tap primary action
- tapOn:
    text: ".*Continue.*Path.*|.*Choose.*|.*Lighten.*"
    optional: true
- waitForAnimationToEnd

# Should land on dashboard
- assertVisible:
    text: ".*Day.*|.*Mitra.*|.*My Routine.*"
    optional: true
- takeScreenshot: "screenshots/v3_e2e_E_day7_return_dashboard"


# ══════════════════════════════════════════════════════════════════════════
