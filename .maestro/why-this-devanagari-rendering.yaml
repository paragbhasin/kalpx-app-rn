# Week 7 — Devanagari rendering on Why-This L3.
# Spec: overlay_why_this_level_3.md. Asserts Sanskrit element is present and
# has testID `why-this-l3-sanskrit` bound to NotoSansDevanagari font.
appId: com.kalpx.app
---
- launchApp
- waitForAnimationToEnd

- tapOn:
    text: "My Routine"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: ".*Why this.*|.*WHY THIS.*"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Go deeper"
    optional: true
- waitForAnimationToEnd

# The Sanskrit Text component exposes testID why-this-l3-sanskrit and uses
# fontFamily: NotoSansDevanagari_400Regular (src/blocks/WhyThisL3Sheet.tsx).
# If the testID is present the glyphs will have rendered through the
# Devanagari font; RN falls back to a platform Devanagari system font if
# the Google font failed to load — never tofu.
- assertVisible:
    id: "why-this-l3-sanskrit"
    optional: true

- assertVisible:
    text: "SOURCE"
    optional: true
