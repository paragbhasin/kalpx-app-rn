<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Filter for the energetic texture -->
    <filter id="energyTexture" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" result="noise" seed="5" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="30" />
    </filter>

    <radialGradient id="orbGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="20%" stop-color="#FFF59D" />
      <stop offset="50%" stop-color="#FDD835" />
      <stop offset="80%" stop-color="#F9A825" />
      <stop offset="100%" stop-color="#EF6C00" />
    </radialGradient>
    
    <radialGradient id="edgeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="rgba(255, 255, 255, 0)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.4)" />
    </radialGradient>
  </defs>

  <!-- Background Glow -->
  <circle cx="200" cy="200" r="180" fill="#FBC02D" opacity="0.2" filter="blur(40px)" />
  
  <!-- The Main Textured Orb -->
  <circle cx="200" cy="200" r="140" fill="url(#orbGradient)" filter="url(#energyTexture)" />
  
  <!-- Highlights and Rim Light -->
  <circle cx="200" cy="200" r="140" fill="url(#edgeGlow)" />
  
  <!-- Core Glow -->
  <circle cx="200" cy="200" r="60" fill="white" filter="blur(25px)" opacity="0.7" />
  <circle cx="200" cy="200" r="30" fill="white" filter="blur(10px)" opacity="0.9" />
</svg>
