  - principle_id: bhakti_sant_namdeva_the_divine_is_in_the_work_of_your_hands
    tradition_family: bhakti
    tier: 2
    priority: 1
    status: draft
    principle_name: "The Divine is in the work of your hands"
    short_label: "Nāmdeva's craft-bhakti"

    core_teaching: >
      Nāmdeva taught bhakti through his craft as a tailor. The devotional
      life and the working life were not separate for him — every garment
      stitched with love was a devotional act. Skilled work done with the
      heart toward the Divine is itself a form of bhakti.

    plain_english: >
      Nāmdeva was a tailor. He stitched cloth and sang to Viṭṭhal and in
      his teaching the two were never separate. The devotional life was not
      other than the working life. Every garment stitched with attention
      was a stitch toward the Lord. Your ordinary skilled work can be this:
      not distraction from the sacred, but the shape it takes today.

    universal_explanation: >
      Work and spiritual life are often experienced as competing demands.
      Nāmdeva's teaching dissolves this competition: when skilled work
      is done with the heart turned toward the Divine, the work itself
      becomes the devotional practice. The ordinary craft is the bhakti.

    rooted_explanation: >
      Nāmdeva (13th–14th c., Maharashtra) was a tailor and a companion
      of Jñāneśvara. His abhangas address Viṭṭhal through the metaphor
      of tailoring — preparing cloth as a metaphor for the soul being
      prepared for the Lord. His craft-bhakti teaching is doctrinally
      distinct from BG karma-yoga (detached action as discipline):
      it is bhakti expressed through and in the craft, not detachment
      from the craft. The heart turned in love transforms the work's
      register, not the work's form.

    sources:
      - text: "Nāmdeva Gāthā"
        chapter: 1
        verse_start: 1
        verse_end: 10
        source_reference: "NG — Shivta shivta"
        note: "Nāmdeva's abhangas on tailoring as devotional act — craft-bhakti in the Sant tradition."

    state_tags:
      - work_disconnection
      - purpose_in_daily_work
      - craft_as_spiritual
      - daily_life_sanctified

    relevances:
      - framework: guna
        value: sattva
      - framework: klesha
        value: avidya
      - framework: kosha
        value: vijnanamaya

    tone_modes:
      - mode: universal
        text: "Skilled work done with love is already the practice. Not preparation for it."
      - mode: hybrid
        text: "Nāmdeva stitched cloth and sang. In his teaching, those were the same act."
      - mode: rooted
        text: "Craft-bhakti — the heart turned toward the Divine makes the work itself the offering."

    why_this_levels:
      level1: "The work you do with care is already the practice. Not a distraction from it."
      level2: "The split between work and spiritual life is a false split. Nāmdeva's teaching reconnects them through love."
      level3: >
        Nāmdeva's craft-bhakti differs from BG karma-yoga in a precise way:
        karma-yoga teaches detachment from the fruit of action;
        craft-bhakti teaches that love for the Divine transforms the
        action's register without detaching from it. The tailor who sings
        to Viṭṭhal while stitching is not detached from the cloth.
        The cloth is the offering.

