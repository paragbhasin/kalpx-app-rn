  - principle_id: bhakti_sant_mira_i_have_chosen_the_path_that_cannot_be_taken_back
    tradition_family: bhakti
    tier: 2
    priority: 1
    status: draft
    principle_name: "I have chosen the path that cannot be taken back"
    short_label: "Mirabai's irrevocable love"

    core_teaching: >
      Mirabai's bhakti is defined by its irrevocability. She left the palace,
      left convention, left the possibility of return. The completeness of
      the giving-over is what makes it real. Half-surrender is not the
      Sant path.

    plain_english: >
      Mirabai sang: Main toh Giridhar ke ghar jāun — I am going to the house
      of the One who holds the mountain. She had left the palace. She had left
      convention. There was no return because she had given herself entirely,
      and the giving was complete. The path of complete love has no backward door.

    universal_explanation: >
      People often protect themselves from full commitment in love —
      spiritual or relational — by keeping a path of return open.
      Mirabai's teaching is that the completeness of the surrender
      is what makes it real. The kept exit-route is the thing that
      prevents arrival.

    rooted_explanation: >
      Mirabai's pada "Main toh Giridhar ke ghar jāun" (I will go to
      Giridhar's house) expresses irreversible surrender to Kṛṣṇa as
      her divine husband. Her theology of kṛṣṇa-bhakti-as-svayambara —
      the soul's self-choosing of the Lord as its true spouse — treats
      complete surrender not as loss of self but as the soul's truest
      self-recognition. The irrevocability is not desperation but
      the sign of the surrender's authenticity.

    sources:
      - text: "Mirabai Padas — Main toh Giridhar ke ghar jāun"
        chapter: 1
        verse_start: 1
        verse_end: 1
        source_reference: "Mirabai — Main toh Giridhar"
        note: "Declaration of irrevocable surrender to Kṛṣṇa as the divine spouse."
        verse_iast: >
          maiṁ to giridhar ke ghara jāuṁ |
          giridhar mero sācā prītama, desa duniyā kī bāta na lāuṁ ||

    state_tags:
      - commitment
      - complete_surrender
      - irrevocable_love
      - path_walking

    relevances:
      - framework: guna
        value: sattva
      - framework: klesha
        value: abhinivesha
      - framework: kosha
        value: anandamaya

    tone_modes:
      - mode: universal
        text: "Complete love has no backward door. This is not recklessness — it is the only kind of love that arrives."
      - mode: hybrid
        text: "Mirabai left everything behind. The leaving was not the tragedy. It was the practice."
      - mode: rooted
        text: "Svayambara — the soul's choosing of the Lord — is complete when it can no longer imagine the unchosen path."

    why_this_levels:
      level1: "Complete love has no backward door. The giving-over is what makes it real."
      level2: "Half-surrender protects the self from the fullness of love. Mirabai's teaching is about removing that protection."
      level3: >
        Mirabai's path is often read as biographical martyrdom.
        It is better read as theological precision: the kept
        exit-route is the ego's hedge. Real surrender does not
        hedge. The path that cannot be taken back is the one
        that has actually been taken.

    room_fit: [connection]
    life_context_bias: [relationships, self]
    surface_eligibility: [wisdom_teaching, wisdom_banner]
    pool_role: rotation
    emotional_function_tag: deepen
    action_family: teaching
