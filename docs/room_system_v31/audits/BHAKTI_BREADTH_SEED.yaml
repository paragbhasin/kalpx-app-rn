  - principle_id: bhakti_sant_kabir_the_divine_has_no_address_look_inside
    tradition_family: bhakti
    tier: 2
    priority: 1
    status: draft
    principle_name: "The Divine has no address — look inside"
    short_label: "Kabīr's inward turn"

    core_teaching: >
      Kabīr's nirguṇa bhakti teaches that the formless divine cannot be
      found in any external address — not in mosque, temple, or pilgrimage.
      The search outward is the error. The turn inward is the correction.

    plain_english: >
      Kabīr said: you have been going to the mosque and the temple and the
      river, searching everywhere outside. The One you seek is the only one
      who has never left. Stop going out. Go in. The address was always
      your own chest.

    universal_explanation: >
      Spiritual seeking often externalizes the search — the right
      teacher, the right practice, the right place. Kabīr cuts through
      this with a single direct statement: the formless divine is not
      locatable outside because it has no form to locate. The inward
      turn is not a technique but a recognition.

    rooted_explanation: >
      Kabīr's doha: Moko kahan dhundhe re bande, main to tere paas mein
      (Where do you search for me, O seeker? I am right beside you).
      This doha is among the most cited in the Sant corpus. Kabīr's
      nirguṇa bhakti (devotion to the formless/attributeless divine)
      cuts across pilgrimage-as-solution with theological precision:
      the divine is not locatable in forms because it is formless
      and interior. Source: Kabīr Granthāvalī, Sākhī section.

    sources:
      - text: "Kabīr Granthāvalī — Sākhī"
        chapter: 1
        verse_start: 1
        verse_end: 1
        source_reference: "KG Sākhī — Moko kahan dhundhe"
        note: "The foundational doha on the divine's interior address."
        verse_iast: >
          moko kahāṁ dhūṁdhe re bande, maiṁ to tere pāsa meṁ |
          na maiṁ devaḷ na maiṁ masjid, na kābe kailāsa meṁ ||

    state_tags:
      - searching
      - external_seeking
      - spiritual_homesickness
      - simplicity

    relevances:
      - framework: guna
        value: sattva
      - framework: klesha
        value: avidya
      - framework: kosha
        value: vijnanamaya

    tone_modes:
      - mode: universal
        text: "Stop looking outside. What you are looking for has never been anywhere else."
      - mode: hybrid
        text: "Kabīr has a single direction: stop going out. Go in."
      - mode: rooted
        text: "Moko kahan dhundhe — the divine has no external address. The chest is the only landmark."

    why_this_levels:
      level1: "Stop going out. Go in. That is the whole direction."
      level2: "External seeking is often a way of avoiding the inward turn. Kabīr forecloses the avoidance directly."
      level3: >
        The theological ground of Kabīr's inward turn is not mystical
        vagueness but the precise claim of nirguṇa bhakti: the formless
        divine has no spatial coordinates. To seek it in a building or
        a river is a category error. The correction is immediate:
        the seeker turns to the one place the formless actually is.

    room_fit: [connection]
    life_context_bias: [self, daily_life]
    surface_eligibility: [wisdom_teaching, wisdom_banner]
