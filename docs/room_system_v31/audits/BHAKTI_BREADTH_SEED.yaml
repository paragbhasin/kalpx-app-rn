  # ===========================================================================
  # ĀLVĀR TRADITION — 4 rows
  # Texts: Divya Prabandham (Nammāḷvār Tiruvāymoḻi, Āṇḍāḷ Tiruppāvai,
  #         Tirumangai Ālvār Periya Tirumoli), Rāmānuja Gadya-traya
  # Register: prapatti (surrender), daas (servant), divine nearness,
  #            the ordinary illuminated by divine vision
  # ===========================================================================

  - principle_id: bhakti_alvar_i_am_yours_completely_and_that_is_the_rest
    tradition_family: bhakti
    tier: 2
    priority: 1
    status: draft
    principle_name: "I am yours completely, and that is the rest"
    short_label: "Prapatti as total ease"

    core_teaching: >
      The Ālvār tradition's theology of prapatti — total surrender — teaches
      that the deepest rest is found not in effortful holding but in
      complete self-giving. The one who has nothing left to protect
      discovers a rest that effort alone cannot reach.

    plain_english: >
      Nammāḷvār sings: I have no self to protect, nothing of my own
      to hold back. I am Yours entirely, and in that giving-over I find
      I no longer need to carry myself. This is what the Ālvār teachers
      call the rest that is deeper than sleep.

    universal_explanation: >
      The effort to maintain oneself — to hold the self together under
      pressure — is one of the subtler forms of exhaustion. The Ālvār
      tradition offers a different register: complete belonging
      that does not require the self's constant effort to sustain.

    rooted_explanation: >
      Tiruvāymoḻi 6.10 (Nammāḷvār): āḷvarēn nilaiyē — "I belong
      completely." The theology of śeṣatva (the self's absolute belonging
      to the Lord) is foundational to Śrīvaiṣṇava doctrine. Rāmānuja's
      Gadya-traya codifies ātma-nikṣepa (self-placement, the sixth aṅga
      of prapatti) as the act by which the practitioner stops carrying
      themselves and hands that weight entirely to the Lord.

    sources:
      - text: "Tiruvāymoḻi (Nammāḷvār)"
        chapter: "6.10"
        verse_start: 1
        verse_end: 11
        source_reference: "Tvm 6.10"
        note: "Āḷvarēn nilaiyē — the declaration of complete belonging."
      - text: "Gadya-traya (Rāmānuja)"
        chapter: 1
        verse_start: 1
        verse_end: 6
        source_reference: "GT Śaraṇāgati-gadya 1-6"
        note: "Ātma-nikṣepa — self-placement as the sixth aṅga of prapatti."

    state_tags:
      - self_protection_exhaustion
      - carrying_alone
      - surrender
      - deep_rest

    relevances:
      - framework: guna
        value: sattva
      - framework: klesha
        value: abhinivesha
      - framework: kosha
        value: anandamaya

    tone_modes:
      - mode: universal
        text: "The deepest rest is not earned by effort. It comes when you stop carrying yourself."
      - mode: hybrid
        text: "Give yourself completely over. In that giving, find the rest you've been looking for."
      - mode: rooted
        text: "Ātma-nikṣepa — self-placement — is prapatti's completion. The one who has given over is held."

    why_this_levels:
      level1: "Stop carrying yourself. You are already held."
      level2: "Self-protection is exhausting. Prapatti does not require protection because it places the self in hands larger than its own effort."
      level3: >
        Nammāḷvār's theology of śeṣatva is not renunciation —
        it is recognition. The self was never self-owned. Complete
        belonging is not a practice to accomplish but a reality to
        receive. Ātma-nikṣepa is the gesture that acknowledges what
        is already true.

    room_fit: [connection]
    life_context_bias: [self, relationships]
    surface_eligibility: [wisdom_teaching, wisdom_banner]
    pool_role: anchor
    emotional_function_tag: deepen
    action_family: teaching
    intensity: low
    standalone_safe_flag: true
    repeat_tolerance_level: high
