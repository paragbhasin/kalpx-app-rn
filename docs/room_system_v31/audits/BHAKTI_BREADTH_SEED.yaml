  - principle_id: bhakti_gaudia_love_that_aches_is_already_meeting
    tradition_family: bhakti
    tier: 2
    priority: 2
    status: draft
    principle_name: "Love that aches is already a meeting"
    short_label: "Viraha resolves in ānanda"

    core_teaching: >
      Gauḍīya theology teaches that viraha (the pain of love's longing)
      is simultaneously the highest joy because it is the form love takes
      when it is most complete. The ache and the fullness are not sequential —
      they are the same state seen from two angles.

    plain_english: >
      The Gauḍīya saints teach that the ache of love is not the opposite
      of its joy. It is how the joy deepens. Rādhā's longing is described
      as the highest bliss. What you feel as reaching is already the
      fullness arriving.

    universal_explanation: >
      People often experience longing and joy as opposites — either the
      beloved is here (joy) or absent (pain). The Gauḍīya insight cuts
      across this: the deepest love contains both registers simultaneously.
      This is not a spiritual consolation prize; it is a precise
      description of what the devotional heart actually experiences.

    rooted_explanation: >
      Caitanya-caritāmṛta Ādi 4.68 and Rūpa Gosvāmī's Ujjvala-nīlamaṇi
      on mādhurya-bhāva: Rādhā's viraha is the devotional peak precisely
      because it is where love and longing are indistinguishable. The
      Gauḍīya tradition uniquely codes viraha not as the prelude to
      ānanda but as ānanda's own most intense form.

    sources:
      - text: "Caitanya-caritāmṛta"
        chapter: "Ādi 4"
        verse_start: 68
        verse_end: 68
        source_reference: "CC Ādi 4.68"
        note: "Viraha as the expression of the highest love — ānanda and vedanā united."
      - text: "Ujjvala-nīlamaṇi (Rūpa Gosvāmī)"
        chapter: 14
        verse_start: 154
        verse_end: 154
        source_reference: "UN 14.154"
        note: "Mahābhāva as the union of viraha and ānanda in Rādhā's love."

    state_tags:
      - longing
      - bittersweet
      - love_and_loss
      - devotional_fullness

    relevances:
      - framework: guna
        value: sattva
      - framework: klesha
        value: abhinivesha
      - framework: kosha
        value: anandamaya

    tone_modes:
      - mode: universal
        text: "The ache of real love is already the fullness — not its absence."
      - mode: hybrid
        text: "Love that aches has already arrived. The ache is the meeting."
      - mode: rooted
        text: "Viraha and ānanda are not two states. In mahābhāva they are one."

    why_this_levels:
      level1: "The ache and the fullness are not sequential. They are the same thing."
      level2: "Treating longing as a deficit blocks the recognition of what is already present."
      level3: >
        Rūpa Gosvāmī's codification of mahābhāva as the simultaneous
        peak of viraha and ānanda is one of the most precise maps in
        bhakti theology. The devotee who recognizes this stops waiting
        for the ache to end before experiencing the fullness.

    room_fit: [connection, joy]
    life_context_bias: [relationships, self]
    surface_eligibility: [wisdom_banner]
    pool_role: rotation
    emotional_function_tag: offer
    action_family: teaching
    intensity: low
    standalone_safe_flag: true
    repeat_tolerance_level: high
    multi_room_justification: >
      Gauḍīya viraha-bhakti doctrine explicitly collapses the connection/joy
      distinction. Viraha is simultaneously reaching (connection) and the
      highest joy (joy). Banner format only — teaching slots need single-register
      instruction; this paradox is banner-native.
    exclude_from_contexts: []
    CURATOR_GATE: true

  - principle_id: bhakti_gaudia_serve_the_beloved_through_every_ordinary_act
    tradition_family: bhakti
    tier: 2
    priority: 1
    status: draft
    principle_name: "Serve the Beloved through every ordinary act"
    short_label: "Sevā transforms the ordinary"

    core_teaching: >
      The Gauḍīya path teaches that every act done with love for the
      Beloved becomes a form of worship. The ordinary life — cooking,
      speaking, caring — is already the devotional life when the heart
      is turned toward the Divine.

    plain_english: >
      You do not need a special time or place for devotional life.
      Cooking, cleaning, speaking gently — none of it is too small
      to be sevā. The ordinary life is already the devotional life
      when the heart is turned right.

    universal_explanation: >
      People often split ordinary life from their spiritual practice,
      treating one as preparation for the other. The Gauḍīya path
      dissolves this split: the care you give in daily life is itself
      the devotional offering when received in the right register.

    rooted_explanation: >
      Rūpa Gosvāmī's Bhakti-rasāmṛta-sindhu 1.2.187-195 catalogs the
      nine forms of bhakti, including pāda-sevana (service) and dāsya
      (devoted service) as forms that explicitly include the ordinary
      acts of care and tending. The Gauḍīya practice of deity-sevā
      (tending to the form of the Lord) extends this outward into all
      acts done with love.

    sources:
      - text: "Bhakti-rasāmṛta-sindhu (Rūpa Gosvāmī)"
        chapter: 1
        verse_start: 187
        verse_end: 195
        source_reference: "BRS 1.2.187-195"
        note: "The nine limbs of bhakti including pāda-sevana and dāsya — service as devotion."

    state_tags:
      - daily_life_disconnection
      - spiritual_bypass
      - relational_fatigue
      - purpose_in_small_things

    relevances:
      - framework: guna
        value: sattva
      - framework: klesha
        value: avidya
      - framework: kosha
        value: vijnanamaya

    tone_modes:
      - mode: universal
        text: "The ordinary act done with love is already the spiritual practice."
      - mode: hybrid
        text: "Serve what is before you. In the Gauḍīya path, that is already sevā."
      - mode: rooted
        text: "Pāda-sevana and dāsya include the small daily acts of care."

    why_this_levels:
      level1: "What you do with love for the other is already the practice."
      level2: "The split between devotional life and daily life is a false split. Gauḍīya sevā reconnects them."
      level3: >
        Rūpa Gosvāmī's nine-limb framework for bhakti was not meant
        for specialists. Dāsya and pāda-sevana are available in the
        kitchen and the conversation. The ordinary becomes sacred not
        by being elevated but by being received differently.

    room_fit: [connection]
    life_context_bias: [daily_life, relationships]
    surface_eligibility: [wisdom_teaching, wisdom_banner]
    pool_role: rotation
    emotional_function_tag: deepen
    action_family: teaching
    intensity: medium
    standalone_safe_flag: true
    repeat_tolerance_level: high
    exclude_from_contexts: []
    CURATOR_GATE: true

  - principle_id: bhakti_gaudia_ecstatic_love_is_a_form_of_knowing
    tradition_family: bhakti
    tier: 2
    priority: 2
    status: draft
    principle_name: "Ecstatic love is a form of knowing"
    short_label: "Bhāva as epistemology"

    core_teaching: >
      The Gauḍīya tradition teaches that the ecstatic states of bhakti —
      tears, trembling, loss of external awareness — are not irrationality
      but the highest form of knowing. The purified heart in ecstasy
      is in fuller contact with reality, not less.

    plain_english: >
      Chaitanya wept and danced and could not hold still — not because
      he had lost his mind but because he had found something the mind
      could not hold. Joy that overflows the container is not irrationality.
      In the Gauḍīya teaching, it is the truest sight.

    universal_explanation: >
      People raised in rational frameworks often treat emotional ecstasy
      as a sign of losing one's grip. The Gauḍīya tradition inverts this:
      the sāttvika-bhāvas (ecstatic symptoms) are involuntary responses
      of a heart in genuine contact. Overflow is not loss of control
      but evidence of arrival.

    rooted_explanation: >
      Caitanya-caritāmṛta Ādi 7.83-95 describes mahābhāva symptoms
      (tears, trembling, hair-standing-on-end, loss of speech) in
      Caitanya as signs of genuine Kṛṣṇa-contact, not as emotional
      excess. Rūpa Gosvāmī in Bhakti-rasāmṛta-sindhu 2.1 systematizes
      sāttvika-bhāvas as involuntary signifiers of the presence of
      the Beloved — they cannot be faked and they cannot be suppressed
      by a heart in genuine bhāva.

    sources:
      - text: "Caitanya-caritāmṛta"
        chapter: "Ādi 7"
        verse_start: 83
        verse_end: 95
        source_reference: "CC Ādi 7.83-95"
        note: "Mahābhāva symptoms as signs of genuine Kṛṣṇa-contact."
      - text: "Bhakti-rasāmṛta-sindhu (Rūpa Gosvāmī)"
        chapter: 2
        verse_start: 1
        verse_end: 48
        source_reference: "BRS 2.1.1-48"
        note: "Sāttvika-bhāvas — ecstatic symptoms as involuntary signs of genuine bhakti."

    state_tags:
      - joy_overflow
      - spiritual_opening
      - devotional_fullness
      - ecstatic_register

    relevances:
      - framework: guna
        value: sattva
      - framework: klesha
        value: avidya
      - framework: kosha
        value: anandamaya

    tone_modes:
      - mode: universal
        text: "Joy that overflows the container is not irrationality. It is the truest sight."
      - mode: hybrid
        text: "When love goes beyond what the mind can hold, that is not breakdown. That is arrival."
      - mode: rooted
        text: "Sāttvika-bhāvas — the tears, the trembling — are how the Beloved announces presence."

    why_this_levels:
      level1: "Ecstatic joy is not irrational. It is a more complete knowing."
      level2: "People suppress devotional overflow because they have been taught it is embarrassing. Gauḍīya tradition corrects this."
      level3: >
        Rūpa Gosvāmī's codification of ecstatic symptoms as devotional
        signifiers (not as emotional excess) protects the devotee from
        the error of suppressing or performing them. Genuine sāttvika-bhāvas
        cannot be manufactured; what overflows in real bhakti is evidence
        of genuine contact.

    room_fit: [joy]
    life_context_bias: [self, daily_life]
