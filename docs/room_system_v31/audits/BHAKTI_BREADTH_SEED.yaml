  - principle_id: bhakti_sant_kabir_love_does_not_ask_what_caste_you_belong_to
    tradition_family: bhakti
    tier: 2
    priority: 2
    status: draft
    principle_name: "Love does not ask what caste you belong to"
    short_label: "Kabīr's universal access"

    core_teaching: >
      Kabīr teaches that the nirguṇa divine — formless, without caste or
      community — is freely and equally available to all. The democratic
      accessibility of divine love is not a political statement but a
      theological consequence of the divine's formlessness.

    plain_english: >
      Kabīr said: God did not make castes. Love made no such list.
      The weaver from Varanasi and the Brahmin from the Ganges bank both
      arrive at the same door, and the door opens the same way for both —
      not through credentials, but through the simple turning of the heart.
      The divine is freely available. This is the joy.

    universal_explanation: >
      Feelings of unworthiness or exclusion from the spiritual often carry
      the shape of social rejection internalized. Kabīr's teaching cuts
      through this directly: the divine does not operate by the categories
      humans invented. Access requires only the turning of the heart.

    rooted_explanation: >
      Kabīr's doha: Jāti na pūcho sādhu kī, pūch lijiye jñān (Do not
      ask the caste of a holy person, ask for their wisdom). His consistent
      polemic against caste-based gatekeeping of the divine is theologically
      grounded in nirguṇa bhakti: the formless divine cannot be the
      possession of any community or lineage because it has no form.
      Universal access is not egalitarianism added to spirituality;
      it is a logical consequence of the divine's own nature.
      Source: Kabīr Granthāvalī, Doha section.

    sources:
      - text: "Kabīr Granthāvalī — Doha section"
        chapter: 1
        verse_start: 1
        verse_end: 1
        source_reference: "KG — Jāti na pūcho"
        note: "The foundational teaching on universal divine access over caste-credential."
        verse_iast: >
          jāti na pūcho sādhu kī, pūcha lijiye jñāna |
          mola karo talawāra kā, paḍā rahana do myāna ||

    state_tags:
      - unworthiness
      - exclusion_feeling
      - universal_belonging
      - joy_of_access

    relevances:
      - framework: guna
        value: sattva
      - framework: klesha
        value: asmita
      - framework: kosha
        value: anandamaya

    tone_modes:
      - mode: universal
        text: "The door opens the same way for everyone. Credentials are not the key."
      - mode: hybrid
        text: "Kabīr: God has no waiting list and no caste register. Turn the heart. That is the whole requirement."
      - mode: rooted
        text: "Jāti na pūcho — the formless divine has no caste. Universal access is the theological consequence."

    why_this_levels:
      level1: "The door is open. No credential required. The heart's turning is enough."
      level2: "Exclusion-feelings often borrow the shape of social rejection and apply it to the divine. Kabīr corrects this directly."
      level3: >
        The theological logic of Kabīr's universal-access teaching is
        precise: the nirguṇa divine has no attributes, no form, no
        community. A formless reality cannot be owned by any form-based
        community. Therefore access is universal by necessity, not by
        generosity. The joy of this is the subject of the teaching.

    room_fit: [joy]
    life_context_bias: [self, daily_life, relationships]
    surface_eligibility: [wisdom_banner]
