  - principle_id: bhakti_sant_tukaram_grace_finds_the_one_who_stops_performing
    tradition_family: bhakti
    tier: 2
    priority: 1
    status: draft
    principle_name: "Grace finds the one who stops performing"
    short_label: "Tukaram's nakedness before the Divine"

    core_teaching: >
      Tukaram's abhangas teach that the devotee who arrives before Viṭṭhal
      in honest confusion — not performing piety — is the one grace meets.
      The Sant path prizes naked honesty over sophisticated spiritual
      performance.

    plain_english: >
      Tukaram was a failed merchant, a social nobody by the standards
      of his time. He went to Viṭṭhal not dressed in piety but collapsed
      in honesty. He sang his confusion and his despair and his ordinary
      mess. And Viṭṭhal came. Grace is not attracted to performance.
      It finds the one who shows up as they actually are.

    universal_explanation: >
      Spiritual practice often carries the pressure to be in the right
      state before approaching the Divine. Tukaram's teaching inverts
      this: the ordinary mess is the presentation. The confusion
      and the failure are the content of the prayer, not obstacles to it.

    rooted_explanation: >
      Tukaram's abhangas (Marathi devotional poems to Viṭṭhal at
      Pandharpur) repeatedly address his own unworthiness, confusion,
      and family difficulties as the direct content of prayer —
      not as things to be resolved before prayer begins. His abhanga
      beginning "Āhān to mi deva" (I am this before you, God) is
      a paradigmatic expression of naked honesty as the highest
      devotional virtue in the Maharashtra Sant tradition.

    sources:
      - text: "Tukaram Gāthā — Āhān to mi deva"
        chapter: 1
        verse_start: 1
        verse_end: 4
        source_reference: "TG — Āhān to mi deva"
        note: "Naked self-presentation as the devotional offering — honesty over performance."

    state_tags:
      - spiritual_performance_fatigue
      - unworthiness
      - honest_prayer
      - grace_reception

    relevances:
      - framework: guna
        value: sattva
      - framework: klesha
        value: asmita
      - framework: kosha
        value: manomaya

    tone_modes:
      - mode: universal
        text: "You do not need to be in a better state before you arrive. Show up as you are."
      - mode: hybrid
        text: "Tukaram brought his confusion. Viṭṭhal came. Grace does not wait for performance."
      - mode: rooted
        text: "Āhān to mi deva — I am this before you, God. The honesty is the prayer."

    why_this_levels:
      level1: "Show up as you are. Grace finds the honest one, not the performing one."
      level2: "The pressure to perform spiritual correctness is its own obstacle. Tukaram removes it."
      level3: >
        The Maharashtra Sant tradition's valorization of honest
        self-presentation over polished devotion is not a lowering
        of standards but a different account of what the Divine
        responds to. Viṭṭhal in Tukaram's abhangas consistently
        comes to the broken, the confused, the farmer — not to
        the accomplished. The teaching is a theological claim:
        honest mess is more receivable than performed piety.

    room_fit: [connection]
    life_context_bias: [self, daily_life]
    surface_eligibility: [wisdom_teaching, wisdom_banner]
    pool_role: rotation
    emotional_function_tag: deepen
