  - principle_id: bhakti_alvar_no_ego_remains_when_the_beloved_fills_the_room
    tradition_family: bhakti
    tier: 2
    priority: 2
    status: draft
    principle_name: "No ego remains when the Beloved fills the room"
    short_label: "The self empties into love"

    core_teaching: >
      Nammāḷvār's final decade of the Tiruvāymoḻi describes the dissolution
      of the separate self into divine love. This is not emptiness but
      fullness — a fullness that belongs to the Beloved, not to the self
      that dissolved.

    plain_english: >
      Nammāḷvār describes the moment when he stopped being a person and
      became only the love. The Ālvārs are not shy about this: when the
      Divine enters, the small self does not argue or analyze. It dissolves.
      What remains is not emptiness but fullness — a fullness that is
      the Beloved's, not the self's.

    universal_explanation: >
      The self-protective ego often prevents the fullness of devotional
      surrender. The Ālvār tradition teaches that the dissolution of
      the ego is not a loss but the discovery of a fuller belonging —
      what was protecting the small self was also blocking the large one.

    rooted_explanation: >
      Nammāḷvār's Tiruvāymoḻi 10.10, the parama-padam (supreme state)
      decade, describes the ālvār's experience of mokṣa as bhakti-completion:
      the separate self dissolves into the Lord's presence, not as
      jñāna-liberation but as the relational fullness of being entirely
      received. The Ālvār tradition defines mukti as ānanda-service
      (nitya-sevā), not as contentless awareness.

    sources:
      - text: "Tiruvāymoḻi (Nammāḷvār)"
        chapter: "10.10"
        verse_start: 1
        verse_end: 11
        source_reference: "Tvm 10.10.1-11"
        note: "Parama-padam sequence — dissolution of the separate self into divine love."

    state_tags:
      - ego_dissolution
      - self_release
      - devotional_fullness
      - belonging

    relevances:
      - framework: guna
        value: sattva
      - framework: klesha
        value: asmita
      - framework: kosha
        value: anandamaya

    tone_modes:
      - mode: universal
        text: "When the Beloved fills the room, there is no longer room for the small self. This is not loss."
      - mode: hybrid
        text: "Let the self dissolve into the love. What remains is larger."
      - mode: rooted
        text: "Parama-padam — the self that belongs completely has nowhere left to be separate."

    why_this_levels:
      level1: "The small self dissolves into love. What remains is larger, not smaller."
      level2: "The ego that protects is also the ego that blocks the fuller belonging. The Ālvār tradition makes this explicit."
      level3: >
        Nammāḷvār's parama-padam is the Ālvār tradition's most complete
        account of what genuine bhakti arrives at: not knowledge-liberation
        (as Advaita would have it) but the fullness of being entirely
        received in love. The ego does not get liberated; it gets dissolved
        into the One it was always trying to find.

