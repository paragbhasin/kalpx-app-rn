principles:

  # ===========================================================================
  # GAUḌĪYA VAIṢṆAVISM — 5 rows
  # Texts: Caitanya-caritāmṛta, Bhakti-rasāmṛta-sindhu (Rūpa Gosvāmī),
  #         Śikṣāṣṭakam, Ujjvala-nīlamaṇi
  # Register: viraha-bhakti, mādhurya-bhāva, nāma-saṅkīrtana, ecstatic ānanda
  # ===========================================================================

  - principle_id: bhakti_gaudia_longing_itself_is_the_divine_nearness
    tradition_family: bhakti
    tier: 2
    priority: 1
    status: draft
    principle_name: "Longing itself is the Divine nearness"
    short_label: "Viraha is sāmīpya"

    core_teaching: >
      Gauḍīya Vaiṣṇavism teaches viraha-bhakti: the longing for the Beloved
      is not the absence of the Beloved but the most intimate form of the
      Beloved's presence. The ache and the meeting are not opposites.

    plain_english: >
      The longing you feel is not proof that the Divine is far away.
      In the Gauḍīya teaching, longing is the form closeness takes when
      love is deepest. You do not have to wait for the ache to stop
      before you feel held.

    universal_explanation: >
      People experiencing longing often treat it as a problem to solve —
      either by suppressing it or by finding what they are missing.
      The Gauḍīya path offers a different register: the longing itself
      is the relational contact, not the gap before it.

    rooted_explanation: >
      Caitanya-caritāmṛta Madhya 2.45 on mahābhāva: the highest
      devotional state is experienced by Rādhā as viraha — the pain of
      separation that is simultaneously the most intimate union.
      Rūpa Gosvāmī's Bhakti-rasāmṛta-sindhu 2.1.288 codifies viraha
      as śṛṅgāra-rasa at its peak — longing is not a deficit state
      but the most refined form of devotional love.

    sources:
      - text: "Caitanya-caritāmṛta"
        chapter: "Madhya 2"
        verse_start: 45
        verse_end: 45
        source_reference: "CC Madhya 2.45"
        note: "Viraha as mahābhāva — the highest devotional register."
      - text: "Bhakti-rasāmṛta-sindhu (Rūpa Gosvāmī)"
        chapter: 2
        verse_start: 288
        verse_end: 288
        source_reference: "BRS 2.1.288"
        note: "Viraha as peak śṛṅgāra-rasa; longing as devotional fullness."

    state_tags:
      - longing
      - relational_ache
      - divine_absence_feeling
      - isolation

    relevances:
      - framework: guna
        value: sattva
      - framework: klesha
        value: abhinivesha
      - framework: kosha
        value: anandamaya

    tone_modes:
      - mode: universal
        text: "The ache of love is not proof of separation. It is the most intimate contact."
      - mode: hybrid
        text: "Longing is the Beloved's nearness in its deepest form."
      - mode: rooted
        text: "Viraha is sāmīpya — the longing and the meeting are not two different things."

    why_this_levels:
      level1: "The ache is not proof of distance. It is the form closeness takes."
      level2: "Longing treated as a deficit makes the devotional life feel broken. Gauḍīya teaching restores it as the highest register."
      level3: >
        Rādhā's viraha in the Gauḍīya tradition is not a problem to solve
        before the devotional life can begin. It is the devotional life
        at its peak. The one who can sit with longing without collapsing
        it is in the deepest form of contact the tradition names.

    room_fit: [connection]
    life_context_bias: [relationships, self]
    surface_eligibility: [wisdom_teaching, wisdom_banner]
    pool_role: anchor
    emotional_function_tag: deepen
    action_family: teaching
    intensity: medium
    standalone_safe_flag: true
    repeat_tolerance_level: high
    exclude_from_contexts: []
    CURATOR_GATE: true

  - principle_id: bhakti_gaudia_the_name_holds_what_the_mind_cannot
    tradition_family: bhakti
    tier: 2
    priority: 1
    status: draft
    principle_name: "The Name holds what the mind cannot"
    short_label: "Nāma-saṅkīrtana is the refuge"

    core_teaching: >
      In the Gauḍīya tradition, the Name of the Beloved (Kṛṣṇa, Rāma, Hari)
      is not a technique or a mnemonic device. The Name is the actual presence
      of the Lord — nāma and nāmī (the name and the named) are non-different.
      When the mind cannot hold itself, the Name holds the mind.

    plain_english: >
      When the mind cannot hold itself together, say the Name.
      Not as a ritual, but because the Name is already the presence.
      Say it until the Name carries you, not the other way around.

    universal_explanation: >
      People in overwhelm often need something simpler than thought.
      The Gauḍīya path offers the Name as exactly this: a presence
      that is lighter than effort and more stable than the mind's
      attempts at self-stabilization.

    rooted_explanation: >
      Caitanya Mahāprabhu's Śikṣāṣṭakam verse 1 (ceto-darpaṇa-mārjanam):
      the Name cleans the mirror of consciousness, extinguishes the fire
      of conditioned existence, and spreads the moon-beam of good fortune.
      The Gauḍīya tradition treats this not as metaphor but as direct
      experience accessible to any sincere utterance of the Name.
      Bhāgavata 2.1.11 names the Name as the foremost sādhana in Kali.

    sources:
      - text: "Śikṣāṣṭakam (Caitanya Mahāprabhu)"
        chapter: 1
        verse_start: 1
        verse_end: 1
        source_reference: "Śikṣāṣṭakam 1"
        note: "Ceto-darpaṇa-mārjanam — the Name as consciousness-mirror cleaner."
        verse_iast: >
          ceto-darpaṇa-mārjanaṁ bhava-mahā-dāvāgni-nirvāpaṇaṁ
          śreyaḥ-kairava-candrikā-vitaraṇaṁ vidyā-vadhū-jīvanam
      - text: "Śrīmad Bhāgavata Purāṇa"
        chapter: 2
        verse_start: 1
        verse_end: 1
        source_translation_base: "prabhupada"
        source_reference: "Bhāg. 2.1.11"
        note: "The Name as the highest sādhana in the current age."

    state_tags:
      - overwhelm
      - mind_scattered
      - spiritual_homesickness
      - daily_stress

    relevances:
      - framework: guna
        value: sattva
      - framework: klesha
        value: avidya
      - framework: kosha
        value: manomaya

    tone_modes:
      - mode: universal
        text: "When the mind cannot hold itself, something else can hold it. Say the Name."
      - mode: hybrid
        text: "The Name is not a technique. It is a presence that carries you."
      - mode: rooted
        text: "Nāma and nāmī are non-different — the Name is the Lord's actual arrival."

    why_this_levels:
      level1: "Say the Name. The Name holds what the mind cannot."
      level2: "Overwhelm needs something lighter than thought. The Name is lighter."
      level3: >
        The Gauḍīya tradition's insistence on nāma-saṅkīrtana as the
        foremost sādhana of this age rests on a theological claim:
        the Name is not a symbol pointing to the Lord but the Lord's
        actual presence in sound. Utterance is already arrival.

    room_fit: [connection]
    life_context_bias: [daily_life, self]
    surface_eligibility: [wisdom_teaching, wisdom_banner]
    pool_role: rotation
    emotional_function_tag: deepen
    action_family: teaching
    intensity: low
    standalone_safe_flag: true
    repeat_tolerance_level: high
    exclude_from_contexts: []
