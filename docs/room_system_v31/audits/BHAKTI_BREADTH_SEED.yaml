  - principle_id: bhakti_alvar_the_whole_world_shines_when_love_is_real
    tradition_family: bhakti
    tier: 2
    priority: 1
    status: draft
    principle_name: "The whole world shines when love is real"
    short_label: "Bhakti illuminates the ordinary"

    core_teaching: >
      The Ālvārs moved through ordinary Tamil landscapes and in every
      direction they saw the Lord's beauty looking back at them.
      Real love opens the eyes to what was always there — the ordinary
      becomes luminous, not because it changed, but because the seeing did.

    plain_english: >
      The Ālvārs moved through temples and rivers and ordinary Tamil streets
      and everywhere they looked they saw the Lord's beauty looking back.
      The world was not an obstacle to the devotional life — it was the
      devotional life itself. This is what love does: it turns the ordinary
      into the luminous.

    universal_explanation: >
      The daily world often feels dull or burdensome, especially in
      routine. The Ālvār teaching does not recommend finding a better world
      but developing a different eye — one that perceives the auspicious
      qualities of the Divine already present in what is in front of us.

    rooted_explanation: >
      Tirumangai Ālvār's Periya Tirumoli and Nammāḷvār's Tiruvāymoḻi 3.3
      depict the divine beauty (tirumeṉi, divya-maṅgala-vigraha) reflected
      in the natural world — rivers, mountains, temples, the human form —
      as the devotee with opened eyes perceives it. The theological basis
      is the Ālvār insight that the Lord's kalyāṇa-guṇas (auspicious
      qualities) pervade and illuminate created things; seeing beauty
      everywhere is not sentiment but devotional vision.

    sources:
      - text: "Tiruvāymoḻi (Nammāḷvār)"
        chapter: "3.3"
        verse_start: 1
        verse_end: 11
        source_reference: "Tvm 3.3.1-11"
        note: "Nammāḷvār's vision of divine beauty in the natural world."
      - text: "Periya Tirumoli (Tirumangai Ālvār)"
        chapter: 1
        verse_start: 1
        verse_end: 10
        source_reference: "PTM 1.1-10"
        note: "Tirumeṉi — divine beauty perceivable in ordinary settings."

    state_tags:
      - devotional_joy
      - ordinary_luminous
      - gratitude
      - beauty_perception

    relevances:
      - framework: guna
        value: sattva
      - framework: klesha
        value: avidya
      - framework: kosha
        value: anandamaya

    tone_modes:
      - mode: universal
        text: "Love opens the eyes. The ordinary world becomes luminous when love is real."
      - mode: hybrid
        text: "The Ālvārs walked through the same world we walk through and saw beauty everywhere. What they had was an opened eye."
      - mode: rooted
        text: "Kalyāṇa-guṇas — the Lord's auspicious qualities — are already in the world. Bhakti teaches us to see them."

    why_this_levels:
      level1: "The world becomes luminous when love is real. The world did not change; the seeing did."
      level2: "Dull routines are often failures of perception, not of the world itself. Bhakti is a perceptual practice."
      level3: >
        The Ālvār poets were not romantics constructing a prettier world.
        They were reporting what the devotional eye actually sees: the
        Lord's kalyāṇa-guṇas reflected in everything that exists.
        The ordinary is luminous for those whose perception bhakti has opened.

