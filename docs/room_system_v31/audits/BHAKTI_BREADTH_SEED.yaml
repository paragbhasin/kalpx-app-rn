  - principle_id: bhakti_alvar_the_divine_is_not_far_it_is_waiting_at_the_door
    tradition_family: bhakti
    tier: 2
    priority: 1
    status: draft
    principle_name: "The Divine is not far — it waits at your door"
    short_label: "Perumāḷ's closeness"

    core_teaching: >
      The Ālvārs did not teach a distant God requiring elaborate approach.
      They taught immediacy: Perumāḷ (the Lord Viṣṇu) is already present,
      closer than the next breath, in the ordinary textures of daily life
      — recognizable to the devotee who has learned to look.

    plain_english: >
      The Ālvārs did not teach that God is distant and must be approached
      through elaborate discipline. They taught the opposite: Perumāḷ is
      already here, standing at the threshold of the ordinary day, closer
      than the next breath, easier to meet than we have been told.

    universal_explanation: >
      Spiritual practice is often framed as effort toward a distant
      attainment. The Ālvār tradition reframes this: the effort is not
      toward distance but toward recognition of presence. The Divine
      is not earned; it is perceived.

    rooted_explanation: >
      Āṇḍāḷ's Tiruppāvai 21-22 calls out to Kṛṣṇa as immediately present
      (ēlōr empāvāy — "our vow of all together"). Tirumangai Ālvār's
      Periya Tirumoli repeatedly invokes Viṣṇu as tirumeṉi — the beautiful
      form right here. The theological ground is Rāmānuja's doctrine of
      the world as the body of God (viśiṣṭādvaita): the divine is not
      spatially absent because it pervades and sustains all that exists.

    sources:
      - text: "Tiruppāvai (Āṇḍāḷ)"
        chapter: 1
        verse_start: 21
        verse_end: 22
        source_reference: "Tiruppāvai 21-22"
        note: "Ēlōr empāvāy — the Lord as immediately present and invocable."
      - text: "Periya Tirumoli (Tirumangai Ālvār)"
        chapter: 1
        verse_start: 1
        verse_end: 10
        source_reference: "Periya Tirumoli 1.1-10"
        note: "Tirumeṉi — the divine form as present and perceivable in the ordinary."

    state_tags:
      - divine_distance_feeling
      - spiritual_effort_fatigue
      - ordinary_day_disconnection
      - seeking

    relevances:
      - framework: guna
        value: sattva
      - framework: klesha
        value: avidya
      - framework: kosha
        value: vijnanamaya

    tone_modes:
      - mode: universal
        text: "The Divine is not far. It is at the threshold of the ordinary day."
      - mode: hybrid
        text: "Perumāḷ does not require a long journey. The meeting is already arranged."
      - mode: rooted
        text: "Tirumeṉi — the beautiful form — is perceivable in the ordinary world to the opened eye."

    why_this_levels:
      level1: "The Divine is not far. Look at the threshold of today."
      level2: "Spiritual exhaustion often comes from treating the Divine as distant. The Ālvār teaching restores immediacy."
      level3: >
        Rāmānuja's viśiṣṭādvaita grounds the Ālvār intuition theologically:
        if the world is the body of God, the Divine cannot be spatially absent.
        The absence is a failure of perception, not of proximity. The Ālvārs
        trained their eyes to see what was always there.

