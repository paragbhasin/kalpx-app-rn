# ROOM_POOL_PLAN_V2.yaml
#
# Agent E (Wave 1 operationalization) — projected pool composition per room
# after decontamination + dark-tradition seeding + sankalp-slot structural
# addition.
#
# Status: FOUNDER-REVIEW-PENDING. Numbers are doctrinal targets consistent
# with ROOM_TRADITION_ASSIGNMENT_V2 + ROOM_CLASS_DOMINANCE_V2. Implementing
# migrations: 0132 (growth sankalp slot), 0133 (decontamination), 0134
# (clarity principle expansion), 0135 (dark-tradition seed).
#
# Conventions:
#   - "current_state" reflects CONTENT_CLASS_AUDIT_V2 + 0120 seed snapshot.
#   - "projected_state" = after 0132-0135 apply.
#   - "life_context_coverage" uses the room's allowed context set; excluded
#     contexts not listed.
#   - Prefixed IDs: mantra.*, sankalp.*, practice.*, else principle_id.
#   - "added" row IDs are tagging (not authoring) in Wave 1. Net-new rows
#     called out with (NEW) suffix.
#
# Doctrine locks enforced:
#   * Gita ≤ 25% of clarity principle pool
#   * Bhakti 6-8 in connection wisdom_banner; 3-4 in joy wisdom_banner
#   * Yamas: growth ~10, release×money_security ~2, clarity×relationships ~3
#   * Ayurveda: release×health ~5-6, growth×health ~4-5, clarity×health ~2-3,
#     stillness body-regulation ~1-2, connection×health ~1-2
#   * Dinacharya: growth daily_life/health ~12-15, clarity daily_life ~4-5,
#     connection daily_life ~2-3
#   * Release excludes purpose_direction
#   * Joy excludes money_security
#   * Connection excludes work_career + money_security
#   * Stillness has no life_context (pre-cognitive)
#   * Dual-use within a room (same principle serves 4 surfaces in clarity/
#     growth) is preserved per §5.7.5.

