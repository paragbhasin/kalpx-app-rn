# =============================================================================
# Curator escalations — rows/fields needing explicit curator decision before
# any write-through. Not exhaustive; key ambiguities only.
# =============================================================================
curator_escalations:
  - item_id: mantra.soham
    slot: connection.mantra.rotation
    reason: "Same asset appears in stillness.anchor AND connection.rotation. emotional_function shifts from regulate (stillness) to hold (connection). Curator confirm whether per-room override tag permitted, or whether one slot should carry selection_justification only."
  - item_id: practice.hand_on_heart
    slot: stillness.practice.rotation + connection.practice.rotation
    reason: "Dual-membership somatic anchor. Proposed bias differs by room (stillness→self/health; connection→relationships/self). Curator confirm pattern for dual-room rows."
  - item_id: practice.self_acceptance_pause
    slot: growth.practice.rotation
    reason: "Row has release/connection emotional tone (hold) in a growth pool. Possible miscategorisation; room-fit audit may reassign."
  - item_id: mantra.asato_ma
    slot: release.mantra.rotation
    reason: "purpose_direction is §2.3 weak-fit for release but the mantra itself leans that direction. Either prune purpose_direction from life_context_bias or accept by exception."
  - item_id: gita_endure_the_passing_contacts
    slot: stillness.wisdom_banner.rotation
    reason: "misuse_risk flagged (stoic-suppression read in acute-grief context). Banner pool in stillness is low-risk; curator confirm intensity-gate."
  - item_id: gita_offer_action_without_ownership
    slot: growth.wisdom_banner.rotation
    reason: "'offer'-family row inside growth pool; joy↔growth exclusion sensitive. Curator verify emotional_function=offer in a growth pool is acceptable, or retag as deepen."
  - item_id: work_as_offering
    slot: joy.sankalp_seva.rotation
    reason: "Karma-yoga applied. Sits on joy/growth boundary; curator confirm joy-classification vs possible growth-pool cross-membership override."
  - item_id: step_walk_timer_10min
    slot: joy.step.rotation + growth.step.rotation
    reason: "Same template in joy AND growth. §Contract 4 7-day exclusion applies. Curator verify tag convergence + exclusion enforcement."
  - item_id: M_clarity_inquiry_seeds
    slot: clarity.inquiry.anchor
    reason: "Moment (not asset) — tagging at this level is provisional. True tags live on the 5 internal categories. Curator decide whether to expand OR accept provisional moment-level tag."
  - item_id: M_growth_inquiry_seeds
    slot: growth.inquiry.anchor
    reason: "Same as M_clarity_inquiry_seeds — row-level tags may differ per internal category."
  - item_id: carry.stillness_named.v1
    slot: stillness.carry.anchor
    reason: "Pool retired by migration 0127 (never surfaced). Tag provisional; only relevant if un-parked."
  - item_id: carry.clarity_journal.v1
    slot: clarity.carry.anchor
    reason: "Pool retired by migration 0127. Tag provisional."

# =============================================================================
# Structural notes for curator
# =============================================================================
structural_notes:
  - "§5.7.5 dual-use: clarity + growth principle ids appear in principle, wisdom_banner, wisdom_teaching, wisdom_reflection slots simultaneously. This YAML tags each id once under principle slot; other slots reference via `same_as`. Curator verify this is the desired on-disk shape OR if explicit per-slot copies are wanted."
  - "Inquiry pools (migration 0124) anchor_ref = moment_id, not asset slug. RoomContentPool model treats it as a string, but resolver differentiates by action_slot. Row-level tagging is moment-level; a second pass per-category is owed if moment seeds are externalised."
  - "Carry pool rotation_refs (migration 0125) are dict-shaped (not string slugs). item_ids used for tagging extracted from inner item_id key."
  - "Migration 0127 retires stillness.carry and clarity.carry pools. Tags are authored but flagged with STATUS=retired_authored. If un-parked later, tags apply as authored."
  - "Connection.wisdom_teaching and joy.wisdom_teaching pools are v2-deferred — no rows to tag."
  - "No 'banner_eligible=true' set for full mantras or multi-sentence practices per §5 rule #2."
  - "No 'repeat_tolerance=high' outside daily-practice-type content (breath, core mantras, sit, hand-on-heart, walking meditation)."
