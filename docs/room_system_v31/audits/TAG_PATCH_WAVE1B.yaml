doctrinal_flags:

  - id: DF-1_self_vs_self_devotion_canonical
    severity: low
    status: resolved-in-patch
    description: >
      Session-handoff 2026-04-20 referenced "self_devotion" as a potential
      context label. STRATEGY_V1 §1 + §8 canonically use "self" (lowercase
      snake_case, no suffix). The Sankhya wave2 file comment-headers use
      "self" literally (lines 36, 39, 2461, 2630). ROOM_TRADITION_V2 and
      ROOM_POOL_PLAN_V2 also use "self" consistently. TAG_PATCH_WAVE1 uses
      "self" in life_context_bias arrays (e.g. gita_choose_clarity_over_despair).
      PATCH DECISION: this artifact uses "self" uniformly per canonical.
      If founder retains "self_devotion" for a specific semantic (e.g.
      atma-bhakti register distinct from generic self-inquiry), a separate
      label migration is required — none of the 82 rows here have that
      register (sankhya is anti-bhakti by doctrine).

  - id: DF-2_sankhya_stillness_doctrinal_tension
    severity: medium
    status: needs-founder-call
    rows_affected: [sankhya_rest_in_the_non_participating_witness, sankhya_kaivalya_is_the_direction_of_stillness]
    description: >
      ROOM_TRADITION_V2 §Stillness explicitly excludes Sankhya (Avoid/exclude
      list). WAVE1_SYNTHESIS §2.1 classifies principle-class as doctrinally
      excluded from stillness. Agent G's authoring premise (header lines 5-7)
      was that sākṣī-bhāva register supersedes tradition-exclusion.
      THIS PATCH conservatively routes both rows to stillness with
      surface_eligibility=[wisdom_banner] + pool_role=rare, respecting §2.1
      class-exclusion by capping exposure to banner only. Alternative routes:
      (b) clarity × self; (c) reject for stillness entirely. Curator/founder
      to pick (a)/(b)/(c) before pool_version=2026.04.v1-wave1b applies.

  - id: DF-3_dual_tradition_tags
    severity: low
    status: proposed-in-patch
    rows_affected:
      - niti_aparigraha_meets_prudence (niti + yamas)
      - niti_truthfulness_with_discretion (niti + yamas)
      - niti_craft_outlives_the_role (niti + dharma)
      - niti_clean_means_as_discipline (niti + dharma)
      - niti_leadership_that_serves (niti + dharma)
      - niti_wealth_used_rightly (niti + dharma)
      - niti_austerity_as_freedom (niti + yamas)
      - niti_rhythm_before_decision (niti + dinacharya)
      - niti_food_and_sleep_as_decisions (niti + dinacharya)
      - sankhya_svadhyaya_is_guna_observation_over_time (sankhya + niyamas)
    description: >
      10 rows span two tradition lineages per their authored source text
      (e.g. aparigraha is both a yama AND an artha-śāstra topic; svādhyāya
      is both niyama-5 AND a sankhya-aligned guṇa-observation move).
      Convention applied: tradition_family remains the PRIMARY (niti or
      sankhya as authored), tradition[] lists both. This preserves lineage
      integrity without forcing a single-family-tag. Curator may request
      primary-only if it simplifies pool filtering.

  - id: DF-4_repeat_tolerance_level_lowered_on_tier2
